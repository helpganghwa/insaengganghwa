<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>길드 월드맵 — 50구역 (왕국 맵)</title>
<style>
  :root{color-scheme:dark}*{box-sizing:border-box}
  body{margin:0;background:#0c0f17;color:#cbd5e1;font-family:ui-sans-serif,system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;gap:12px;padding:14px}
  h1{font-size:15px;margin:2px 0}.legend{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:12px}
  .legend span{display:flex;gap:5px;align-items:center}.legend .sw{width:12px;height:12px;border-radius:3px}
  .bar button{font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;border:1px solid #334155;background:#1e293b;color:#cbd5e1}
  .bar button.off{opacity:.5}
  .stage{position:relative;width:min(94vw,820px);aspect-ratio:1/1;border-radius:14px;overflow:hidden;isolation:isolate;border:1px solid #1e293b}
  .stage img{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated}
  .node{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;pointer-events:none}
  .node .dot{width:16px;height:16px;border-radius:50%;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
  .node .nm{margin-top:2px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 0 3px #000,0 0 3px #000,0 1px 2px #000}
  body.nonames .node .nm{display:none}
</style></head><body>
  <h1>길드 월드맵 — 50구역 (중앙 왕국 맵)</h1>
  <div class="legend" id="legend"></div>
  <div class="bar"><button id="t">이름 끄기</button></div>
  <div class="stage" id="stage"><img src="/sprites/guild/worldmap.png" alt="" draggable="false"/></div>
<script>
  const COLOR={volcano:'#ef4444',temple:'#93c5fd',swamp:'#84cc16',orc:'#d97706',kingdom:'#fbbf24',angel:'#c084fc'};
  const LABEL={volcano:'화산',temple:'신전',swamp:'늪',orc:'오크',kingdom:'왕국',angel:'천사'};
  const Z=[[1,"volcano","검은 첨봉",12.1,14.6],[2,"volcano","분노의 분화구",11.8,30.3],[3,"volcano","잿더미 폐허",26.8,54.5],[4,"volcano","흑요석 보루",13.5,49],[5,"volcano","용의 해골",18.3,40.2],[6,"volcano","재의 길목",31.9,40.7],[7,"volcano","불탄 마을",27.8,33.2],[8,"volcano","그을린 고목",21.7,27.2],[9,"volcano","용암 하구",9.1,60.6],[10,"volcano","연기 평원",15.6,23.1],[11,"temple","눈 덮인 숲",32.9,14.4],[12,"temple","대설봉",47.6,6.1],[13,"temple","잊힌 신전",43.3,16.2],[14,"temple","대리석 성소",50.7,17.7],[15,"temple","침묵의 회랑",39.4,23.3],[16,"temple","성좌의 폐허",63.9,28.7],[17,"temple","서리 관문",64.9,35.7],[18,"temple","얼어붙은 샘",52.5,34.4],[19,"temple","잊힌 숲길",62.4,15.1],[20,"temple","얼음 여울",51.6,26.3],[21,"swamp","버섯 군락",12.4,79],[22,"swamp","독성 늪지",34.3,69.6],[23,"swamp","포자 습지",18.2,72.4],[24,"swamp","형광 수렁",41.3,87.4],[25,"swamp","썩은 잔교",64.5,76.2],[26,"swamp","늪지 오두막",58.9,69.9],[27,"swamp","안개 다리",54.9,81.2],[28,"swamp","점액 못",35.3,76.8],[29,"swamp","고사목 숲",50.7,73.5],[30,"swamp","독안개 골",28.4,64.7],[31,"orc","오크 대요새",88.7,66.9],[32,"orc","전사의 막사",83.1,76.4],[33,"orc","변경 초소",66.8,64.7],[34,"orc","뼈 토템 언덕",75.8,41.7],[35,"orc","약탈자 야영지",86.8,45.4],[36,"orc","감시 망루",86.2,55.9],[37,"orc","전쟁 토템",73.7,67.5],[38,"orc","잿빛 첨석",77.5,59.6],[39,"orc","피의 막사",76.4,79.3],[40,"orc","모닥불 평원",78.1,47.7],[41,"kingdom","왕성",45,45.2],[42,"kingdom","상인 거리",43.5,53.8],[43,"kingdom","성문",60.5,59.1],[44,"kingdom","대성당",59.6,52],[45,"kingdom","기사 연무장",55.3,46.5],[46,"kingdom","남쪽 주거지",50.5,56.8],[47,"angel","타락한 성소",86.8,14.5],[48,"angel","타락의 심연",92.7,21.9],[49,"angel","황금 회랑",80.1,15.2],[50,"angel","검은 깃털 제단",85.4,22.2]];
  const stage=document.getElementById('stage');
  for(const[id,r,name,x,y]of Z){const el=document.createElement('div');el.className='node';el.style.left=x+'%';el.style.top=y+'%';
    el.innerHTML=`<div class="dot" style="background:${COLOR[r]}">${id}</div><div class="nm">${name}</div>`;stage.appendChild(el);}
  const lg=document.getElementById('legend');
  for(const k of Object.keys(COLOR)){const c=Z.filter(z=>z[1]===k).length;const s=document.createElement('span');
    s.innerHTML=`<span class="sw" style="background:${COLOR[k]}"></span>${LABEL[k]} ${c}`;lg.appendChild(s);}
  document.getElementById('t').onclick=e=>{document.body.classList.toggle('nonames');const o=document.body.classList.contains('nonames');e.target.classList.toggle('off',o);e.target.textContent=o?'이름 켜기':'이름 끄기';};
</script></body></html>
