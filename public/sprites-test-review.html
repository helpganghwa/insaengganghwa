<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>아이템 생성 리뷰 — 테스트 세트</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; padding: 18px 16px 80px; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; background: #0c0d12; color: #e7e7ea; max-width: 980px; margin-inline: auto; }
  h1 { font-size: 20px; margin: 0 0 2px; }
  .sub { font-size: 13px; color: #9a9aa6; margin: 0 0 16px; }
  .bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 18px; }
  .bar span { font-size: 12px; color: #8a8b97; margin-right: 2px; }
  .bar button { font: inherit; font-size: 12px; font-weight: 700; border: 1px solid #2a2b34; border-radius: 8px; padding: 6px 10px; background: #14151c; color: #c9cad3; cursor: pointer; }
  .bar button.on { border-color: #d4a017; color: #e0b94a; background: #2a230f; }
  .setHdr { font-size: 14px; color: #c9a24a; font-weight: 800; margin: 22px 0 10px; border-bottom: 1px solid #23242c; padding-bottom: 6px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { border: 1px solid #23242c; border-radius: 14px; background: #111219; overflow: hidden; }
  .stage { height: 200px; display: flex; align-items: center; justify-content: center; }
  /* 배경 모드 */
  .stage.checker { background-image: linear-gradient(45deg,#23242c 25%,transparent 25%),linear-gradient(-45deg,#23242c 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#23242c 75%),linear-gradient(-45deg,transparent 75%,#23242c 75%); background-size: 18px 18px; background-position: 0 0,0 9px,9px -9px,-9px 0; background-color: #14151c; }
  .stage.dark { background: #0a0b0f; }
  .stage.light { background: #e9e9ee; }
  .stage.card { background: radial-gradient(120% 120% at 50% 0%, #2a2030, #0c0d12); }
  .stage img { image-rendering: pixelated; width: 144px; height: 144px; object-fit: contain; filter: drop-shadow(0 4px 10px rgba(0,0,0,.5)); }
  .meta { padding: 10px 12px 12px; }
  .slot { font-size: 10px; font-weight: 800; letter-spacing: .04em; color: #1a1300; background: #d4a017; border-radius: 999px; padding: 2px 7px; display: inline-block; }
  .nm { font-size: 15px; font-weight: 800; margin: 7px 0 2px; }
  .nm .ko { color: #fff; } .nm .prov { color: #6c6d78; font-size: 11px; font-weight: 600; }
  .key { font-size: 11px; font-family: ui-monospace, monospace; color: #7a8bbf; word-break: break-all; }
  .lore { font-size: 12px; line-height: 1.6; color: #c4c5cf; margin: 8px 0 0; white-space: pre-line; }
  .lore.empty { color: #6c6d78; font-style: italic; }
  details { margin-top: 8px; }
  details summary { font-size: 11px; color: #8a8b97; cursor: pointer; }
  details p { font-size: 11px; font-family: ui-monospace, monospace; color: #9a9aa6; line-height: 1.5; margin: 6px 0 0; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .row3 .mini { border: 1px solid #23242c; border-radius: 12px; overflow: hidden; }
  .row3 .mini .stage { height: 130px; }
  .row3 .mini .stage img { width: 96px; height: 96px; }
  .row3 .cap { text-align: center; font-size: 11px; color: #9a9aa6; padding: 5px 0 8px; }
  .dual { display: grid; grid-template-columns: 1fr 1fr; }
  .dual .half:first-child { border-right: 1px solid #23242c; }
  .dual .stage { height: 150px; }
  .trio { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .trio .cell:not(:last-child) { border-right: 1px solid #23242c; }
  .trio .stage { height: 120px; }
  .trio .stage img { width: 104px; height: 104px; }
  .cap2 { text-align: center; font-size: 10px; color: #9a9aa6; padding: 3px 0 6px; border-top: 1px solid #1c1d24; }
  /* 코드 오라 — 정적 투명 PNG 위에 금빛 오라+광택+반짝임. 본체 고정·배경 투명. */
  .aura { position: relative; width: 144px; height: 144px; }
  .aura .glow { position: absolute; inset: -22%; border-radius: 50%; z-index: 1;
    background: radial-gradient(circle, rgba(255,216,120,.65), rgba(255,196,80,.22) 45%, transparent 70%);
    filter: blur(3px); animation: auraPulse 1.8s ease-in-out infinite; }
  .aura .base { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; z-index: 2; }
  .aura .sheen { position: absolute; inset: 0; z-index: 3; pointer-events: none; mix-blend-mode: screen;
    background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.9) 50%, transparent 62%);
    background-size: 300% 100%; -webkit-mask-size: contain; mask-size: contain;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center;
    animation: auraSheen 2.6s linear infinite; }
  .aura .spk { position: absolute; width: 4px; height: 4px; border-radius: 50%; z-index: 4; background: #fff;
    box-shadow: 0 0 5px 1px rgba(255,224,150,.95); animation: auraTwk 1.6s ease-in-out infinite; }
  @keyframes auraPulse { 0%,100% { opacity:.45; transform:scale(.92) } 50% { opacity:.95; transform:scale(1.08) } }
  @keyframes auraSheen { 0% { background-position: 160% 0 } 100% { background-position: -160% 0 } }
  @keyframes auraTwk { 0%,100% { opacity:0; transform:scale(.3) } 50% { opacity:1; transform:scale(1) } }
</style>
</head>

// AD 평가 렌더 헬퍼
const clsFor = (n) => (n >= 8 ? 'hi' : n >= 6 ? 'mid' : 'lo');
function evalBlock(key) {
  const e = EVAL[key] || EVAL2[key];
  if (!e) return '';
  const avg = ((e.i + e.a + e.s) / 3).toFixed(1);
  const ac = avg >= 8 ? 'hi' : avg >= 6 ? 'mid' : 'lo';
  return `<div class="rev">
    <div class="sc">
      <div class="b ${clsFor(e.i)}">이미지<b>${e.i}</b></div>
      <div class="b ${clsFor(e.a)}">애니<b>${e.a}</b></div>
      <div class="b ${clsFor(e.s)}">스토리<b>${e.s}</b></div>
      <div class="b avg ${ac}">종합<b>${avg}</b></div>
    </div>
    <div class="ln g"><span class="t">잘함</span><span>${e.g}</span></div>
    <div class="ln b"><span class="t">아쉬움</span><span>${e.b}</span></div>
    <div class="ln f"><span class="t">개선</span><span>${e.f}</span></div>
  </div>`;
}

  .bpool{border:1px solid #23242c;border-radius:8px;background:#0c0d12;padding:6px;min-width:640px}
  .bpool.over{border-color:#d4a017}
  .bpool .ph{font-size:11px;font-weight:700;color:#9a9aa6;margin-bottom:4px}
  .prow{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:4px}
  .bpool .prow{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .pgroup{margin-bottom:8px;border:1px solid #1c1d24;border-radius:8px;padding:6px;background:#0f1017}
  .pgroup .pgh{font-size:11px;font-weight:800;color:#c9a24a;margin-bottom:4px}
  .pgroup .pgh .badge{font-size:8px;font-weight:800;border-radius:5px;padding:1px 5px;margin-left:5px}
  .pgroup .pgh .badge.kind{background:#23303f;color:#8ab6e0}.pgroup .pgh .badge.prev{background:#2a2030;color:#c89ae0}
  .tile .tlore{font-size:9px;line-height:1.4;color:#bcbdc7;padding:0 4px 5px;max-height:52px;overflow:hidden}
`;
document.head.appendChild(st3);

// 보드 상태: LOC[key] = `${region}#${col}#${slot}` 또는 'pool'
const BOARD_LS = 'board-v2';
let LOC = JSON.parse(localStorage.getItem(BOARD_LS) || 'null');
const saveBoard = () => localStorage.setItem(BOARD_LS, JSON.stringify(LOC));
const cellKey = (r, c, slot) => `${r}#${c}#${slot}`;
function initBoard() {
  LOC = {};
  for (const r of REGIONS) {
    const sets = ALL.filter((s) => s.region === r).map((s) => ({ s, sc: setScore(s) })).sort((a, b) => b.sc - a.sc);
    sets.forEach((o, ci) => { for (const it of o.s.items) LOC[it.key] = ci < COLS ? cellKey(r, ci, it.slot) : 'pool'; });
  }
}
if (!LOC) initBoard();
for (const it of ITEMS) if (!(it.key in LOC)) LOC[it.key] = 'pool'; // 신규 항목은 풀로
saveBoard();
function itemAt(loc) { for (const k in LOC) if (LOC[k] === loc) return k; return null; }

let ANIMS = [];
const board = document.createElement('div'); app.appendChild(board);
function tile(key) {
  const it = byKey[key]; const e = evOf(key); const sc = ((e.i + e.a + e.s) / 3).toFixed(1);
  const hasAnim = !!it.objAnim; const sp = it.staticSrc;
  const t = document.createElement('div'); t.className = 'tile'; t.draggable = true; t.dataset.key = key; t.title = `${it.setName} · ${it.name}`;
  t.innerHTML = `<img class="shot" src="${hasAnim ? it.objAnim.dir + '/0.png' : sp}" ${hasAnim ? `data-dir="${it.objAnim.dir}" data-n="${it.objAnim.n}"` : ''}><div class="ti"><div class="tn">${it.name}</div><div class="tsc ${scoreCls(+sc)}">${sc}</div></div>`;
  const im = t.querySelector('.shot'); im._anim = true;
  t.addEventListener('dragstart', (ev) => { ev.dataTransfer.setData('text/plain', key); ev.dataTransfer.effectAllowed = 'move'; setTimeout(() => t.classList.add('drag'), 0); });
  t.addEventListener('dragend', () => t.classList.remove('drag'));
  return t;
}
function poolTile(key) {
  const t = tile(key); const it = byKey[key];
  const lr = document.createElement('div'); lr.className = 'tlore'; lr.textContent = it.lore || '';
  t.appendChild(lr);
  return t;
}
function wireDrop(el, target, region) {
  el.addEventListener('dragover', (ev) => { ev.preventDefault(); el.classList.add('over'); });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', (ev) => {
    ev.preventDefault(); el.classList.remove('over');
    const key = ev.dataTransfer.getData('text/plain'); if (!key) return; const it = byKey[key];
    if (target === 'pool') { if (it.region !== region) return; LOC[key] = 'pool'; }
    else {
      if (it.region !== target.region || it.slot !== target.slot) return;
      const dest = cellKey(target.region, target.col, target.slot);
      const occ = itemAt(dest); const from = LOC[key];
      LOC[key] = dest; if (occ && occ !== key) LOC[occ] = from;
    }
    saveBoard(); render();
  });
}
function render() {
  board.innerHTML = ''; let filled = 0;
  for (const r of REGIONS) {
    const sec = document.createElement('div'); sec.className = 'bregion';
    const h = document.createElement('h2'); h.textContent = r; sec.appendChild(h);
    const grid = document.createElement('div'); grid.className = 'bgrid';
    const corner = document.createElement('div'); corner.className = 'corner'; corner.textContent = ''; grid.appendChild(corner);
    for (let c = 0; c < COLS; c++) { const d = document.createElement('div'); d.className = 'chdr'; d.textContent = `세트 ${c + 1}`; grid.appendChild(d); }
    for (const slot of SLOTS) {
      const rh = document.createElement('div'); rh.className = 'rhdr'; rh.textContent = SLOT_KO[slot]; grid.appendChild(rh);
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('div'); cell.className = 'bcell';
        const k = itemAt(cellKey(r, c, slot));
        if (k) { cell.appendChild(tile(k)); filled++; } else { const sp = document.createElement('span'); sp.className = 'empty'; sp.textContent = SLOT_KO[slot]; cell.appendChild(sp); }
        wireDrop(cell, { region: r, col: c, slot });
        grid.appendChild(cell);
      }
    }
    sec.appendChild(grid);
    const pool = document.createElement('div'); pool.className = 'bpool';
    const ph = document.createElement('div'); ph.className = 'ph'; ph.textContent = '미배치 풀 — 세트별 (타일을 칸으로 드래그 / 칸의 타일을 여기로 드래그하면 빼기)'; pool.appendChild(ph);
    const poolItems = ITEMS.filter((it) => it.region === r && LOC[it.key] === 'pool');
    if (!poolItems.length) { const sp = document.createElement('span'); sp.className = 'empty'; sp.textContent = '없음'; pool.appendChild(sp); }
    else {
      const groups = {};
      for (const it of poolItems) { (groups[it.setName] = groups[it.setName] || []).push(it); }
      const order = Object.keys(groups).sort((a, b) => {
        const av = groups[a].reduce((t, x) => t + itemScore(x), 0) / groups[a].length;
        const bv = groups[b].reduce((t, x) => t + itemScore(x), 0) / groups[b].length;
        return bv - av;
      });
      for (const sn of order) {
        const its = groups[sn].sort((a, b) => SLOTS.indexOf(a.slot) - SLOTS.indexOf(b.slot));
        const g = document.createElement('div'); g.className = 'pgroup';
        const prev = its[0].preview;
        const gh = document.createElement('div'); gh.className = 'pgh'; gh.innerHTML = `${sn}<span class="badge ${prev ? 'prev' : 'kind'}">${prev ? '예비' : '정식'}</span>`; g.appendChild(gh);
        const prow = document.createElement('div'); prow.className = 'prow';
        for (const it of its) prow.appendChild(poolTile(it.key));
        g.appendChild(prow); pool.appendChild(g);
      }
    }
    wireDrop(pool, 'pool', r); sec.appendChild(pool);
    board.appendChild(sec);
  }
  const tot = REGIONS.length * COLS * SLOTS.length;
  const stt = document.getElementById('seltot'); if (stt) stt.textContent = `· 배치 ${filled}/${tot}칸`;
  ANIMS = [...board.querySelectorAll('img.shot[data-dir]')].map((img) => ({ img, dir: img.dataset.dir, n: Number(img.dataset.n), i: 0 }));
}
render();
document.getElementById('autobtn').addEventListener('click', () => { if (confirm('점수순으로 자동 배치할까요? (현재 배치 초기화)')) { initBoard(); saveBoard(); render(); } });
document.getElementById('clrbtn').addEventListener('click', () => { if (confirm('모든 칸을 비우고 풀로 보낼까요?')) { for (const k in LOC) LOC[k] = 'pool'; saveBoard(); render(); } });
document.getElementById('copybtn').addEventListener('click', () => {
  const lines = [];
  for (const r of REGIONS) { lines.push(`[${r}]`); for (let c = 0; c < COLS; c++) { const parts = SLOTS.map((slot) => { const k = itemAt(cellKey(r, c, slot)); return k ? byKey[k].name : '—'; }); lines.push(`  세트${c + 1}: ${parts.join(' / ')}`); } }
  const txt = '[지역별 구성 세트]\n' + lines.join('\n');
  const el = document.getElementById('exparea'); el.style.height = '220px'; el.style.opacity = '1'; el.style.padding = '8px'; el.style.border = '1px solid #2a2b34'; el.style.margin = '0 0 8px'; el.value = txt; el.select();
  if (navigator.clipboard) navigator.clipboard.writeText(txt);
});

// === AD 총평 배너 ===
{
  const ev = Object.values(EVAL);
  const mean = (f) => ev.reduce((s, e) => s + f(e), 0) / ev.length;
  const mi = mean((e) => e.i), ma = mean((e) => e.a), ms = mean((e) => e.s), mt = (mi + ma + ms) / 3;
  const sum = document.createElement('div'); sum.className = 'adsum';
  sum.innerHTML = `<div class="t">🎬 아트 디렉터 총평 — 90종 평균</div>
   <div class="g">
     <span>이미지<b>${mi.toFixed(2)}</b></span>
     <span>애니<b>${ma.toFixed(2)}</b></span>
     <span>스토리<b>${ms.toFixed(2)}</b></span>
     <span class="tot">종합<b>${mt.toFixed(2)}</b></span>
   </div>
   <p>각 카드 하단에 항목별 점수(이미지·애니·스토리 10점)와 잘한점·아쉬운점·개선점을 적었습니다. 스토리 평균이 가장 높아 서사 완성도가 강점이고, 애니메이션이 상대적으로 개선 여지가 가장 큽니다(정적 발광·단조로움 보완 필요).</p>`;
  app.appendChild(sum);
}

function itemCard(it) {
  const sp = it.staticSrc ?? `sprites-test/${it.slot}/${it.key}.png`;
  const hasAnim = !!it.objAnim;
  const c = document.createElement('div'); c.className = 'rcard';
  c.innerHTML =
    `<div class="rstage checker">
      <img class="shot" src="${hasAnim ? it.objAnim.dir + '/0.png' : sp}" ${hasAnim ? `data-dir="${it.objAnim.dir}" data-n="${it.objAnim.n}"` : ''} data-static="${sp}">
      ${hasAnim ? '<div class="tg"><button class="bA on">애</button><button class="bS">정</button></div>' : '<span class="noa">정적</span>'}
     </div>
     <div class="rmeta">
       <div class="rnm">${it.name || ('(미정) ' + (it.prov || ''))} <span style="color:#6c6d78;font-weight:600;font-size:9px">${SLOT_KO[it.slot]}</span></div>
       <div class="rkey">${it.key}</div>
       <div class="rlore ${it.lore ? '' : 'empty'}">${it.lore || '로어 미작성'}</div>
       ${evalBlock(it.key)}
     </div>`;
  const img = c.querySelector('.shot');
  if (hasAnim) {
    img._anim = true;
    const bA = c.querySelector('.bA'), bS = c.querySelector('.bS');
    bA.addEventListener('click', (e) => { e.stopPropagation(); img._anim = true; bA.classList.add('on'); bS.classList.remove('on'); });
    bS.addEventListener('click', (e) => { e.stopPropagation(); img._anim = false; img.src = img.dataset.static; bS.classList.add('on'); bA.classList.remove('on'); });
  }
  const lore = c.querySelector('.rlore'); lore.addEventListener('click', (e) => { e.stopPropagation(); lore.classList.toggle('exp'); });
  return c;
}

// (상세 섹션은 선택 카드 안으로 통합됨 — 각 세트 카드가 3종의 스프라이트·로어·개별 점수를 모두 표시)

let last = 0;
function tick(t) { if (t - last >= 110) { last = t; for (const o of ANIMS) { if (o.img._anim) { o.i = (o.i + 1) % o.n; o.img.src = `${o.dir}/${o.i}.png`; } } } requestAnimationFrame(tick); }
requestAnimationFrame(tick);

document.querySelectorAll('.bar button[data-bg]').forEach((b) => {
  b.addEventListener('click', () => {
    const bg = b.dataset.bg;
    document.querySelectorAll('.bar button[data-bg]').forEach((x) => x.classList.toggle('on', x === b));
    document.querySelectorAll('.rstage').forEach((s) => { s.className = 'rstage ' + bg; });
  });
});

</script>
