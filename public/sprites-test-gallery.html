<style>
  :root{color-scheme:dark}

  @media(min-width:561px){.card{flex-direction:row;align-items:stretch}.stage{flex:0 0 132px;aspect-ratio:auto;width:132px}.stage img{width:90%;height:90%}.meta{flex:1;justify-content:center}}

<script>
const DATA=[{"region":"왕국","sets":[[{"name":"무도회의 한 수","lore":"춤이 결투로 바뀌는 건 한순간이다. 손잡이의 와인빛 리본을 푸는 그 짧은 동안, 상대는 내가 손님인지 자객인지 가늠하느라 멈칫한다. 그 멈칫이면 충분하다. 가는 금빛 칼날은 그 한 박자를 결코 놓치지 않는다.","dir":"sprites-test/anim-obj/kingdom_masque_saber","n":15,"st":"sprites-test/anim-obj/kingdom_masque_saber/idle.png","slot":"weapon"},{"name":"이름 없는 드레스","lore":"문을 밀고 들어서는 순간, 나는 더 이상 어제의 내가 아니다. 검은 비단에 금실이 흐르고 와인빛 단이 겹겹이 부서지는 이 드레스 한 벌이면, 사람들은 내 이름 대신 내 그림자만 좇는다. 화려할수록 더 깊이 숨을 수 있다는 건, 무도회만 아는 비밀이다.","dir":"sprites-test/anim-obj/kingdom_masque_gown","n":15,"st":"sprites-test/anim-obj/kingdom_masque_gown/idle.png","slot":"armor"},{"name":"이름을 가린 가면","lore":"촛불이 다 사위고 악사가 활을 내려놓을 때, 사람들은 하나둘 가면을 벗는다. 나는 늘 그 순간이 가장 두렵다. 금빛 세공 뒤, 와인빛 깃이 가려 주던 얼굴을 다시 마주해야 하니까. 가면은 하룻밤의 거짓을 허락하고, 새벽은 어김없이 그 값을 받아 간다.","dir":"sprites-test/anim-obj/kingdom_masque_mask","n":15,"st":"sprites-test/anim-obj/kingdom_masque_mask/idle.png","slot":"accessory"}],[{"name":"행렬의 창","lore":"대관식 행렬의 맨 앞에는 늘 이 창이 선다. 금빛 자루에 사자 문장이 새겨지고, 창끝의 푸른 보석이 햇빛을 받아 길 위에 파란 빛을 드리운다. 그 빛이 발끝에 닿은 사람부터, 하나둘 노래를 한 소절씩 보태기 시작한다.","dir":"sprites-test/anim-obj/kingdom_spear","n":15,"st":"sprites-test/anim-obj/kingdom_spear/idle.png","slot":"weapon"},{"name":"별을 두른 망토","lore":"연회장의 모든 눈이 한 사람에게 쏠리는 순간이 있다. 로열블루 벨벳 위로 금실이 강처럼 흐르고 보석이 별처럼 박힌 이 망토를 펼칠 때다. 춤추던 이들이 발을 멈추고 천장 대신 그 어깨를 올려다본다. 밤하늘을 통째로 걸친 사람이 거기 서 있다.","dir":"sprites-test/anim-obj/kingdom_cloak","n":15,"st":"sprites-test/anim-obj/kingdom_cloak/idle.png","slot":"armor"},{"name":"별이 박힌 왕관","lore":"노래가 절정으로 치달으면 마지막으로 이 왕관이 나온다. 금테에 푸른 보석과 잔별이 촘촘해, 촛불 아래선 샹들리에보다 환하다. 관이 머리에 닿는 순간 악단이 마지막 소절을 터뜨리고, 그제야 연회는 비로소 완성된다.","dir":"sprites-test/anim-obj/kingdom_crown","n":15,"st":"sprites-test/anim-obj/kingdom_crown/idle.png","slot":"accessory"}],[{"name":"왕을 짊어진 대검","lore":"즉위식의 첫 시험은 이 검이다. 금과 로열블루로 치장하고 손잡이 끝에서 사자가 포효하는, 칼몸을 따라 보석이 줄지어 박힌 거대한 양손검. 새 왕은 이것을 두 손으로 머리 위까지 들어 올려야 한다. 팔이 떨리면 왕좌도 떨린다. 흔들림 없이 들어 올린 자만이 그 무게를 감당할 자격을 얻는다.","dir":"sprites-test/anim-obj/kc_mace","n":15,"st":"sprites-test/anim-obj/kc_mace/idle.png","slot":"weapon"},{"name":"맹세를 쥔 손","lore":"왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡는다. 한쪽 손등엔 포효하는 사자, 다른 손등엔 또 다른 왕가의 문장. 두 문장이 맞닿는 순간 맹세는 말 없이 성립된다. 푸른 법랑이 마디마다 감겨 쥔 손을 쉬이 놓지 못하게 하니, 한 번 맞잡은 맹세를 무른 왕은 일찍이 없었다.","dir":"sprites-test/anim-obj/kc_gaunt","n":15,"st":"sprites-test/anim-obj/kc_gaunt/idle.png","slot":"armor"},{"name":"사자의 증표","lore":"대관식이 끝나면 새 왕의 목에 이 메달이 걸린다. 금빛 원판 한가운데 사자가 포효하고, 그 위로 푸른 사파이어가 별처럼 박혔다. 왕관은 머리에 얹혀 위엄을 보이지만, 약속은 가슴에 걸려 숨을 쉰다. 왕이 숨 쉴 때마다 사자도 가슴 위에서 함께 들썩인다.","dir":"sprites-test/anim-obj/kc_medallion","n":15,"st":"sprites-test/anim-obj/kc_medallion/idle.png","slot":"accessory"}],[{"name":"풀리지 않는 질문","lore":"답이 없는 질문도 칼이 될 수 있을까. 성탑 꼭대기 방을 지키던 검사는 평생 그 물음 하나를 품고 살았다. 은빛 칼날에 사파이어 손잡이, 칼몸엔 옅은 빛이 한 줄 흐른다. 그는 답을 찾으려 평생 이 검을 휘둘렀지만, 끝내 답은 얻지 못했다. 닳아 없어진 것은 질문이 아니라 검이었다.","dir":"sprites-test/anim-obj/kr_rapier","n":15,"st":"sprites-test/anim-obj/kr_rapier/idle.png","slot":"weapon"},{"name":"별을 읽는 외투","lore":"밤하늘을 옷으로 입으면 그 비밀을 읽을 수 있을까. 깊은 청색 천에 금실로 해와 달과 별자리를 수놓은 외투, 후드를 쓰면 얼굴이 그늘에 잠긴다. 성탑의 현자들은 별 하나가 자리를 옮길 때마다 자락 어딘가에 그날 밤의 답을 한 줄씩 적어 두었다. 외투는 점점 무거워졌지만, 답은 끝나지 않았다.","dir":"sprites-test/anim-obj/kr_coat","n":15,"st":"sprites-test/anim-obj/kr_coat/idle.png","slot":"armor"},{"name":"대답하지 않는 나침반","lore":"별을 손바닥에 담으면 사람의 앞날까지 보일까. 금빛 고리 가운데 푸른 별을 맞추면 그날 밤하늘이 고스란히 손에 들어온다. 다만 이걸로 누군가의 내일을 들여다본 자들은 하나같이 입을 닫았다. 봐선 안 될 것까지 보고 만 얼굴이었다.","dir":"sprites-test/anim-obj/kr_astro","n":15,"st":"sprites-test/anim-obj/kr_astro/idle.png","slot":"accessory"}],[{"name":"동트는 맹세","lore":"성문 앞에서 너는 이 검을 처음 받아 든다. 금빛으로 휘어 오른 손잡이, 푸른 가죽 자루, 군더더기 없는 강철 양날. 화려하진 않지만 손에 익으면 평생을 함께한다. 기억해라. 이 검을 든 자는 동이 틀 때까지 제자리를 지킨다.","dir":"sprites-test/anim-obj/sword","n":15,"st":"sprites-test/anim-obj/sword/idle.png","slot":"weapon"},{"name":"여명의 벽","lore":"전장에서 너는 곧 알게 된다. 이 은빛 흉갑은 혼자일 때보다 어깨를 맞댈 때 더 단단해진다는 걸. 가슴의 금빛 태양이 옆 사람의 태양과 나란히 설 때, 흩어진 근위병은 하나의 성벽이 된다. 네가 무릎 꿇으면 옆 사람이 반 발짝 당겨 그 자리를 메운다. 사람들은 그 한 줄을 여명의 벽이라 불렀다.","dir":"sprites-test/anim-obj/cuirass","n":15,"st":"sprites-test/anim-obj/cuirass/idle.png","slot":"armor"},{"name":"새벽지기의 표식","lore":"오늘 밤 새벽 차례는 너다. 이 반지를 받아라. 금테 속 네모난 푸른 보석이 별빛을 머금으면, 모두가 잠든 사이 동쪽 하늘을 가장 먼저 맞는 사람이 된다. 반지는 누구의 소유도 아니다. 그저 그 밤 깨어 있는 자의 손가락에 잠시 머물 뿐이다.","dir":"sprites-test/anim-obj/ring","n":15,"st":"sprites-test/anim-obj/ring/idle.png","slot":"accessory"}],[{"name":"매발톱 장갑","lore":"왕실 매사냥꾼은 허리에 칼을 차지 않는다. 매의 발톱을 본떠 금으로 벼린 이 장갑이면 그만이기 때문이다. 손을 펴면 네 개의 휜 칼날이 햇빛을 긋고, 사냥감은 하늘에서 떨어지는 매를 본 마지막 짐승처럼 단 한 번에 끝난다.","dir":"sprites-test/anim-obj/kingdom_falcon_claw","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_claw/idle.png","slot":"weapon"},{"name":"매를 받는 토시","lore":"매가 내려앉는 자리라, 이 가죽 토시엔 흠집이 가실 날이 없다. 금테와 매 문장 위로 발톱 자국이 겹겹이 새겨질수록, 사냥꾼과 매가 함께 보낸 계절도 그만큼 쌓인 것이다. 늙은 사냥꾼들은 칼솜씨가 아니라 이 토시의 흠집 수로 서로를 가늠했다.","dir":"sprites-test/anim-obj/kingdom_falcon_bracer","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_bracer/idle.png","slot":"armor"},{"name":"방울 달린 매 두건","lore":"작은 방울이 달린 매 두건이다. 씌우면 매가 눈을 감은 듯 얌전해지고, 사냥꾼이 신호를 주면 그제야 솟구친다. 방울 소리는 사냥의 신호다. 딸랑, 하는 순간 하늘에서 그림자가 떨어진다.","dir":"sprites-test/anim-obj/kingdom_falcon_hood","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_hood/idle.png","slot":"accessory"}]]},{"region":"늪지대","sets":[[{"name":"이슬로 벼린 검","lore":"늪의 여왕은 대장간을 두지 않는다. 새벽 수면에 맺힌 이슬을 모아 칼을 벼린다는데, 정말로 칼날이 물빛처럼 맑다. 잠자리 날개로 손잡이를 감고 끝에 큰 진주를 박았다. 한 번 휘두르면 이슬이 흩날려, 본 사람은 검이 아니라 아침 안개를 봤다고 했다.","dir":"sprites-test/anim-obj/ml_blade","n":15,"st":"sprites-test/anim-obj/ml_blade/idle.png","slot":"weapon"},{"name":"수련이 피는 드레스","lore":"여왕이 물 위를 걸으면 발끝마다 수련이 피어 드레스가 된다고들 한다. 분홍과 흰 꽃잎이 겹겹이 쌓이고 그 사이로 얇은 비단이 무지갯빛으로 일렁인다. 진주 이슬이 점점이 맺혀, 여왕이 걸음을 옮길 때마다 작은 별처럼 또르르 굴렀다.","dir":"sprites-test/anim-obj/ml_gown","n":15,"st":"sprites-test/anim-obj/ml_gown/idle.png","slot":"armor"},{"name":"진주를 엮은 화관","lore":"늪에서 가장 오래 산 조개들이 여왕에게 진주를 바친다. 그 진주로 수련 줄기를 둥글게 엮고 가장 큰 알 위에 흰 수련 한 송이를 얹어 화관을 짓는다. 이슬 맺힌 새벽이면 화관 전체가 보석처럼 빛나, 안개 너머에서도 여왕이 어디 있는지 알 수 있었다.","dir":"sprites-test/anim-obj/ml_tiara","n":15,"st":"sprites-test/anim-obj/ml_tiara/idle.png","slot":"accessory"}],[{"name":"안개가 건넨 곡도","lore":"늪에 들어간 사람은 많아도, 돌아온 사람은 드물다. 덩굴이 칼자루를 감고 칼날 옆엔 청록빛 버섯이 돋은 이 곡도는 안개 속에서 주웠다고들 한다. 누가 떨어뜨렸는지는 아무도 모른다 — 늪은 답을 돌려주지 않으니까.","dir":"sprites-test/anim-obj/marsh_blade","n":15,"st":"sprites-test/anim-obj/marsh_blade/idle.png","slot":"weapon"},{"name":"늪이 삼킨 이끼갑옷","lore":"이끼와 나무껍질이 엉겨 한 벌의 갑옷이 되기까지 몇 해가 걸렸을까. 가슴엔 본 적 없는 청록빛 무늬가 돋고, 갈대 두건이 얼굴을 가린다. 이걸 입었던 게 사람이긴 했는지, 늪지기들도 말이 엇갈린다.","dir":"sprites-test/anim-obj/marsh_armor","n":15,"st":"sprites-test/anim-obj/marsh_armor/idle.png","slot":"armor"},{"name":"홀리는 등불","lore":"안개 짙은 밤이면 늪 한가운데 작은 불빛이 흔들린다. 녹슨 랜턴 안 청록 도깨비불이 숨 쉬듯 깜빡이는데, 따라가면 길이 나온다는 이도 영영 못 돌아왔다는 이도 있다. 불빛은 그저, 따라올 자를 기다린다.","dir":"sprites-test/anim-obj/marsh_lantern","n":15,"st":"sprites-test/anim-obj/marsh_lantern/idle.png","slot":"accessory"}],[{"name":"퉤! 하는 대롱","lore":"「방금 개굴 소리 났지?」 「그거 네가 낸 거 아니야?」 갈대 대롱 끝에 개구리 한 마리가 떡하니 앉아, 쏠 때마다 개굴 소리가 난다고 소문이 자자하다. 개구리가 우는 건지 쏘는 사람이 흉내 내는 건지를 두고, 늪에선 아직도 편이 갈린다.","dir":"sprites-test/anim-obj/mf_blow","n":15,"st":"sprites-test/anim-obj/mf_blow/idle.png","slot":"weapon"},{"name":"개구리 탈 망토","lore":"「또 따라온다, 저것들.」 큼지막한 개구리 머리 두건에 수련잎 망토를 두르면, 진짜 개구리들이 동료인 줄 알고 줄줄이 따라붙는다. 「떼어 내는 게 더 일이라니까.」 늪 아이들이 제일 갖고 싶어 하면서도, 한 번 써 본 아이는 꼭 그렇게 투덜댄다.","dir":"sprites-test/anim-obj/mf_hood","n":15,"st":"sprites-test/anim-obj/mf_hood/idle.png","slot":"armor"},{"name":"반딧불 충전기","lore":"「불 꺼졌어!」 「흔들어 봐, 자는 거야.」 밤마다 반딧불을 모아 담는 유리병, 그 안에서 작은 개구리가 불빛을 지킨다나 뭐라나. 어두운 늪길엔 이만 한 게 없지만, 반딧불이 잠들면 병을 흔들어 깨워야 하는 게 영 번거롭다.","dir":"sprites-test/anim-obj/mf_jar","n":15,"st":"sprites-test/anim-obj/mf_jar/idle.png","slot":"accessory"}],[{"name":"늪이 건넨 삼지창","lore":"너는 늪을 건넜고, 늪은 가장 좋은 것을 골라 너에게 내주었다. 청록빛 청동을 정교하게 벼린 삼지창, 가운데엔 에메랄드 수련이 빛난다. 진창에 손을 넣어 이걸 건져 올렸다면, 그건 네가 주운 게 아니다. 늪이 비로소 제 주인을 고른 것이다.","dir":"sprites-test/anim-obj/mb_trident","n":15,"st":"sprites-test/anim-obj/mb_trident/idle.png","slot":"weapon"},{"name":"늪빛 흉갑","lore":"너는 늪을 건넜고, 늪은 너에게 제 빛깔을 입혔다. 깊은 물에 푸르게 슨 청동 흉갑, 가슴엔 청록 수련 문장이 돋아 있다. 이 색은 아무에게나 남지 않는다. 늪을 건너고도 끝내 가라앉지 않은 자만이 이 빛을 얻는다.","dir":"sprites-test/anim-obj/mb_chest","n":15,"st":"sprites-test/anim-obj/mb_chest/idle.png","slot":"armor"},{"name":"부르면 모이는 뿔피리","lore":"너는 이제 혼자 싸우지 않아도 된다. 수련잎 무늬가 새겨진 이 청동 뿔피리를 한 번 길게 불면, 안개 어딘가에서 반딧불 같은 빛과 함께 늪지기들이 답해 온다. 늪에서 외로이 스러지는 자는 없다. 부를 줄만 안다면.","dir":"sprites-test/anim-obj/mb_horn","n":15,"st":"sprites-test/anim-obj/mb_horn/idle.png","slot":"accessory"}],[{"name":"한 방 작살","lore":"그물은 운이고 작살은 실력이지. 뼈와 늪나무로 깎고 끝에 미늘을 단 이 작살에, 진주 몇 알을 미끼 삼아 매달아 뒀어. 보통은 물고기가 걸리는데, 가끔은 영 모양이 이상한 게 딸려 올라오더라고. 그런 날은 그냥 도로 놓아준다.","dir":"sprites-test/anim-obj/marsh_angler_harpoon","n":15,"st":"sprites-test/anim-obj/marsh_angler_harpoon/idle.png","slot":"weapon"},{"name":"도롱이","lore":"늪에선 말이야, 기다리는 놈이 다 잡는 거야. 짚과 갈대를 촘촘히 엮은 이 도롱이를 두르고 갈대밭에 가만히 서 있으면, 새도 물고기도 나를 그냥 갈대인 줄 알아. 비도 막아 주지, 몸도 숨겨 주지. 갑옷값 굳었다고 늘 동네에 자랑한다.","dir":"sprites-test/anim-obj/marsh_angler_cape","n":15,"st":"sprites-test/anim-obj/marsh_angler_cape/idle.png","slot":"armor"},{"name":"반딧불 통발","lore":"빛을 보고 모인 물고기가 제 발로 통발에 들어온다니까, 이만한 미끼가 없어. 등에 메는 버들 통발에 반딧불 등을 넣어 두면 끝이지. 단점이 딱 하나, 너무 환하게 켜 두면 정작 물고기는 안 오고 모기만 잔뜩 꼬인다는 거야.","dir":"sprites-test/anim-obj/marsh_angler_creel","n":15,"st":"sprites-test/anim-obj/marsh_angler_creel/idle.png","slot":"accessory"}],[{"name":"길잡이 낫","lore":"늪의 안내인은 검을 들지 않는다. 이끼 슨 청동 낫 둘레로 에메랄드 반딧불이 모여 길을 그린다. 낫은 무엇을 베기 위한 게 아니다. 반딧불이 그려 둔 길을 흩지 않도록, 앞을 가린 갈대만 살며시 젖히는 도구다. 길을 내는 게 아니라, 이미 있는 길을 드러낼 뿐이다.","dir":"sprites-test/anim-obj/marsh_fen_scythe","n":15,"st":"sprites-test/anim-obj/marsh_fen_scythe/idle.png","slot":"weapon"},{"name":"안갯속 길손의 외투","lore":"“앞만 보고 따라와. 뒤는 돌아보지 말고.” 안내인은 그 말만 남기고 안갯속으로 들어선다. 이끼빛 외투에 박힌 반딧불이 밤마다 다른 길을 그려 주니, 나도 길은 외우지 않아 — 그저 불빛이 가리키는 대로 걸을 뿐이지.","dir":"sprites-test/anim-obj/marsh_fen_cloak","n":15,"st":"sprites-test/anim-obj/marsh_fen_cloak/idle.png","slot":"armor"},{"name":"안내인의 증표","lore":"녹슨 청동 테 안의 초록 보석에는 지나온 늪길이 어렴풋이 비친다. 안내인이 이 증표를 들어 보이면 안갯속 다른 안내인들이 불빛으로 답한다. 늪에서 길을 잃지 않는 유일한 방법은, 서로의 빛을 믿는 것이다.","dir":"sprites-test/anim-obj/mg_medal","n":15,"st":"sprites-test/anim-obj/mg_medal/idle.png","slot":"accessory"}]]},{"region":"화산","sets":[[{"name":"춤추는 쌍불꽃","lore":"금빛 휜 쌍단검의 날끝마다 주황 불꽃이 인다. 무희가 두 칼을 엇갈려 돌리면 불의 고리가 그려졌는데, 적은 그 아름다움에 홀려 한 발 늦게야 베인 걸 알았다.","dir":"sprites-test/anim-obj/volcano_dancer_daggers","n":15,"st":"sprites-test/anim-obj/volcano_dancer_daggers/idle.png","slot":"weapon"},{"name":"불길 케이프","lore":"주황·붉은 비단 자락 끝이 불꽃으로 타오르는 케이프다. 무희가 한 바퀴 돌면 자락의 불길이 둥근 고리를 그리며 뒤를 따른다. 적은 그 불의 궤적에 홀려, 정작 무희가 어떻게 코앞까지 다가왔는지 끝내 알지 못했다.","dir":"sprites-test/anim-obj/volcano_dancer_cape","n":15,"st":"sprites-test/anim-obj/volcano_dancer_cape/idle.png","slot":"armor"},{"name":"불꽃 부채","lore":"금살에 붉은 비단을 편 부채로, 펼치면 가장자리에 잔불이 살아 일렁인다. 무희는 춤 내내 이 부채로 불씨를 가두어 두다가, 마지막에 탁 접으며 그 불을 한꺼번에 풀어놓는다. 부채가 닫히는 순간이 공연의 끝이자, 진짜 불의 시작이었다.","dir":"sprites-test/anim-obj/volcano_dancer_fan","n":15,"st":"sprites-test/anim-obj/volcano_dancer_fan/idle.png","slot":"accessory"}],[{"name":"재에서 당기는 활","lore":"불사조가 마지막으로 타오른 자리에서 그 깃을 주워 메운 활이다. 흑요석 몸체에 금빛 불꽃 날개가 펼쳐지고, 시위를 당기면 균열마다 잿불이 살아난다. 한 번 재가 되어 본 활이라, 누구보다 먼저 그리고 가장 뜨겁게 다시 타오른다.","dir":"sprites-test/anim-obj/volcano_phoenix_bow","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_bow/idle.png","slot":"weapon"},{"name":"다시 타오른 가슴","lore":"흑요석 판을 가르고 금빛 불사조 날개가 솟은 흉갑이다. 균열 사이 잿불이 들숨처럼 깊어졌다 날숨처럼 풀린다. 이 갑옷은 한 번 무너져 본 가슴에만 맞는다 — 부서진 자리를 정확히 아는 자만이, 그 자리를 다시 채울 수 있으니까.","dir":"sprites-test/anim-obj/volcano_phoenix_cuirass","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_cuirass/idle.png","slot":"armor"},{"name":"꺼지지 않는 깃","lore":"금빛 깃털 끝에 잿불 한 점이 매달려 숨을 고른다. 불사조가 마지막으로 떨군 깃이라는데, 바람이 거셀수록 더 또렷이 탄다. 품은 자가 주저앉는 밤이면, 이 작은 불씨가 다시 일어나는 법을 알려 준다.","dir":"sprites-test/anim-obj/volcano_phoenix_pendant","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_pendant/idle.png","slot":"accessory"}],[{"name":"재를 다스리는 곡도","lore":"불의 여제는 군대를 부리지 않는다. 이 곡도를 한 번 들어 보이는 것으로 명령은 끝난다. 금빛 휜 날에 박힌 루비가 산속의 불을 끌어오면, 칼끝에서 잔불이 흘러내려 재가 스스로 길을 비킨다. 여제가 가리킨 곳은 그 순간 불의 영토가 된다.","dir":"sprites-test/anim-obj/vg_blade","n":15,"st":"sprites-test/anim-obj/vg_blade/idle.png","slot":"weapon"},{"name":"용암으로 짠 드레스","lore":"여제의 드레스는 베틀이 아니라 분화구에서 나왔다. 녹은 금을 실처럼 뽑아 짜고 그 사이사이 루비 불씨를 박았다. 이걸 걸친 사람은 용암 위를 맨발로 걸어도 데지 않는다. 화산이 그녀를 제 주인으로 받아들였다는, 가장 분명한 증표다.","dir":"sprites-test/anim-obj/vg_gown","n":15,"st":"sprites-test/anim-obj/vg_gown/idle.png","slot":"armor"},{"name":"불씨를 얹은 보관","lore":"여제가 분노할 때와 자비를 베풀 때, 이 보관은 서로 다른 빛으로 탄다고 한다. 녹은 금 위에 앉은 큰 루비를 중심으로 관 끝마다 작은 불꽃이 흔들리는데, 여제의 마음이 끓어오르면 불꽃이 붉게 치솟고 가라앉으면 푸르스름하게 잦아든다. 신하들은 여제의 말보다 이 불꽃의 색을 먼저 살폈다.","dir":"sprites-test/anim-obj/vg_tiara","n":15,"st":"sprites-test/anim-obj/vg_tiara/idle.png","slot":"accessory"}],[{"name":"비늘을 깬 부리","lore":"다들 큰 검을 들고 갔지만 나는 곡괭이를 챙겼다. 비늘은 검을 튕겨내니까, 한 점을 뚫어야 한다고 믿었다. 검은 강철 부리에 붉은 비늘 손잡이, 나는 이걸로 비늘 한 장을 정확히 꿰뚫었다. 용을 잡는 건 힘이 아니라 한 점이더라. 그날 이후 나는 늘 그렇게 말한다.","dir":"sprites-test/anim-obj/vs_pick","n":15,"st":"sprites-test/anim-obj/vs_pick/idle.png","slot":"weapon"},{"name":"용을 노려본 투구","lore":"나는 용과 정면으로 눈을 맞춘 유일한 사람이다. 검은 강철에 붉은 용비늘을 덧대고 두 뿔 사이로 잿불이 도는 이 투구를 쓰고서. 불길이 얼굴을 핥는데도 끝내 눈을 감지 않았다. 지금도 두 뿔 사이엔 그날의 열기가 희미하게 남아 있다.","dir":"sprites-test/anim-obj/vs_helm","n":15,"st":"sprites-test/anim-obj/vs_helm/idle.png","slot":"armor"},{"name":"베어 낸 송곳니","lore":"용을 벤 날, 나는 송곳니 하나를 뽑아 목에 걸었다. 밑동을 강철 띠로 감고 붉은 보석과 깃털 한 올을 매달았지. 누가 무용을 물으면 나는 길게 말하지 않는다. 한 마리. 그거면 다들 알아듣는다.","dir":"sprites-test/anim-obj/vs_fang","n":15,"st":"sprites-test/anim-obj/vs_fang/idle.png","slot":"accessory"}],[{"name":"재를 가르는 칼","lore":"화산이 한 번 잠들면 세상은 온통 잿빛이 된다. 검은 흑요석을 휘어 벼린 이 칼이 붉게 달아오르면, 그 빛을 따라 잿더미에 묻혔던 길과 형체가 하나씩 되살아난다. 그자는 무엇을 베러 가는 게 아니라, 무엇이 남았는지 보러 가는 듯했다.","dir":"sprites-test/anim-obj/ve_blade","n":15,"st":"sprites-test/anim-obj/ve_blade/idle.png","slot":"weapon"},{"name":"식지 않는 흉갑","lore":"검은 흑요석 판을 이어 붙인 흉갑이다. 판 사이 갈라진 틈으로 붉은 잿불이 숨 쉰다. 다 식은 줄 알았던 화산처럼, 이 갑옷도 두드리면 속에서 아직 뜨거운 기운이 올라온다.","dir":"sprites-test/anim-obj/ve_plate","n":15,"st":"sprites-test/anim-obj/ve_plate/idle.png","slot":"armor"},{"name":"재가 흐르는 모래시계","lore":"흑요석 모래시계 안에서 잿불이 모래처럼 천천히 흘러내린다. 이걸로 화산이 깨어날 때를 잰다는데, 신기하게도 모래는 줄어들기만 할 뿐 바닥까지 떨어지는 법이 없다. 이 잿불이 다 떨어지는 날엔 화산이 깨어나 큰일이 난다 하여, 사람들은 모래가 줄지 않는 것을 차라리 다행으로 여겼다.","dir":"sprites-test/anim-obj/ve_hourglass","n":15,"st":"sprites-test/anim-obj/ve_hourglass/idle.png","slot":"accessory"}],[{"name":"불에서 난 언월","lore":"용이 스러진 자리에 신전이 섰고, 그 뼈를 깎아 이 언월도를 만들었다. 흑요석 날을 타고 용암이 흐르고, 자루엔 제단의 시 한 줄이 새겨졌다 — '불에서 났으니, 불을 두려워 말라.' 날을 치켜들면 용이 마지막으로 내쉰 숨이 다시 타오르는 듯했다.","dir":"sprites-test/anim-obj/volcano_glaive","n":15,"st":"sprites-test/anim-obj/volcano_glaive/idle.png","slot":"weapon"},{"name":"용골 방패","lore":"산을 통째로 태우던 용도 끝내 한 줌 비늘로 남았다. 가장 두꺼운 등비늘과 갈비뼈를 떼어 지은 이 방패, 검은 면을 따라 용암이 핏줄처럼 흐른다. 이 앞에서는 어떤 불길도 고개를 숙인다. 불을 다스렸던 용의 비늘을, 여전히 불이 알아보기 때문이다.","dir":"sprites-test/anim-obj/volcano_coat","n":15,"st":"sprites-test/anim-obj/volcano_coat/idle.png","slot":"armor"},{"name":"잠들지 않는 용안","lore":"죽어 뼈가 되어도 용의 눈은 감기지 않았다. 금테 속 호박빛 용안이 식지 않는 화로 위에서, 밤이 깊을수록 천천히 깜빡인다. 제가 지키던 산을 끝까지 내려다보려는 듯이. 이 눈이 한 번 깜빡일 때마다, 산속 어딘가의 불씨도 따라 깜빡인다고 한다.","dir":"sprites-test/anim-obj/volcano_dragoneye","n":15,"st":"sprites-test/anim-obj/volcano_dragoneye/idle.png","slot":"accessory"}]]},{"region":"신전","sets":[[{"name":"무지개를 문 지팡이","lore":"성좌의 무녀가 축일에 드는 지팡이다. 백대리석 자루 끝의 수정이 무지개로 타오르면, 무녀는 그 빛을 천장으로 흘려보낸다. 색이 비처럼 쏟아지는 그 순간을 사람들은 수정의 노래라 불렀다. 무녀가 지팡이를 내리면, 노래도 조용히 잠들었다.","dir":"sprites-test/anim-obj/sf_staff","n":15,"st":"sprites-test/anim-obj/sf_staff/idle.png","slot":"weapon"},{"name":"빛으로 짠 예복","lore":"성좌의 무녀가 축일에 입는 예복이다. 흰 비단 위로 금실이 흐르고 가슴과 소매엔 수정이 별처럼 박혔다. 걸음을 옮길 때마다 빛이 잘게 부서져, 멀리서 보면 사람이 아니라 별무리 하나가 천천히 걸어오는 것 같았다.","dir":"sprites-test/anim-obj/sf_dress","n":15,"st":"sprites-test/anim-obj/sf_dress/idle.png","slot":"armor"},{"name":"새벽빛 관","lore":"성좌의 무녀는 이 관을 오직 동이 트기 직전에만 쓴다. 금빛 날개가 떠받친 수정이 첫 햇살을 받으면, 그 위의 옅은 후광이 점점 또렷해지며 신전 안을 천천히 밝힌다. 가장 어두운 새벽을 골라 빛을 불러오는 것이 무녀의 일이라, 사람들은 이 관을 새벽을 여는 열쇠라 불렀다.","dir":"sprites-test/anim-obj/sf_diadem","n":15,"st":"sprites-test/anim-obj/sf_diadem/idle.png","slot":"accessory"}],[{"name":"비추는 은부채","lore":"거울처럼 닦은 은 부채다. 펼치면 살마다 빛이 되비쳐, 마주한 사람이 제 모습을 언뜻 본다. 부채에 비친 얼굴은 늘 조금 일그러져 있었다. 신전 사람들은 그게 숨긴 마음이라 했다.","dir":"sprites-test/anim-obj/tc_blade","n":15,"st":"sprites-test/anim-obj/tc_blade/idle.png","slot":"weapon"},{"name":"되비추는 거울 방패","lore":"거울처럼 닦인 이 방패는 날아오는 것을 그대로 되비춰 돌려보낸다. 은빛 테 안 매끄러운 거울 면이 막아선 적의 얼굴을 비추는데, 내리치려던 자는 제 얼굴을 보고 흠칫 멈춘다고 한다. 칼이 아니라 제 얼굴을 들이미는 방패라, 이 앞에서 싸움은 늘 머쓱하게 멈췄다.","dir":"sprites-test/anim-obj/tc_shawl","n":15,"st":"sprites-test/anim-obj/tc_shawl/idle.png","slot":"armor"},{"name":"거울 너머의 열쇠","lore":"자물쇠도 없이 무엇을 여는 열쇠일까. 손잡이의 작은 거울엔 지금 이곳이 아니라, 이 열쇠가 여는 문 너머의 풍경이 비친다. 대리석과 은으로 깎은 이것은 짝이 되는 거울에 비춰야 열린다는데, 거울 속 그 풍경을 실제로 찾아낸 사람은 아직 없다.","dir":"sprites-test/anim-obj/tc_key","n":15,"st":"sprites-test/anim-obj/tc_key/idle.png","slot":"accessory"}],[{"name":"갈라진 거석의 주먹","lore":"각성 첫째 날. 신전을 지키던 거석은 천 년을 잠들어 있었다. 한 사람이 이 돌주먹을 끼고 제단을 두드리자 잿빛 돌에 금이 가고, 그 틈으로 금빛 불이 새어 나왔다. 쿵, 쿵, 세 번째 울림에 거석이 눈을 떴다. 그날부터 신전은 다시 걷는다.","dir":"sprites-test/anim-obj/tg_fist","n":15,"st":"sprites-test/anim-obj/tg_fist/idle.png","slot":"weapon"},{"name":"안에서 타오르는 갑옷","lore":"각성 셋째 날. 거석과 같은 돌을 깎아 이 갑옷을 지었다. 잿빛 표면의 깊은 균열 안에서 금빛 불이 주인의 맥박에 맞춰 밝아졌다 잦아든다. 이 갑옷을 두른 자는 거석처럼 버텨, 한 발도 물러서지 않았다고 적어 둔다.","dir":"sprites-test/anim-obj/tg_armor","n":15,"st":"sprites-test/anim-obj/tg_armor/idle.png","slot":"armor"},{"name":"잠들지 않는 심장석","lore":"각성 마지막 기록. 거석의 가슴에서 심장석 하나를 떼어 냈다. 잿빛 돌의 금 사이로 금빛이 천천히 들고나는데, 가만히 들여다보면 꼭 숨을 쉬는 것 같다. 이 돌을 품은 자는 좀처럼 지치지 않았다. 거석의 끈기가 옮아온 모양이라고, 마지막 줄에 남긴다.","dir":"sprites-test/anim-obj/tg_stone","n":15,"st":"sprites-test/anim-obj/tg_stone/idle.png","slot":"accessory"}],[{"name":"봄을 겨눈 석궁","lore":"신전 가장 높은 자리에 걸려 있던 석궁이다. 흰 대리석을 깎아 만들고 몸체엔 식지 않는 청록 룬이 흐른다. 개머리판에 새겨진 비문은 단 한 줄 — '겨눈 곳에 봄이 온다.' 서리 신전에서 가장 따뜻한 말이다.","dir":"sprites-test/anim-obj/temple_bow","n":15,"st":"sprites-test/anim-obj/temple_bow/idle.png","slot":"weapon"},{"name":"맑은 서리의 관","lore":"흰 대리석을 깎고 이마에 금테를 두른 투구로, 관자놀이를 따라 청록 룬이 한 줄 흐른다. 신관은 큰 결정을 앞두면 이 투구부터 썼다. 룬이 차게 빛나는 동안에는 분노도 두려움도 서리처럼 가라앉아, 오직 또렷한 판단만 남았기 때문이다.","dir":"sprites-test/anim-obj/temple_helm","n":15,"st":"sprites-test/anim-obj/temple_helm/idle.png","slot":"armor"},{"name":"식지 않는 심장","lore":"제단 한가운데 놓여 있던 보주다. 대리석과 금 틀 안에서 청록 룬이 새겨진 수정구가 천천히 돌며 빛난다. 한겨울 신전의 등불이 모두 얼어붙은 밤에도, 이 수정구의 청록빛만은 홀로 돌며 타올랐다. 사람들은 그래서 이걸 '신전의 심장'이라 불렀다.","dir":"sprites-test/anim-obj/temple_orb","n":15,"st":"sprites-test/anim-obj/temple_orb/idle.png","slot":"accessory"}],[{"name":"묻고 두드리는 장봉","lore":"「길이 어느 쪽입니까.」 노승은 답하지 않고 장봉으로 땅을 한 번 두드렸다. 옥 염주가 사락이고, 울림이 완전히 멎을 때까지 그는 입을 열지 않았다. 「먼저 서두르는 마음부터 가라앉히게. 길은 늘 그다음에야 보이니.」","dir":"sprites-test/anim-obj/temple_monk_staff","n":15,"st":"sprites-test/anim-obj/temple_monk_staff/idle.png","slot":"weapon"},{"name":"한쪽 어깨 띠","lore":"「가진 것이 정말 그뿐입니까.」 「이 천 한 장이면 족하네.」 한쪽 어깨에만 두른 주황 천, 매듭마다 옥 구슬과 작은 부적이 달려 걸음마다 사락인다. 「가진 게 적어야 어디든 갈 수 있거든.」 노승은 그 말을 남기고 또 길을 떠났다.","dir":"sprites-test/anim-obj/temple_monk_sash","n":15,"st":"sprites-test/anim-obj/temple_monk_sash/idle.png","slot":"armor"},{"name":"흔들리는 향로","lore":"「연기가 자꾸 흩어집니다.」 「그럼 무언가 다가온다는 뜻이지.」 사슬에 매단 놋 향로에서 향 연기가 끊임없이 피어오른다. 곧게 오르면 마음이 고요하고, 흩어지면 기척이 가깝다. 노승은 말없이 연기만 보고도 둘레의 모든 것을 읽었다.","dir":"sprites-test/anim-obj/temple_monk_censer","n":15,"st":"sprites-test/anim-obj/temple_monk_censer/idle.png","slot":"accessory"}],[{"name":"기적인 척 지팡이","lore":"이 지팡이를 번쩍 들고 '빛을 보아라!' 외치면 사람들이 일단 엎드린다. 사실 끝에 달린 금별은 어젯밤 닦아 광낸 거고, 방울은 시장에서 떨이로 샀다. 그래도 약발은 잘 들어서, 자칭 성자는 오늘도 헛기침 한 번 하고 지팡이부터 치켜든다. '기적은 자세가 반이니라.'","dir":"sprites-test/anim-obj/tw_staff","n":15,"st":"sprites-test/anim-obj/tw_staff/idle.png","slot":"weapon"},{"name":"자칭 훈장 사제복","lore":"받은 적 없는 훈장을 직접 만들어 잔뜩 달았다. 흰 사제복 위에 금메달과 배지가 빼곡해 걸을 때마다 절그럭댄다. 누가 무슨 공로냐 물으면 '다 기적이지'라며 얼버무린다. 무거워서 오래 못 서 있는 게 유일한 단점.","dir":"sprites-test/anim-obj/tw_robe","n":15,"st":"sprites-test/anim-obj/tw_robe/idle.png","slot":"armor"},{"name":"철사로 띄운 후광","lore":"머리 위에 후광이 떠 있어야 성자처럼 보인다기에, 가는 철사로 금테를 띄웠다. 살짝 비뚤어졌지만 멀리서 보면 그럴듯하다. 바람이 불면 흔들리는데, 자칭 성자는 그걸 '하늘의 응답'이라 우긴다.","dir":"sprites-test/anim-obj/tw_halo","n":15,"st":"sprites-test/anim-obj/tw_halo/idle.png","slot":"accessory"}]]},{"region":"타락천사","sets":[[{"name":"나비 레이피어","lore":"손잡이에 무지갯빛 나비 날개가 달린 가는 검이다. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 피어난다. 이 검에 스친 자는 상처보다 먼저, 눈앞에 흩날리는 빛가루에 정신을 빼앗긴다고 한다.","dir":"sprites-test/anim-obj/angel_papillon_rapier","n":15,"st":"sprites-test/anim-obj/angel_papillon_rapier/idle.png","slot":"weapon"},{"name":"나비 드레스","lore":"무지갯빛 나비 날개를 통째로 두른 듯한 흰 드레스다. 한 발짝 옮길 때마다 수백 장의 날개가 함께 숨 쉬듯 색을 바꾼다. 이 드레스를 입은 천사는 군중 속에서도 늘 혼자 빛나, 누구도 그 곁에 다가설 엄두를 내지 못했다.","dir":"sprites-test/anim-obj/angel_papillon_gown","n":15,"st":"sprites-test/anim-obj/angel_papillon_gown/idle.png","slot":"armor"},{"name":"나비 떼 브로치","lore":"수십 마리 나비가 금테 안에 내려앉아 파스텔빛으로 함께 빛나는 브로치다. 가슴에 달면 나비들이 주인의 숨결에 맞춰 날개를 여닫는다. 마음이 설레면 빠르게, 가라앉으면 천천히. 천사의 기분을 가장 먼저 들키는 물건이다.","dir":"sprites-test/anim-obj/angel_papillon_brooch","n":15,"st":"sprites-test/anim-obj/angel_papillon_brooch/idle.png","slot":"accessory"}],[{"name":"노을이 앉는 검","lore":"해가 가장 낮게 걸리는 시간, 이 검은 제일 아름답다. 황금 날개가 손잡이를 감싸고 칼날엔 황혼빛이 흐른다. 검은 깃 하나가 바람에 흔들릴 때마다, 노을이 칼끝에 한 번씩 내려앉는다. 황혼의 날개가 검을 들면 하늘이 잠깐 숨을 멈춘다.","dir":"sprites-test/anim-obj/angel_sword","n":15,"st":"sprites-test/anim-obj/angel_sword/idle.png","slot":"weapon"},{"name":"저무는 해의 날개","lore":"황혼의 날개가 가장 화려한 순간은 두 날개를 활짝 펼칠 때다. 금빛 갑옷 위로 검은 깃이 부채처럼 퍼지고, 머리 위 옅은 후광이 노을빛으로 물든다. 멀리서 보면 갑옷이 아니라 저무는 해 그 자체 같았다.","dir":"sprites-test/anim-obj/angel_armor","n":15,"st":"sprites-test/anim-obj/angel_armor/idle.png","slot":"armor"},{"name":"황혼을 담은 호박","lore":"황혼을 한 조각 떼어 가둔 듯한 호박빛 보석이다. 금빛 날개가 보석을 감싸고 검은 깃 하나가 아래로 길게 드리운다. 해가 완전히 저물면 보석 속 노을도 함께 잠드는데, 이튿날 새벽 다시 켜질 때까지 천사는 그 곁을 떠나지 않았다.","dir":"sprites-test/anim-obj/angel_amulet","n":15,"st":"sprites-test/anim-obj/angel_amulet/idle.png","slot":"accessory"}],[{"name":"자비의 가는 검","lore":"베기보다 막기를 택한 그대에게 이 검을 바칩니다. 흰 검신에 장미빛 깃이 돋고 손잡이 위로 옅은 분홍 후광이 돕니다. 자비에도 칼이 필요하다는 것을, 그대는 누구보다 일찍 알았지요. 이 검은 누구를 베기 위해서가 아니라, 그대가 지키려는 것을 위해 존재합니다.","dir":"sprites-test/anim-obj/angel_rose_rapier","n":15,"st":"sprites-test/anim-obj/angel_rose_rapier/idle.png","slot":"weapon"},{"name":"장미 날개 갑옷","lore":"분노가 아니라 연민으로 빛나는 그대를 위해 이 갑옷을 만들었습니다. 백금 갑옷 위로 장미빛 날개가 활짝 펴지고, 머리 위 분홍 후광이 은은히 탑니다. 그대가 날개를 펼치면 칼을 겨누던 자조차 슬그머니 손을 내렸습니다. 그것이 그대의 가장 큰 무기였습니다.","dir":"sprites-test/anim-obj/angel_rose_armor","n":15,"st":"sprites-test/anim-obj/angel_rose_armor/idle.png","slot":"armor"},{"name":"지지 않는 장미 후광","lore":"마지막으로 이 후광을 그대에게 전합니다. 누군가를 지키려 제 빛을 나눠 줄수록 점점 흐려지는 고리이니, 가장 흐려졌을 때가 실은 가장 많이 베푼 때입니다. 그러니 너무 흐려지기 전에, 부디 그대 자신을 위한 빛도 조금은 남겨 두세요. 그대의 빛이 다 꺼지는 것은, 누구도 바라지 않습니다.","dir":"sprites-test/anim-obj/angel_rose_halo","n":15,"st":"sprites-test/anim-obj/angel_rose_halo/idle.png","slot":"accessory"}],[{"name":"네가 던진 빛","lore":"너는 한 번 떨어졌다. 그리고 다시 일어나 이 빛의 고리를 던졌다. 흑백 깃털이 가장자리를 두르고 가운데로 옅은 후광이 돈다. 던진 것이 제 손으로 돌아오듯, 한 번 추락한 자만이 돌아오는 법을 안다. 이건 그런 자에게만 허락된 무기다.","dir":"sprites-test/anim-obj/af_chakram","n":15,"st":"sprites-test/anim-obj/af_chakram/idle.png","slot":"weapon"},{"name":"부러진 적 있는 날개","lore":"이 망토는 펼치면 한 쌍의 큰 날개가 된다. 잿빛과 흰빛 깃이 켜켜이 겹쳐 누구보다 넓게 퍼진다. 한 번 꺾였던 깃이라는데, 너는 이제 안다. 부러져 본 날개라야 가장 멀리 난다는 것을. 그 말을 제 몸으로 증명할 수 있는 건 너뿐이다.","dir":"sprites-test/anim-obj/af_mantle","n":15,"st":"sprites-test/anim-obj/af_mantle/idle.png","slot":"armor"},{"name":"되찾은 후광","lore":"너는 잃었던 후광을 작은 고리에 담아 가슴에 단추처럼 달았다. 한때 머리 위에서 빛나던 것이 이제 심장 곁에서 함께 뛴다. 완벽하진 않아도 그건 분명히 네 것이다. 높이 떠 있던 그때보다, 가장 가까이 둔 지금이 더 환하다.","dir":"sprites-test/anim-obj/af_brooch","n":15,"st":"sprites-test/anim-obj/af_brooch/idle.png","slot":"accessory"}],[{"name":"두근 화살","lore":"「또 누구 맞히려고 그래.」 「쉿, 지금 고르는 중이잖아.」 구름 위에서 제일 인기 많은 금빛 하트 활. 화살을 맞으면 옆에 있던 사람이 갑자기 좋아 보인다나. 꼬마 천사는 오늘도 구름 뒤에 숨어, 누굴 맞힐지 신중하게 시위를 당긴다.","dir":"sprites-test/anim-obj/aw_bow","n":15,"st":"sprites-test/anim-obj/aw_bow/idle.png","slot":"weapon"},{"name":"구름 갑옷","lore":"「그게 진짜 갑옷이라고?」 「이래 봬도 화살 하나 안 통한다니까.」 구름을 뭉쳐 만든 꼬마 천사의 갑옷, 가슴 한가운데 금빛 날개 돋친 별이 콕 박혔다. 폭신해 보인다고 놀리면, 본인은 더 잔뜩 으쓱대며 가슴을 편다.","dir":"sprites-test/anim-obj/aw_armor","n":15,"st":"sprites-test/anim-obj/aw_armor/idle.png","slot":"armor"},{"name":"구름 두른 금 후광","lore":"「그 후광, 너한테 좀 큰 거 아니야?」 「이쯤은 돼야 천사답지!」 제 머리보다 큰 황금 후광을 구름에 받쳐 두르고 다니는 꼬마 천사. 날개 장식까지 달린 게 영 격에 안 맞지만, 본인만 모른다. 구름 위에선 다들 저게 곧 한쪽으로 기울 거라고 내기를 건다.","dir":"sprites-test/anim-obj/aw_halo","n":15,"st":"sprites-test/anim-obj/aw_halo/idle.png","slot":"accessory"}],[{"name":"빛바랜 맹세","lore":"오래된 천사상이 들고 있던 창이다. 날개 모양 도끼날에 색이 바랜 금 후광이 걸렸다. 자루엔 닳아 희미해진 비문 한 줄이 남았다. ‘빛이 옅어져도, 약속은 옅어지지 않는다.’","dir":"sprites-test/anim-obj/av_halberd","n":15,"st":"sprites-test/anim-obj/av_halberd/idle.png","slot":"weapon"},{"name":"사슬과 한쪽 날개","lore":"부서진 사슬을 어깨에 두르고, 한쪽엔 잿빛으로 바랜 날개만 남았다. 다 꺼지기 전 마지막 한 줌의 빛을 사슬 끝에 매달고, 그는 외길을 걷는다. 한쪽 날개로는 날 수 없어도, 끝까지 가는 법만은 잊지 않았다.","dir":"sprites-test/anim-obj/angel_penitent_drape","n":15,"st":"sprites-test/anim-obj/angel_penitent_drape/idle.png","slot":"armor"},{"name":"마지막 빛고리","lore":"천사가 마지막으로 남긴 빛 한 조각을 금 고리에 박아 넣었다. 이 반지를 낀 사람은 그 빛을 다 쓰기 전에 다음 사람에게 물려줘야 한다. 그렇게 천사의 빛은 한곳에 머물지 않고 손에서 손으로 이어졌다.","dir":"sprites-test/anim-obj/av_ring","n":15,"st":"sprites-test/anim-obj/av_ring/idle.png","slot":"accessory"}]]},{"region":"오크 부락","sets":[[{"name":"돌아오는 뼈","lore":"짐승 뼈를 깎아 만든 부메랑이다. 던지면 사냥감을 맞히고 제 손으로 돌아온다 — “안 돌아오면 그게 어디 부메랑이냐”는 게 사냥꾼 지론. 청록 깃이 도는 소리로 적은 뒤늦게 안다, 이미 늦었다는 걸.","dir":"sprites-test/anim-obj/orc_hunter_boomerang","n":15,"st":"sprites-test/anim-obj/orc_hunter_boomerang/idle.png","slot":"weapon"},{"name":"소리 없는 가죽 부츠","lore":"짐승 가죽과 털을 덧대 지은 사냥용 부츠다. 밑창에 이끼를 깔아 진창에서도 발소리 하나 새지 않는다. 사냥꾼들 사이엔 이런 말이 있다. “좋은 사냥꾼은 흔적을 남기지 않고, 더 좋은 사냥꾼은 흔적을 읽는다.”","dir":"sprites-test/anim-obj/orc_hunter_boots","n":15,"st":"sprites-test/anim-obj/orc_hunter_boots/idle.png","slot":"armor"},{"name":"엄니 귀고리","lore":"잡은 짐승의 가장 큰 엄니를 깎아 귀에 걸었다. 청록 깃과 뼈 구슬을 함께 엮었는데, 더 큰 짐승의 엄니를 구할 때마다 바꿔 달았다. 귀가 무거워질수록 그의 이름도 부족에서 무거워졌다.","dir":"sprites-test/anim-obj/orc_hunter_earring","n":15,"st":"sprites-test/anim-obj/orc_hunter_earring/idle.png","slot":"accessory"}],[{"name":"묻지 않는 지팡이","lore":"답을 모를 땐 누구에게 묻는가. 노인은 사람 대신 바람에게 묻는다. 뼈와 깃털, 마른 약초를 매단 이 지팡이를 바람결에 맡기고, 사락이는 소리에 오래 귀를 기울인다. 서두른 입보다 먼저 바람이 길을 일러 준다고, 그는 믿었다.","dir":"sprites-test/anim-obj/os_staff","n":15,"st":"sprites-test/anim-obj/os_staff/idle.png","slot":"weapon"},{"name":"깃털 두른 침묵","lore":"이 옷을 입은 자에게는 왜 아무도 먼저 말을 걸지 않는가. 수십 마리 새의 깃털과 가죽을 기워 만든 샤먼의 옷, 뼈 장식이 걸음마다 달그락인다. 그가 스스로 입을 열 때까지 기다리는 것이 부족의 오랜 금기다. 침묵도 그에겐 하나의 말이기 때문이다.","dir":"sprites-test/anim-obj/os_robe","n":15,"st":"sprites-test/anim-obj/os_robe/idle.png","slot":"armor"},{"name":"조상의 깃발","lore":"샤먼이 이 깃발을 땅에 꽂으면, 그날 밤 부족의 죽은 이들이 찾아온다고 한다. 낡은 가죽에 매단 깃털과 구슬이 바람 한 점 없는데도 흔들리는 밤이면, 노인은 아무도 없는 깃발 앞에 앉아 오래 이야기를 나눴다. 무엇을 들었는지는 끝내 말하지 않았지만, 이튿날 그의 결정은 한 번도 틀린 적이 없었다.","dir":"sprites-test/anim-obj/os_banner","n":15,"st":"sprites-test/anim-obj/os_banner/idle.png","slot":"accessory"}],[{"name":"조상이 쥔 자루","lore":"마울 머리에 부족을 세운 조상의 얼굴이 큼지막이 새겨졌다. 엄니를 드러낸 그 얼굴 아래로 깃과 구슬이 매달려 흔들린다. 큰 싸움을 앞두면 전사들은 이 얼굴에 이마를 맞대고 이름을 부른다. 그러면 조상이 한 번 더 팔에 힘을 보탠다고 믿었다.","dir":"sprites-test/anim-obj/oa_maul","n":15,"st":"sprites-test/anim-obj/oa_maul/idle.png","slot":"weapon"},{"name":"조상의 얼굴","lore":"축제와 전쟁, 두 날에만 꺼내는 가면이다. 흰 뼈에 붉은 칠로 조상의 얼굴을 새기고 양옆에 깃털을 늘어뜨렸다. 이 가면을 쓴 자는 제 이름 대신 조상의 이름으로 불린다.","dir":"sprites-test/anim-obj/oa_mask","n":15,"st":"sprites-test/anim-obj/oa_mask/idle.png","slot":"armor"},{"name":"손목에 감은 조상","lore":"먼 길을 떠나는 전사는 이 뼈 팔찌를 손목에 감는다. 조상의 얼굴을 새긴 뼈 구슬 사이로 작은 어금니가 달그락거린다. 외로운 밤, 손목을 쥐고 있으면 부족 전체가 등 뒤에 선 것 같았다.","dir":"sprites-test/anim-obj/oa_bracelet","n":15,"st":"sprites-test/anim-obj/oa_bracelet/idle.png","slot":"accessory"}],[{"name":"산을 쪼갠 날","lore":"들어봐, 무쇠엄니 도끼 이야기다. 붉게 칠한 쇳날에 뼈와 쇠사슬을 감은 자루, 이놈을 머리 위로 치켜들면 적들이 먼저 뒷걸음질을 쳤지. 바위? 한 방에 둘로 쪼갰어. 산도 슬그머니 길을 비켰다니까. 못 믿겠다는 그 얼굴, 그럼 네가 직접 한 번 들어보든가.","dir":"sprites-test/anim-obj/orc_axe","n":15,"st":"sprites-test/anim-obj/orc_axe/idle.png","slot":"weapon"},{"name":"한 발도 안 밀린 방패","lore":"이 방패 뒤에서 나는 단 한 발도 물러서지 않았다. 뼈로 테를 두르고 붉은 무늬를 그린 이놈 앞에선, 적이 산처럼 밀려와도 소용없었지. 그날 살아 돌아간 놈들이 죄다 누구 뒤에 숨어 있었는 줄 아나? 다 이 뒤다. 겁나면 너도 이쪽으로 와.","dir":"sprites-test/anim-obj/orc_shield","n":15,"st":"sprites-test/anim-obj/orc_shield/idle.png","slot":"armor"},{"name":"엄니에 새긴 무용담","lore":"엄니 하나가 이긴 싸움 하나야. 내 목에 엄니가 몇 개였냐고? 세다가 그냥 포기했지. 쇠구슬에 붉은 끈, 걸을 때마다 절그럭절그럭 그 소리만 나도 애송이들은 줄행랑을 쳤어. 이게 다 내 무용담이다. 한 알 한 알이 다 이야기라고.","dir":"sprites-test/anim-obj/orc_necklace","n":15,"st":"sprites-test/anim-obj/orc_necklace/idle.png","slot":"accessory"}],[{"name":"두드리는 북채","lore":"「그거 무기 아니라 북채잖아.」 「근데 적도 아주 잘 두들겨지던데?」 뼈와 나무로 만든 큼지막한 북채 마울. 원래는 전쟁북을 치던 물건인데, 어쩌다 보니 전장에서 더 잘 들더란다. 부족 악사가 늘 하는 말이 있다. 박자만 맞으면 그게 다 음악이라고.","dir":"sprites-test/anim-obj/orc_drum_maul","n":15,"st":"sprites-test/anim-obj/orc_drum_maul/idle.png","slot":"weapon"},{"name":"북이 된 방패","lore":"「막다가 노래 한 곡 나오겠는데.」 「그게 바로 우리 방식이지.」 가죽을 팽팽히 멘 전쟁북을 그대로 방패로 쓴다. 적의 일격을 막을 때마다 둥, 하고 깊은 소리가 울린다. 막는 것이 곧 북을 치는 일이라, 이 부족은 싸우는 내내 노래를 멈추는 법이 없었다.","dir":"sprites-test/anim-obj/orc_drum_shield","n":15,"st":"sprites-test/anim-obj/orc_drum_shield/idle.png","slot":"armor"},{"name":"한 잔의 보람","lore":"「오늘은 좀 두들겼나?」 「오늘도 잘 두들겼지.」 하루 일이 끝나면 영감은 이 찌그러진 무쇠 잔부터 가득 채운다. 잔 한가운데엔 제 얼굴을 닮은 오크가 새겨져 있는데, 멋있으라고 직접 새겼단다. 한 모금 들이켜고 나오는 말은, 늘 똑같다.","dir":"sprites-test/anim-obj/ow_tankard","n":15,"st":"sprites-test/anim-obj/ow_tankard/idle.png","slot":"accessory"}],[{"name":"천둥을 문 도끼","lore":"폭풍 부족 이야기 한번 들어볼 텐가. 뼈로 깎은 짐승 머리 아래 청동 날, 휘두르면 날을 따라 푸른 번개가 우지끈 인다고 한다. 천둥이 도끼를 따라오는 건지 도끼가 천둥을 부르는 건지는, 글쎄. 맞아 본 놈만 알 텐데 아무도 말이 없더라.","dir":"sprites-test/anim-obj/orc_thunder_axe","n":15,"st":"sprites-test/anim-obj/orc_thunder_axe/idle.png","slot":"weapon"},{"name":"벼락 맞고도 선 가슴","lore":"벼락을 정통으로 맞고도 안 쓰러진 전사가 있었다는 말이 전해진다. 청동 판에 새긴 무늬를 따라 푸른 번개가 지금도 타닥타닥 돈다. 한 번 벼락을 먹고 버틴 가슴은, 그다음부턴 어떤 천둥소리에도 눈 하나 깜짝 안 한다나. 믿거나 말거나.","dir":"sprites-test/anim-obj/orc_thunder_chest","n":15,"st":"sprites-test/anim-obj/orc_thunder_chest/idle.png","slot":"armor"},{"name":"폭풍을 가둔 부적","lore":"폭풍 부족 족장이 처음으로 잡은 번개를 보석에 가뒀다는 이야기가 있다. 뼈와 청동 사이에서 푸른 빛이 타닥 튈 때마다, 먼 하늘이 낮게 우르릉 답한다. 이 부적이 우는 날이면 큰비가 온다는 걸 알고, 부족은 미리 가죽을 거둬들였다.","dir":"sprites-test/anim-obj/orc_thunder_charm","n":15,"st":"sprites-test/anim-obj/orc_thunder_charm/idle.png","slot":"accessory"}]]}];
const SLOT={"weapon":"무기","armor":"방어구","accessory":"장신구"};
const nav=document.getElementById('nav'); const app=document.getElementById('app');
const sprites=[];
DATA.forEach((reg,ri)=>{
  const id='r'+ri;
  const a=document.createElement('a'); a.href='#'+id; a.textContent=reg.region; nav.appendChild(a);
  const h=document.createElement('h2'); h.className='reg'; h.id=id;
  h.innerHTML=reg.region+'<span class="rc">'+reg.sets.flat().length+'종</span>'; app.appendChild(h);
  reg.sets.forEach((items,si)=>{
    const sd=document.createElement('div'); sd.className='set';
    const sh=document.createElement('div'); sh.className='sh'; sh.textContent='세트 '+(si+1); sd.appendChild(sh);
    const g=document.createElement('div'); g.className='grid';
    items.forEach(it=>{
      const hasAnim=!!it.dir; const src=hasAnim?it.dir+'/0.png':it.st;
      const c=document.createElement('div'); c.className='card';
      c.innerHTML='<div class="stage"><span class="slot '+it.slot+'">'+(SLOT[it.slot]||'')+'</span>'+
        '<img alt="'+it.name+'" src="'+src+'" '+(hasAnim?'data-dir="'+it.dir+'" data-n="'+it.n+'" data-static="'+it.st+'"':'')+'></div>'+
        '<div class="meta"><div class="nm">'+it.name+'</div><div class="lore">'+it.lore+'</div></div>';
      g.appendChild(c);
      const img=c.querySelector('img');
      if(hasAnim){img._dir=it.dir;img._n=it.n;img._i=0;img._play=false;sprites.push(img);}
    });
    sd.appendChild(g); app.appendChild(sd);
  });
});
// 인뷰 애니만 재생(모바일 성능)
let anim=true;
const io=new IntersectionObserver((es)=>{es.forEach(e=>{e.target._play=anim&&e.isIntersecting;});},{rootMargin:'120px'});
sprites.forEach(s=>io.observe(s));
let last=0;
function tick(t){if(t-last>=120){last=t;for(const s of sprites){if(s._play){s._i=(s._i+1)%s._n;s.src=s._dir+'/'+s._i+'.png';}}}requestAnimationFrame(tick);}
requestAnimationFrame(tick);
// 정적/애니 토글
const tg=document.createElement('span'); tg.className='tg'; tg.textContent='⏸ 정적 보기';
nav.appendChild(tg);
tg.onclick=()=>{anim=!anim;tg.textContent=anim?'⏸ 정적 보기':'▶ 애니 재생';
  sprites.forEach(s=>{if(!anim){s.src=s.dataset.static;s._play=false;}else{s._play=true;}});};
</script>
</body></html>
