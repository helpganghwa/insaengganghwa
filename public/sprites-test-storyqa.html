<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>스토리 개선 비교·리뷰</title><style>
:root{color-scheme:dark}*{box-sizing:border-box}
body{margin:0;padding:16px 14px 80px;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;background:#0c0d12;color:#e7e7ea;max-width:1000px;margin-inline:auto}
h1{font-size:19px;margin:0 0 2px}.sub{font-size:12px;color:#9a9aa6;margin:0 0 12px}
.tool{position:sticky;top:0;z-index:10;background:#0c0d12;padding:8px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #1c1d24;margin-bottom:10px}
.tool button{font:inherit;font-size:12px;font-weight:700;border:1px solid #2a2b34;border-radius:8px;padding:6px 10px;background:#14151c;color:#c9cad3;cursor:pointer}
.tool .ct{font-size:12px;color:#c9a24a;font-weight:700}
textarea#out{width:100%;height:0;opacity:0;font:11px ui-monospace,monospace;background:#0c0d12;color:#cfeacc;border:0;padding:0;border-radius:8px}
textarea#out.show{height:220px;opacity:1;padding:8px;border:1px solid #2a2b34;margin-bottom:8px}
h2{font-size:16px;color:#c9a24a;font-weight:800;margin:22px 0 8px;border-bottom:1px solid #23242c;padding-bottom:5px}
.card{display:grid;grid-template-columns:120px 1fr;gap:10px;border:1px solid #23242c;border-radius:12px;background:#0f1017;padding:10px;margin-bottom:10px}
@media(max-width:640px){.card{grid-template-columns:1fr}}
.shot{width:112px;height:112px;image-rendering:pixelated;object-fit:contain;background-image:linear-gradient(45deg,#23242c 25%,transparent 25%),linear-gradient(-45deg,#23242c 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#23242c 75%),linear-gradient(-45deg,transparent 75%,#23242c 75%);background-size:14px 14px;background-position:0 0,0 7px,7px -7px,-7px 0;border-radius:8px}
.nm{font-size:14px;font-weight:800;color:#fff}.nm .sl{font-size:9px;color:#6c6d78;font-weight:600;margin-left:4px}
.mode{font-size:9px;font-weight:800;background:#241a36;color:#c8a8e8;border-radius:5px;padding:1px 6px;margin-left:6px}
.box{border:1px solid #1c1d24;border-radius:8px;padding:7px;margin-top:6px;font-size:12px;line-height:1.6;white-space:pre-line}
.box .lb{font-size:9px;font-weight:800;border-radius:4px;padding:1px 5px;margin-right:5px}
.box.old{color:#bcbdc7}.box.old .lb{background:#3a2a12;color:#e8c878}
.box.neo{color:#dfe7df}.box.neo .lb{background:#16361f;color:#7ee0a0}
.ch{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:7px}
.ch label{font-size:11px;font-weight:700;border:1px solid #2a2b34;border-radius:6px;padding:6px 8px;cursor:pointer;color:#c9cad3;display:flex;gap:5px;align-items:center}
.ch label.on{background:#d4a017;color:#1a1300;border-color:#d4a017}
.ch input{display:none}
.note{width:100%;box-sizing:border-box;margin-top:6px;font:inherit;font-size:11px;border:1px solid #2a2b34;border-radius:6px;background:#0c0d12;color:#cfd8e8;padding:5px;resize:vertical;height:0;opacity:0;overflow:hidden}
.note.show{height:auto;min-height:34px;opacity:1}
</style></head><body>
<h1>스토리 개선 비교·리뷰 (108종)</h1>
<p class="sub">세트마다 서술 방식을 다르게 다시 썼습니다. 이전↔개선을 비교하고 4가지 중 하나를 고르세요. (개선 선택 시 사유 입력칸이 열립니다)</p>
<div class="tool"><span class="ct" id="ct"></span><button id="copy">📋 결정 복사</button><button id="clr">초기화</button></div>
<textarea id="out" readonly></textarea><div id="app"></div>
<script>
const DATA=[{"key":"kingdom_masque_saber","name":"무도회의 한 수","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/kingdom_masque_saber","n":15,"st":"sprites-test/anim-obj/kingdom_masque_saber/idle.png","mode":"1인칭 독백","old":"와인빛 리본을 묶은 가는 금 세이버다. 무도회에선 칼을 빼지 않는 게 예의지만, 이 검을 찬 자가 리본을 풀면 춤은 곧 결투가 됐다. 우아함과 위협은 늘 같은 손끝에 있다.","neo":"리본을 풀기 전까진 나도 그저 춤추는 손님이다. 와인빛 끈을 풀어 이 가는 검을 드러내는 순간, 무도회는 결투가 되지. 오늘 밤엔 나를 화나게 하지 않는 편이 좋을 거야."},{"key":"kingdom_masque_gown","name":"이름 없는 드레스","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/kingdom_masque_gown","n":15,"st":"sprites-test/anim-obj/kingdom_masque_gown/idle.png","mode":"1인칭 독백","old":"검정 비단에 금실과 와인빛 단을 겹겹이 두른 무도회 드레스다. 이 드레스를 입는 밤이면 그녀는 자신을 옷장에 두고 온다 — 가면무도회에서 가장 화려한 드레스는, 가장 화려한 비밀을 두르는 법이니까.","neo":"이 검정 드레스를 입는 밤이면 나는 나를 옷장에 두고 온다. 금실과 와인빛 단 속에 남는 건 이름도 얼굴도 없는 누군가. 가장 화려한 드레스는 가장 화려한 비밀을 두르는 법이니까."},{"key":"kingdom_masque_mask","name":"이름을 가린 가면","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/kingdom_masque_mask","n":15,"st":"sprites-test/anim-obj/kingdom_masque_mask/idle.png","mode":"1인칭 독백","old":"금 세공 위로 와인빛 깃이 솟은 가면이다. 쓰면 신분도 죄도 하룻밤 가려진다. 무도회가 끝나고 가면을 벗는 순간이 오면 두려움이 몰려온다 — 가면 뒤의 얼굴을 다시 마주해야 하니까.","neo":"이 가면을 쓰면 하룻밤 신분도 죄도 가려진다. 나는 이 얼굴 뒤에서 무엇이든 될 수 있어. 다만 무도회가 끝나고 가면을 벗을 그 순간만은, 나도 조금 두렵다."},{"key":"kingdom_regalia_spear","name":"행렬의 창","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/kingdom_spear","n":15,"st":"sprites-test/anim-obj/kingdom_spear/idle.png","mode":"편지·전언","old":"대관식 행렬 맨 앞에 이 창이 선다. 금빛 자루에 사자 문장, 푸른 보석이 햇빛을 받아 길 위에 파란 점을 흩뿌린다. 창이 지나가면 사람들은 노래를 한 소절씩 보탰다 — '왕이 오신다, 금빛으로 오신다.'","neo":"친애하는 그대에게. 대관 행렬의 맨 앞, 사자 문장을 새긴 이 금빛 창이 지나거든 길을 비키고 노래를 한 소절 보태 주오. 창끝의 푸른 보석이 길 위에 파란 별을 흩뿌릴 것이오."},{"key":"kingdom_regalia_cloak","name":"별을 두른 망토","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/kingdom_cloak","n":15,"st":"sprites-test/anim-obj/kingdom_cloak/idle.png","mode":"편지·전언","old":"연회의 주인공은 늘 이 망토를 두른다. 로열블루 벨벳에 금실이 강처럼 흐르고 보석이 별처럼 박혔다. 펼치면 밤하늘을 통째로 걸친 듯해서, 사람들은 춤추다 말고 한참을 올려다봤다.","neo":"오늘 밤 연회의 주인공께 이 망토를 보냅니다. 로열블루 벨벳에 금실이 강처럼 흐르고 보석이 별처럼 박혔으니, 펼치는 순간 밤하늘을 통째로 두른 듯 보이실 겁니다."},{"key":"kingdom_regalia_crown","name":"별이 박힌 왕관","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/kingdom_crown","n":15,"st":"sprites-test/anim-obj/kingdom_crown/idle.png","mode":"편지·전언","old":"연회가 절정에 이르면 이 왕관이 등장한다. 금테에 푸른 보석과 작은 별들이 촘촘히 박혀 촛불 아래서 가장 환하게 빛난다. 이 왕관이 머리에 얹히는 순간, 노래의 마지막 소절이 터진다.","neo":"마지막으로 이 왕관을 전합니다. 금테에 푸른 보석과 잔별이 촘촘하여 촛불 아래 가장 환할 것입니다. 이 관이 머리에 얹히거든, 부디 노래의 마지막 소절을 터뜨려 주십시오."},{"key":"kingdom_coronation_mace","name":"왕을 짊어진 대검","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/kc_mace","n":15,"st":"sprites-test/anim-obj/kc_mace/idle.png","mode":"포고문","old":"두 손으로 겨우 드는 거대한 대검이다. 금과 로열블루로 치장하고 손잡이 끝엔 사자가 포효하며, 칼몸을 따라 보석이 줄지어 박혔다. 새 왕은 즉위식에서 이 검을 머리 위로 들어 올려야 한다. 왕좌의 무게를 감당할 수 있음을 보이는 것이다.","neo":"왕국에 고하노라. 새 왕은 즉위식에서 이 거대한 대검을 두 손으로 머리 위에 들어 올려야 한다. 금과 로열블루로 치장한 이 검을 든 자만이 왕좌의 무게를 감당할 자격이 있다."},{"key":"kingdom_coronation_gauntlets","name":"맹세를 쥔 손","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/kc_gaunt","n":15,"st":"sprites-test/anim-obj/kc_gaunt/idle.png","mode":"포고문","old":"왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡으며 즉위한다. 왼 손등엔 사자가 으르렁대고, 오른 손등엔 또 다른 왕가의 문장이 새겨졌다. 푸른 법랑이 손가락 마디마다 감겨 쥔 손을 쉬이 놓지 못하게 한다. 그렇게 한 번 맞잡은 맹세를 무른 왕은 없었다.","neo":"들으라. 왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡아 즉위한다. 양 손등의 두 왕가 문장이 맞닿는 순간 맹세는 성립되며, 한 번 맞잡은 맹세를 무른 왕은 일찍이 없었다."},{"key":"kingdom_coronation_medallion","name":"사자의 증표","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/kc_medallion","n":15,"st":"sprites-test/anim-obj/kc_medallion/idle.png","mode":"포고문","old":"대관식이 끝나면 새 왕의 목에 이 메달이 걸린다. 금빛 원판 한가운데 사자가 포효하고, 그 위로 푸른 사파이어가 별처럼 박혔다. 왕이 숨을 쉴 때마다 사자도 가슴 위에서 함께 들썩인다 — '왕관은 머리에, 약속은 가슴에.'","neo":"대관식의 끝을 선포한다. 새 왕의 목에 사자가 포효하는 이 금 메달을 건다. 왕관은 머리에, 약속은 가슴에. 사자가 가슴에서 함께 숨 쉬는 한 그 약속은 유효하다."},{"key":"kingdom_riddle_rapier","name":"풀리지 않는 질문","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/kr_rapier","n":15,"st":"sprites-test/anim-obj/kr_rapier/idle.png","mode":"문답·수수께끼","old":"묻는다. 답이 없는 질문도 칼이 될 수 있는가. 성탑 꼭대기에 걸린 이 물음에 누군가는 은빛 레이피어 한 자루로 답을 대신했다. 사파이어 손잡이, 칼몸을 타고 흐르는 한 줄 빛. 찌른다. 빛이 한 번 깜빡인다. 그러나 답은 깜빡이지 않는다. 질문은 여전히 그 자리에 걸려 있고, 닳는 것은 검뿐이다.","neo":"묻는다. 답 없는 질문도 칼이 될 수 있는가. 성탑의 검사는 이 은빛 레이피어로 답을 대신했다. 찌르면 칼몸의 빛이 한 번 깜빡이고, 답은 끝내 깜빡이지 않는다. 닳는 것은 검뿐이다."},{"key":"kingdom_riddle_coat","name":"별을 읽는 외투","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/kr_coat","n":15,"st":"sprites-test/anim-obj/kr_coat/idle.png","mode":"문답·수수께끼","old":"깊은 청색 천에 금실로 해와 달, 별자리를 수놓은 외투다. 후드를 쓰면 얼굴이 그늘에 잠긴다. 성탑의 현자들은 이 옷을 입고 밤하늘을 읽었고, 별 하나가 자리를 옮길 때마다 외투 자락에 그 밤의 답을 한 줄씩 적어 두었다.","neo":"묻는다. 밤하늘을 옷으로 입을 수 있는가. 깊은 청색 천에 금실로 해와 달과 별자리를 수놓은 이 외투가 그 답이다. 별 하나가 자리를 옮길 때마다 자락엔 그 밤의 답이 한 줄씩 적혔다."},{"key":"kingdom_riddle_astrolabe","name":"대답하지 않는 나침반","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/kr_astro","n":15,"st":"sprites-test/anim-obj/kr_astro/idle.png","mode":"문답·수수께끼","old":"성탑 현자들이 별을 읽던 도구다. 금빛 고리 가운데 박힌 푸른 별을 맞추면 그날 밤하늘이 고스란히 손바닥에 들어온다. 다만 한 가지 — 이걸로 사람의 앞날까지 들여다본 자는 하나같이 입을 닫았다. 봐선 안 될 것까지 보였던 모양이다.","neo":"묻는다. 별을 손바닥에 담으면 앞날도 보이는가. 금빛 고리 가운데 푸른 별을 맞추면 그날 밤하늘이 손에 들어온다. 다만 이걸로 사람의 앞날까지 본 자는 하나같이 입을 닫았다."},{"key":"kingdom_dawnguard_sword","name":"동트는 맹세","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/sword","n":15,"st":"sprites-test/anim-obj/sword/idle.png","mode":"2인칭","old":"여명 근위대는 왕국에서 가장 어두운 새벽을 지킨 사람들이다. 금빛으로 휘어 오른 손잡이, 푸른 가죽 자루, 곧은 강철 양날 — 새 대원이 성문 앞에서 처음 받아 드는 검이다. \"이 검을 든 자는 동이 틀 때까지 자리를 지킨다.\" 근위대의 첫 가르침은 늘 이 한 마디로 시작한다.","neo":"너는 성문 앞에서 이 검을 처음 받아 든다. 금빛으로 휘어 오른 손잡이, 푸른 가죽 자루, 곧은 강철 양날. 기억해라. 이 검을 든 자는 동이 틀 때까지 자리를 지킨다."},{"key":"kingdom_dawnguard_cuirass","name":"여명의 벽","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/cuirass","n":15,"st":"sprites-test/anim-obj/cuirass/idle.png","mode":"2인칭","old":"흩어지면 근위병, 모이면 성벽이다. 가슴마다 금빛 태양이 새겨진 은빛 흉갑은 어깨를 맞댈수록 단단해진다. 한 명이 무릎 꿇으면 옆 사람이 반 발짝 당겨 그 자리를 메운다. 이렇게 늘어선 한 줄을 왕국 사람들은 \"여명의 벽\"이라 불렀다.","neo":"너는 혼자가 아니다. 가슴에 금빛 태양을 새긴 이 은빛 흉갑은 어깨를 맞댈수록 단단해진다. 네가 무릎 꿇으면 옆 사람이 반 발짝 당겨 그 자리를 메운다. 그렇게 늘어선 한 줄을 사람들은 여명의 벽이라 불렀다."},{"key":"kingdom_dawnguard_ring","name":"새벽지기의 표식","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/ring","n":15,"st":"sprites-test/anim-obj/ring/idle.png","mode":"2인칭","old":"여명 근위대는 밤을 나눠 지킨다. 새벽 차례가 된 자에게 이 반지가 건네지는데, 금테 안 네모난 푸른 보석이 별빛을 머금으면 그가 곧 동쪽 하늘을 가장 먼저 맞는 사람이다. 반지는 누구의 것도 아니다. 그 밤 깨어 있는 사람의 것일 뿐이다.","neo":"오늘 밤 새벽 차례는 너다. 이 반지를 받아라. 금테 속 네모난 푸른 보석이 별빛을 머금으면 네가 동쪽 하늘을 가장 먼저 맞는 사람이다. 반지는 누구의 것도 아니고 깨어 있는 사람의 것이다."},{"key":"kingdom_falcon_claw","name":"매발톱 장갑","slot":"weapon","region":"왕국","dir":"sprites-test/anim-obj/kingdom_falcon_claw","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_claw/idle.png","mode":"소문·전설","old":"금세공 장갑 끝에 매의 발톱을 본뜬 휜 칼날이 돋았다. 왕실 매사냥꾼은 칼을 차지 않는다 — 손에 낀 이 발톱이면 충분하니까. 매가 하늘에서 내리꽂듯, 그도 단 한 번에 끝낸다.","neo":"왕실 매사냥꾼은 칼을 차지 않는다는 말이 있다. 매의 발톱을 본떠 금으로 벼린 이 장갑이면 충분하다고. 매가 하늘에서 내리꽂듯, 그도 단 한 번에 끝낸다고들 한다."},{"key":"kingdom_falcon_bracer","name":"매를 받는 토시","slot":"armor","region":"왕국","dir":"sprites-test/anim-obj/kingdom_falcon_bracer","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_bracer/idle.png","mode":"소문·전설","old":"두꺼운 가죽 토시에 금테와 매 문장을 새기고 초록 깃을 달았다. 매가 내려앉는 자리라 흠집이 가실 날이 없다. 토시가 닳을수록 매와 보낸 시간이 길다는 뜻 — 사냥꾼의 자랑은 늘 이 팔에 있었다.","neo":"토시가 닳을수록 매와 보낸 시간이 길다는 말이 전해진다. 금테와 매 문장을 새긴 두꺼운 가죽 토시, 매가 앉는 자리라 흠집이 가실 날이 없다. 사냥꾼의 자랑은 늘 이 팔에 있었다고 한다."},{"key":"kingdom_falcon_hood","name":"방울 달린 매 두건","slot":"accessory","region":"왕국","dir":"sprites-test/anim-obj/kingdom_falcon_hood","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_hood/idle.png","mode":"소문·전설","old":"작은 방울이 달린 매 두건이다. 씌우면 매가 눈을 감은 듯 얌전해지고, 사냥꾼이 신호를 주면 그제야 솟구친다. 방울 소리는 사냥의 신호 — 딸랑, 하는 순간 하늘에서 그림자가 떨어진다.","neo":"방울 소리가 신호라는 소문이 있다. 이 두건을 씌우면 매가 눈을 감은 듯 얌전해지고, 사냥꾼이 신호를 주면 그제야 솟구친다고. 딸랑 소리가 나는 순간 하늘에서 그림자가 떨어진다더라."},{"key":"marsh_lily_blade","name":"이슬로 벼린 검","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/ml_blade","n":15,"st":"sprites-test/anim-obj/ml_blade/idle.png","mode":"편지·전언","old":"늪의 여왕은 대장간을 두지 않는다. 새벽 수면에 맺힌 이슬을 모아 칼을 벼린다는데, 정말로 칼날이 물빛으로 맑다. 잠자리 날개로 손잡이를 감고 큰 진주를 박았다. 휘두르면 이슬이 흩날려, 본 사람은 검이 아니라 아침 안개를 봤다고 했다.","neo":"여왕께. 새벽 수면의 이슬을 모아 벼렸다는 이 가는 검을 바칩니다. 잠자리 날개로 손잡이를 감고 큰 진주를 박았으니, 휘두르면 아침 안개가 흩날리는 듯 보일 것입니다."},{"key":"marsh_lily_gown","name":"수련이 피는 드레스","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/ml_gown","n":15,"st":"sprites-test/anim-obj/ml_gown/idle.png","mode":"편지·전언","old":"여왕이 물 위를 걸으면 발끝마다 수련이 피어 드레스가 된다고 한다. 분홍과 흰 꽃잎이 겹겹이 쌓이고, 얇은 비단이 자락에서 무지갯빛으로 일렁인다. 진주 이슬이 점점이 맺혀, 움직일 때마다 작은 별처럼 굴렀다.","neo":"여왕께. 물 위를 걸으실 때 발끝마다 핀다는 수련을 본떠 이 드레스를 지었습니다. 분홍과 흰 꽃잎을 겹겹이 올리고 진주 이슬을 점점이 맺었으니, 움직이실 때마다 작은 별처럼 구를 것입니다."},{"key":"marsh_lily_tiara","name":"진주를 엮은 화관","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/ml_tiara","n":15,"st":"sprites-test/anim-obj/ml_tiara/idle.png","mode":"편지·전언","old":"늪에서 가장 오래 산 조개들이 여왕에게 바친 진주로 엮은 화관이다. 수련 줄기를 둥글게 말고, 가장 큰 진주 위에 흰 수련 한 송이를 얹었다. 이슬 맺힌 새벽엔 화관 전체가 보석처럼 반짝여, 여왕이 어디 있는지 멀리서도 알았다.","neo":"여왕께. 가장 오래 산 조개들이 바친 진주로 이 화관을 엮었습니다. 수련 줄기를 둥글게 말고 흰 수련 한 송이를 얹었으니, 이슬 맺힌 새벽엔 멀리서도 여왕이 어디 계신지 알 것입니다."},{"key":"marsh_mistwisp_blade","name":"안개가 건넨 곡도","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/marsh_blade","n":15,"st":"sprites-test/anim-obj/marsh_blade/idle.png","mode":"소문·전설","old":"늪에 들어간 사람은 많아도, 돌아온 사람은 드물다. 덩굴이 칼자루를 감고 칼날 옆엔 청록빛 버섯이 돋은 이 곡도는 안개 속에서 주웠다고들 한다. 누가 떨어뜨렸는지는 아무도 모른다. 늪은 답을 돌려주지 않으니까.","neo":"늪에 들어간 사람은 많아도 돌아온 사람은 드물다고들 한다. 덩굴이 자루를 감고 칼날 옆에 청록 버섯이 돋은 이 곡도는 안개 속에서 주웠다는 이야기뿐. 누가 떨어뜨렸는지는 아무도 모른다."},{"key":"marsh_mistwisp_armor","name":"늪이 삼킨 이끼갑옷","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/marsh_armor","n":15,"st":"sprites-test/anim-obj/marsh_armor/idle.png","mode":"소문·전설","old":"이끼와 나무껍질이 엉겨 한 벌의 갑옷이 되기까지 몇 해가 걸렸을까. 가슴엔 본 적 없는 청록빛 무늬가 돋고, 갈대 두건이 얼굴을 가린다. 이걸 입었던 게 사람이긴 했는지, 늪지기들도 말이 엇갈린다.","neo":"이끼와 나무껍질이 엉겨 갑옷이 되기까지 몇 해가 걸렸는지 아무도 모른다고 한다. 가슴엔 본 적 없는 청록 무늬가 돋고 갈대 두건이 얼굴을 가렸다. 이걸 입었던 게 사람이긴 했는지조차 말이 엇갈린다."},{"key":"marsh_mistwisp_lantern","name":"홀리는 등불","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/marsh_lantern","n":15,"st":"sprites-test/anim-obj/marsh_lantern/idle.png","mode":"소문·전설","old":"안개 짙은 밤이면 늪 한가운데 작은 불빛이 흔들린다. 녹슨 랜턴 안 청록 도깨비불이 숨 쉬듯 깜빡이는데, 따라가면 길이 나온다는 이도 영영 못 돌아왔다는 이도 있다. 불빛은 그저, 따라올 자를 기다린다.","neo":"안개 짙은 밤이면 늪 한가운데 작은 불빛이 흔들린다는 소문이 있다. 녹슨 랜턴 속 청록 도깨비불을 따라가면 길이 나온다는 이도, 영영 못 돌아왔다는 이도 있다."},{"key":"marsh_frog_blowgun","name":"퉤! 하는 대롱","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/mf_blow","n":15,"st":"sprites-test/anim-obj/mf_blow/idle.png","mode":"대화극","old":"늪에서 제일 시끄러운 무기다. 갈대 대롱에 개구리 한 마리가 떡하니 앉아 — 쏠 때마다 '개굴!' 소리가 난다고 소문났다. 개구리가 우는 건지, 쏘는 사람이 흉내 내는 건지는 아직도 논쟁 중이다.","neo":"「개굴! 쏠 때마다 그런 소리가 난다니까.」 「그거 개구리가 우는 거야, 네가 흉내 내는 거야?」 갈대 대롱에 개구리 한 마리 앉은 이 무기를 두고, 늪에선 아직도 그 논쟁이 한창이다."},{"key":"marsh_frog_hood","name":"개구리 탈 망토","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/mf_hood","n":15,"st":"sprites-test/anim-obj/mf_hood/idle.png","mode":"대화극","old":"늪 아이들이 제일 갖고 싶어 하는 망토다. 큼지막한 개구리 머리 두건에 수련잎 망토가 달렸다. 뒤집어쓰면 영락없는 개구리 — 진짜 개구리들이 제 동료인 줄 알고 졸졸 따라붙는 게 유일한 골칫거리란다.","neo":"「또 따라온다!」 큼지막한 개구리 머리 두건에 수련잎 망토를 두르면 진짜 개구리들이 동료인 줄 알고 졸졸 따라붙는다. 「떼어 내는 게 일이야.」 늪 아이들이 제일 갖고 싶어 하면서도 늘 하는 말이다."},{"key":"marsh_frog_jar","name":"반딧불 충전기","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/mf_jar","n":15,"st":"sprites-test/anim-obj/mf_jar/idle.png","mode":"대화극","old":"밤마다 반딧불을 모아 담는 유리병이다. 안에서 작은 개구리가 불빛을 지킨다나 뭐라나. 어두운 길에선 이것만 한 게 없는데, 단점이 하나 — 반딧불이 잠들면 흔들어 깨워야 한다.","neo":"「불 꺼졌어!」 「흔들어. 자는 거야.」 밤마다 반딧불을 모아 담는 이 유리병, 안에선 작은 개구리가 불빛을 지킨다나. 어두운 길엔 이만 한 게 없지만 반딧불이 잠들면 깨우는 게 일이다."},{"key":"marsh_bogwarden_trident","name":"늪이 건넨 삼지창","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/mb_trident","n":15,"st":"sprites-test/anim-obj/mb_trident/idle.png","mode":"2인칭","old":"너는 늪을 건넜고, 늪은 가장 좋은 것을 내주었다. 청록빛 청동을 정교하게 벼린 삼지창, 가운데엔 에메랄드 수련이 빛난다. 진창에서 삼지창을 건져 든 자는, 늪이 그를 주인으로 받아들였다는 뜻으로 생각했다.","neo":"너는 늪을 건넜고, 늪은 가장 좋은 것을 내주었다. 청록 청동을 정교하게 벼린 삼지창, 가운데 에메랄드 수련이 빛난다. 진창에서 이걸 건져 든 너를, 늪은 비로소 제 주인으로 받아들인 것이다."},{"key":"marsh_bogwarden_chest","name":"늪빛 흉갑","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/mb_chest","n":15,"st":"sprites-test/anim-obj/mb_chest/idle.png","mode":"2인칭","old":"너는 늪을 건넜고, 늪은 너에게 제 빛깔을 입혔다. 깊은 물에 푸르게 슨 청동 흉갑, 가슴엔 청록 수련 문장이 빛난다. 이 색은 늪을 건너고도 가라앉지 않은 자에게만 남는다.","neo":"너는 늪을 건넜고, 늪은 너에게 제 빛깔을 입혔다. 깊은 물에 푸르게 슨 청동 흉갑, 가슴엔 청록 수련 문장이 빛난다. 이 색은 늪을 건너고도 가라앉지 않은 자에게만 남는다."},{"key":"marsh_bogwarden_horn","name":"부르면 모이는 뿔피리","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/mb_horn","n":15,"st":"sprites-test/anim-obj/mb_horn/idle.png","mode":"2인칭","old":"이 청동 뿔피리를 한 번 불면 안개 속 어디선가 늪지기들이 답한다. 수련잎 무늬가 새겨진 주둥이에서 반딧불 같은 빛이 샌다. 늪에선 혼자 싸우는 자가 없다. 부를 줄만 안다면.","neo":"너는 혼자 싸우지 않아도 된다. 이 청동 뿔피리를 한 번 불면 안개 속 어디선가 늪지기들이 답한다. 수련잎 무늬가 새겨진 주둥이에서 반딧불 같은 빛이 샌다. 부를 줄만 알면 된다."},{"key":"marsh_angler_harpoon","name":"한 방 작살","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/marsh_angler_harpoon","n":15,"st":"sprites-test/anim-obj/marsh_angler_harpoon/idle.png","mode":"1인칭 독백","old":"뼈와 늪나무로 깎고 끝에 미늘을 단 작살이다. 늪 어부 왈, “그물은 운이고 작살은 실력이지.” 진주 몇 알을 미끼로 매달았는데, 정작 잡히는 건 물고기가 아니라 가끔 더 이상한 것들이란다.","neo":"그물은 운이고 작살은 실력이지. 뼈와 늪나무로 깎고 끝에 미늘을 단 이놈에 진주 몇 알을 미끼로 달아 뒀어. 잡히는 게 물고기뿐이면 다행인데, 가끔은 더 이상한 게 걸려 올라온다니까."},{"key":"marsh_angler_cape","name":"도롱이","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/marsh_angler_cape","n":15,"st":"sprites-test/anim-obj/marsh_angler_cape/idle.png","mode":"1인칭 독백","old":"짚과 갈대를 촘촘히 엮어 비도 막고 몸도 숨기는 도롱이다. 이걸 두르고 갈대밭에 가만히 서 있으면 새도 물고기도 그를 갈대인 줄 안다. “늪에선 기다리는 놈이 다 잡아” — 어부는 도롱이 깃을 여미며 싱글거린다.","neo":"늪에선 기다리는 놈이 다 잡는 거야. 짚과 갈대를 촘촘히 엮은 이 도롱이를 두르고 갈대밭에 가만히 서 있으면, 새도 물고기도 나를 갈대인 줄 안다. 갑옷값도 굳었지, 안 그래?"},{"key":"marsh_angler_creel","name":"반딧불 통발","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/marsh_angler_creel","n":15,"st":"sprites-test/anim-obj/marsh_angler_creel/idle.png","mode":"1인칭 독백","old":"등에 메는 버들 통발인데, 안에 반딧불 등을 넣어 미끼로 쓴다. 빛을 보고 모인 물고기가 제 발로 들어온다나. 가끔 통발이 너무 환하면 — 정작 물고기는 안 오고 모기만 잔뜩 꼬인다.","neo":"빛을 보고 모인 물고기가 제 발로 들어온다니까. 등에 메는 버들 통발에 반딧불 등을 넣어 미끼로 써. 다만 너무 환하면 정작 물고기는 안 오고 모기만 잔뜩 꼬이는 게 흠이지."},{"key":"marsh_fen_scythe","name":"길잡이 낫","slot":"weapon","region":"늪지대","dir":"sprites-test/anim-obj/marsh_fen_scythe","n":15,"st":"sprites-test/anim-obj/marsh_fen_scythe/idle.png","mode":"문답·수수께끼","old":"늪의 안내인은 검을 들지 않는다. 이끼 슨 청동 낫 둘레로 에메랄드 반딧불이 모여 길을 그린다. 낫은 무엇을 베기 위한 게 아니다. 반딧불이 그려 둔 길을 흩지 않도록, 앞을 가린 갈대만 살며시 젖히는 도구다 — 길을 내는 게 아니라 이미 있는 길을 드러낼 뿐.","neo":"묻는다. 낫은 무엇을 베기 위한 것인가. 늪의 안내인은 고개를 젓는다. 이끼 슨 청동 낫 둘레로 반딧불이 길을 그리니, 이건 베는 게 아니라 앞을 가린 갈대만 젖혀 이미 있는 길을 드러내는 도구다."},{"key":"marsh_fen_cloak","name":"안갯속 길손의 외투","slot":"armor","region":"늪지대","dir":"sprites-test/anim-obj/marsh_fen_cloak","n":15,"st":"sprites-test/anim-obj/marsh_fen_cloak/idle.png","mode":"문답·수수께끼","old":"“앞만 보고 따라와. 뒤는 돌아보지 말고.” 안내인은 그 말만 남기고 안갯속으로 들어선다. 이끼빛 외투에 박힌 반딧불이 밤마다 다른 길을 그려 주니, 나도 길은 외우지 않아 — 그저 불빛이 가리키는 대로 걸을 뿐이지.","neo":"묻는다. 안갯속에서 어떻게 사라지지 않는가. 이끼빛 외투에 박힌 반딧불이 밤마다 다른 길을 그려 주기 때문이다. 안내인은 길을 외우지 않고, 그를 따라간 자는 같은 길을 두 번 밟지 않는다."},{"key":"marsh_shrine_medal","name":"안내인의 증표","slot":"accessory","region":"늪지대","dir":"sprites-test/anim-obj/mg_medal","n":15,"st":"sprites-test/anim-obj/mg_medal/idle.png","mode":"문답·수수께끼","old":"녹슨 청동 테 안의 초록 보석에는 지나온 늪길이 어렴풋이 비친다. 안내인이 이 증표를 들어 보이면 안갯속 다른 안내인들이 불빛으로 답한다. 늪에서 길을 잃지 않는 유일한 방법은 서로의 빛을 믿는 것이다.","neo":"묻는다. 늪에서 길을 잃지 않는 방법은 무엇인가. 답은 하나, 서로의 빛을 믿는 것. 녹슨 청동 테 속 초록 보석을 들어 보이면, 안갯속 다른 안내인들이 불빛으로 답한다."},{"key":"volcano_dancer_daggers","name":"춤추는 쌍불꽃","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/volcano_dancer_daggers","n":15,"st":"sprites-test/anim-obj/volcano_dancer_daggers/idle.png","mode":"소문·전설","old":"금빛 휜 쌍단검의 날끝마다 주황 불꽃이 인다. 무희가 두 칼을 엇갈려 돌리면 불의 고리가 그려졌는데, 적은 그 아름다움에 홀려 한 발 늦게야 베인 걸 알았다.","neo":"무희가 쌍칼을 엇갈려 돌리면 불의 고리가 떠오른다는 소문이 있다. 금빛 휜 두 날 끝에 주황 불꽃이 일고, 적은 그 궤적에 홀려 한 발 늦게야 베인 걸 알았다고 한다."},{"key":"volcano_dancer_cape","name":"불길 케이프","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/volcano_dancer_cape","n":15,"st":"sprites-test/anim-obj/volcano_dancer_cape/idle.png","mode":"소문·전설","old":"주황·붉은 비단 자락 끝이 불꽃으로 타오르는 케이프다. 무희가 한 바퀴 돌면 자락의 불길이 둥근 고리를 그리며 뒤를 따른다. 관객은 그 불의 궤적에 홀려, 정작 무희가 어디로 사라졌는지는 끝내 보지 못했다.","neo":"무희가 한 바퀴 돌면 자락의 불길이 둥근 고리를 그리며 따라온다고 한다. 주황·붉은 비단 끝이 불꽃으로 타오르니, 관객은 그 궤적에 홀려 무희가 어디로 사라졌는지 보지 못했다더라."},{"key":"volcano_dancer_fan","name":"불꽃 부채","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/volcano_dancer_fan","n":15,"st":"sprites-test/anim-obj/volcano_dancer_fan/idle.png","mode":"소문·전설","old":"금살에 붉은 비단을 편 부채로, 펼치면 가장자리에 잔불이 살아 일렁인다. 무희는 춤 내내 이 부채로 불씨를 가두어 두다가, 마지막에 탁 접으며 그 불을 한꺼번에 풀어놓는다 — 부채가 닫히는 순간이 공연의 끝이자, 진짜 불의 시작이었다.","neo":"무희의 부채가 닫히는 순간이 공연의 끝이라는 말이 전해진다. 펼치면 가장자리에 잔불을 가두어 두다가, 마지막에 탁 접으며 그 불을 한꺼번에 풀어놓는다고. 그때가 진짜 불의 시작이었다."},{"key":"volcano_phoenix_bow","name":"재에서 당기는 활","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/volcano_phoenix_bow","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_bow/idle.png","mode":"2인칭","old":"불사조가 마지막으로 타오른 자리에서 그 깃을 주워 메운 활이다. 흑요석 몸체에 금빛 불꽃 날개가 펼쳐지고, 시위를 당기면 균열마다 잿불이 살아난다. 한 번 재가 되어 본 활이라, 누구보다 먼저 그리고 가장 뜨겁게 다시 타오른다.","neo":"너는 한 번 재가 되어 보았다. 그 자리에서 불사조의 깃을 주워 이 활을 메웠지. 흑요석 몸체에 금빛 불꽃 날개가 펼쳐지고, 시위를 당기면 균열마다 잿불이 살아난다. 너는 누구보다 뜨겁게 다시 탄다."},{"key":"volcano_phoenix_cuirass","name":"다시 타오른 가슴","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/volcano_phoenix_cuirass","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_cuirass/idle.png","mode":"2인칭","old":"흑요석 판을 가르고 금빛 불사조 날개가 솟은 흉갑이다. 균열 사이 잿불이 들숨처럼 깊어졌다 날숨처럼 풀린다. 이 갑옷은 한 번 무너져 본 가슴에만 맞는다 — 부서진 자리를 정확히 아는 자만이, 그 자리를 다시 채울 수 있으니까.","neo":"너는 한 번 무너져 보았다. 그래서 이 갑옷이 네 가슴에 맞는다. 흑요석 판을 가르고 금빛 날개가 솟았고, 균열 사이 잿불이 들숨처럼 깊어졌다 풀린다. 부서진 자리를 아는 너만이 그 자리를 다시 채운다."},{"key":"volcano_phoenix_pendant","name":"꺼지지 않는 깃","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/volcano_phoenix_pendant","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_pendant/idle.png","mode":"2인칭","old":"금빛 깃털 끝에 잿불 한 점이 매달려 숨을 고른다. 불사조가 마지막으로 떨군 깃이라는데, 바람이 거셀수록 더 또렷이 탄다. 품은 자가 주저앉는 밤이면, 이 작은 불씨가 먼저 일어나 길을 밝힌다.","neo":"네가 주저앉는 밤이면 이 깃이 먼저 일어선다. 금빛 깃털 끝에 잿불 한 점이 매달려 숨을 고르고, 바람이 거셀수록 더 또렷이 탄다. 불사조가 너에게 남긴 단 한 올이다."},{"key":"volcano_gala_scimitar","name":"재를 다스리는 곡도","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/vg_blade","n":15,"st":"sprites-test/anim-obj/vg_blade/idle.png","mode":"포고문","old":"불의 여제는 군대를 부리지 않는다. 이 곡도를 한 번 들어 보이는 것으로 충분하다. 금빛 휜 날에 박힌 루비가 산속의 불을 끌어오면, 칼끝에서 잔불이 흘러 재가 스스로 길을 비킨다. 여제가 가리킨 곳은 곧 불의 영토가 된다.","neo":"산에 고하노라. 여제가 이 곡도를 한 번 들면 그것으로 명령은 끝이다. 금빛 휜 날의 루비가 산속 불을 끌어오면 칼끝에서 잔불이 흘러 재가 스스로 길을 비킨다. 여제가 가리킨 곳은 곧 불의 영토다."},{"key":"volcano_gala_gown","name":"용암으로 짠 드레스","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/vg_gown","n":15,"st":"sprites-test/anim-obj/vg_gown/idle.png","mode":"포고문","old":"여제의 드레스는 베틀이 아니라 분화구에서 나왔다. 녹은 금을 실처럼 뽑아 짜고, 그 사이사이 루비 불씨를 박았다. 걸치면 용암 위를 맨발로 걸어도 데지 않으니, 화산이 그녀를 제 주인으로 안다는 뜻이다.","neo":"선포하노라. 이 드레스는 베틀이 아니라 분화구에서 났다. 녹은 금을 실로 뽑아 짜고 루비 불씨를 박았으니, 걸친 자가 용암을 맨발로 밟아도 데지 않는다. 화산이 그녀를 제 주인으로 인정한 증표다."},{"key":"volcano_gala_tiara","name":"불씨를 얹은 보관","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/vg_tiara","n":15,"st":"sprites-test/anim-obj/vg_tiara/idle.png","mode":"포고문","old":"녹은 금 위에 큰 루비가 앉고, 관 끝마다 작은 불꽃이 살아 흔들리는 보관이다. 여제의 머리에 얹히는 순간 불꽃들이 일제히 고개를 든다. 이 불이 사그라드는 날 여제의 시대도 저문다 하여, 누구도 이 보관에서 눈을 떼지 못했다.","neo":"고하노라. 이 보관이 여제의 머리에 얹히는 순간 불꽃들이 일제히 고개를 든다. 녹은 금 위에 큰 루비가 앉고 끝마다 작은 불꽃이 산다. 이 불이 사그라드는 날, 여제의 시대도 저문다."},{"key":"volcano_slayer_pick","name":"비늘을 깬 부리","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/vs_pick","n":15,"st":"sprites-test/anim-obj/vs_pick/idle.png","mode":"1인칭 독백","old":"용을 잡으러 간 자들은 다들 큰 검을 들고 갔지만, 그자만 이 곡괭이를 챙겼다. '비늘은 검을 튕겨낸다. 한 점을 뚫어야지.' 검은 강철 부리에 붉은 비늘 손잡이, 잿불빛이 도는 이것으로 그는 비늘 한 장을 정확히 꿰뚫었다. 용을 잡는 건 힘이 아니라 한 점이다. 그날 그가 남긴 말이다.","neo":"다들 큰 검을 들고 갔지만 나는 이 곡괭이를 챙겼다. 비늘은 검을 튕겨내니까. 검은 강철 부리에 붉은 비늘 손잡이, 나는 이걸로 비늘 한 장을 정확히 꿰뚫었다. 용을 잡는 건 힘이 아니라 한 점이더라."},{"key":"volcano_slayer_helm","name":"용을 노려본 투구","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/vs_helm","n":15,"st":"sprites-test/anim-obj/vs_helm/idle.png","mode":"1인칭 독백","old":"용과 정면으로 눈을 맞춘 건 이 투구를 쓴 자뿐이었다. 검은 강철에 붉은 용비늘을 덧대고, 두 뿔 사이로 잿불이 돈다. 불길이 얼굴을 핥아도 그는 눈을 감지 않았다. 투구의 두 뿔이 아직도 그날의 열기를 머금고 있다.","neo":"나는 용과 정면으로 눈을 맞췄다. 검은 강철에 붉은 용비늘을 덧대고 두 뿔 사이로 잿불이 도는 이 투구를 쓰고서. 불길이 얼굴을 핥아도 나는 눈을 감지 않았다. 두 뿔이 아직 그날의 열기를 머금고 있다."},{"key":"volcano_slayer_fang","name":"베어 낸 송곳니","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/vs_fang","n":15,"st":"sprites-test/anim-obj/vs_fang/idle.png","mode":"1인칭 독백","old":"용을 벤 자는 송곳니 하나를 뽑아 목에 걸었다. 밑동을 강철 띠로 감고 붉은 보석 하나, 깃털 한 올을 매달았다. 잿불빛이 도는 이 부적은 말보다 먼저 그의 무용을 증명한다. '한 마리.' 그게 그가 말한 유일한 자랑이었다.","neo":"나는 용을 벤 뒤 송곳니 하나를 뽑아 목에 걸었다. 강철 띠로 밑동을 감고 붉은 보석과 깃털을 매달았지. 누가 무용을 물으면 나는 한마디만 한다. 한 마리. 그게 내가 말한 유일한 자랑이다."},{"key":"volcano_ember_blade","name":"재를 가르는 칼","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/ve_blade","n":15,"st":"sprites-test/anim-obj/ve_blade/idle.png","mode":"문답·수수께끼","old":"화산이 한 번 잠들면 세상은 온통 잿빛이 된다. 검은 흑요석을 휘어 벼린 이 칼이 붉게 달아오르면, 그 빛을 따라 잿더미에 묻혔던 길과 형체가 하나씩 되살아난다. 그자는 무엇을 베러 가는 게 아니라, 무엇이 남았는지 보러 가는 듯했다.","neo":"묻는다. 다 식은 화산 자리엔 무엇이 남는가. 재뿐이다. 흑요석을 휘어 벼린 이 칼이 붉게 달면 잿더미에 묻혔던 길과 형체가 되살아난다. 무엇을 베러 가느냐 물으면 그자는 늘 답을 미뤘다."},{"key":"volcano_ember_plate","name":"식지 않는 흉갑","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/ve_plate","n":15,"st":"sprites-test/anim-obj/ve_plate/idle.png","mode":"문답·수수께끼","old":"검은 흑요석 판을 이어 붙인 흉갑이다. 판 사이 갈라진 틈으로 붉은 잿불이 숨 쉰다. 다 식은 줄 알았던 화산처럼, 이 갑옷도 두드리면 속에서 아직 뜨거운 기운이 올라온다.","neo":"묻는다. 다 식은 줄 알았던 것을 두드리면 무엇이 나오는가. 흑요석 판을 이어 붙인 이 흉갑은 판 사이로 붉은 잿불이 숨 쉰다. 두드리면 속에서 아직 뜨거운 기운이 올라온다."},{"key":"volcano_ember_hourglass","name":"재가 흐르는 모래시계","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/ve_hourglass","n":15,"st":"sprites-test/anim-obj/ve_hourglass/idle.png","mode":"문답·수수께끼","old":"흑요석 모래시계 안에서 잿불이 모래처럼 천천히 흘러내린다. 이걸로 화산이 깨어날 때를 잰다는데, 신기하게도 모래는 줄어들기만 할 뿐 바닥까지 떨어지는 법이 없다 — 화산이 아직 완전히 잠들지는 않았다는 뜻이라고들 한다.","neo":"묻는다. 화산은 언제 깨어나는가. 흑요석 모래시계 속 잿불이 모래처럼 흐르지만, 신기하게도 바닥까지 떨어지는 법이 없다. 아직 완전히 잠들지는 않았다는 뜻이라고들 한다."},{"key":"volcano_dragonbone_glaive","name":"불에서 난 언월","slot":"weapon","region":"화산","dir":"sprites-test/anim-obj/volcano_glaive","n":15,"st":"sprites-test/anim-obj/volcano_glaive/idle.png","mode":"비문·운문","old":"용이 스러진 자리에 신전이 섰고, 그 뼈를 깎아 이 언월도를 만들었다. 흑요석 날을 타고 용암이 흐르고, 자루엔 제단의 시 한 줄이 새겨졌다 — '불에서 났으니, 불을 두려워 말라.' 날을 치켜들면 용이 마지막으로 내쉰 숨이 다시 타오르는 듯했다.","neo":"불에서 났으니 불을 두려워 말라. 용이 스러진 자리에 신전이 섰고, 그 뼈를 깎아 이 언월도를 벼렸다. 흑요석 날을 타고 용암이 흐르니, 치켜들면 용의 마지막 숨이 다시 타오른다."},{"key":"volcano_dragonbone_coat","name":"용골 방패","slot":"armor","region":"화산","dir":"sprites-test/anim-obj/volcano_coat","n":15,"st":"sprites-test/anim-obj/volcano_coat/idle.png","mode":"비문·운문","old":"먼 옛날 산을 통째로 태우던 용이 쓰러진 자리에서, 가장 두꺼운 등비늘과 갈비뼈를 떼어 만든 방패다. 검은 면 속을 용암이 핏줄처럼 흐르는데, 사람들은 용의 마지막 숨결이 아직 그 안에 갇혀 있다고 믿는다. 이 방패를 든 자 앞에서는 어떤 불길도 고개를 숙인다. 제 몸으로 불을 다스려 본 용의 비늘이, 여전히 불을 알아보기 때문이다.","neo":"산을 태우던 용도 끝내 한 줌 비늘로 남았다. 가장 두꺼운 등비늘과 갈비뼈로 지은 이 방패, 검은 면을 용암이 핏줄처럼 흐른다. 그 앞에서 불길은 고개를 숙인다. 불을 가장 잘 아는 건 용이었으니."},{"key":"volcano_dragonbone_eye","name":"잠들지 않는 용안","slot":"accessory","region":"화산","dir":"sprites-test/anim-obj/volcano_dragoneye","n":15,"st":"sprites-test/anim-obj/volcano_dragoneye/idle.png","mode":"비문·운문","old":"금테 안 호박빛 용안이 식지 않는 화로 위에 걸려, 밤이 깊을수록 천천히 깜빡인다. 용은 죽어 뼈가 되었어도 이 눈만은 감기지 않았다. 제가 지키던 산을 끝까지 내려다보려는 듯이. 이 눈이 한 번 깜빡일 때마다, 산속 어딘가의 불씨도 함께 깜빡인다.","neo":"죽어 뼈가 되어도 눈은 감기지 않았다. 금테 속 호박빛 용안이 화로 위에서 밤이 깊을수록 천천히 깜빡인다. 제가 지키던 산을 끝까지 내려다보려는 듯, 한 번 깜빡일 때마다 산속 불씨도 함께 깜빡인다."},{"key":"temple_sanctum_staff","name":"무지개를 문 지팡이","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/sf_staff","n":15,"st":"sprites-test/anim-obj/sf_staff/idle.png","mode":"편지·전언","old":"성좌의 무녀가 축일에 손에 드는 지팡이다. 백대리석 자루 끝 수정이 무지개로 타오르면, 무녀가 그 빛을 천장으로 흘려보낸다. 색이 쏟아지는 그 순간을 사람들은 '수정의 노래'라 불렀다. 무녀가 지팡이를 내리면, 노래도 조용히 잠들었다.","neo":"무녀께. 축일에 드실 지팡이를 올립니다. 백대리석 자루 끝 수정이 무지개로 타오르거든 그 빛을 천장으로 흘려보내 주십시오. 색이 쏟아지는 그 순간을 사람들은 수정의 노래라 부릅니다."},{"key":"temple_sanctum_gown","name":"빛으로 짠 예복","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/sf_dress","n":15,"st":"sprites-test/anim-obj/sf_dress/idle.png","mode":"편지·전언","old":"성좌의 무녀가 축일에 입는 예복이다. 흰 비단에 금실이 흐르고 가슴과 소매엔 수정이 별처럼 박혔다. 걸음을 옮길 때마다 빛이 잘게 부서져, 멀리서 보면 사람이 아니라 별무리가 걸어오는 것 같았다.","neo":"무녀께. 축일의 예복을 지어 올립니다. 흰 비단에 금실을 흘리고 가슴과 소매에 수정을 별처럼 박았으니, 걸음마다 빛이 잘게 부서져 멀리선 별무리가 걸어오는 듯 보일 것입니다."},{"key":"temple_sanctum_diadem","name":"새벽빛 관","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/sf_diadem","n":15,"st":"sprites-test/anim-obj/sf_diadem/idle.png","mode":"편지·전언","old":"성좌의 무녀가 예복 위에 마지막으로 얹는 관이다. 금빛 날개가 가운데 수정을 떠받치고, 그 위로 옅은 별빛 후광이 천천히 돈다. 무녀가 이 관을 쓰고 손을 들면 신전의 모든 수정이 같은 음으로 떨며 빛났다. 관이 첫 음을 내면 별들이 따라 노래한 셈이다.","neo":"무녀께. 예복 위에 마지막으로 얹을 관을 전합니다. 금빛 날개가 수정을 떠받치고 옅은 별빛 후광이 돕니다. 관이 첫 음을 내면 신전의 모든 수정이 같은 음으로 떨며 답할 것입니다."},{"key":"temple_cipher_blade","name":"비추는 은부채","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/tc_blade","n":15,"st":"sprites-test/anim-obj/tc_blade/idle.png","mode":"문답·수수께끼","old":"거울처럼 닦은 은 부채다. 펼치면 살마다 빛이 되비쳐, 마주한 사람이 제 모습을 언뜻 본다. 부채에 비친 얼굴은 늘 조금 일그러져 있었는데 — 신전 사람들은 그게 '숨긴 마음'이라 했다.","neo":"묻는다. 마주한 자가 제 모습을 보면 어떤 표정을 짓는가. 거울처럼 닦은 은 부채를 펼치면 살마다 빛이 되비친다. 비친 얼굴은 늘 조금 일그러져 있었는데, 신전 사람들은 그게 숨긴 마음이라 했다."},{"key":"temple_cipher_shawl","name":"되비추는 거울 방패","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/tc_shawl","n":15,"st":"sprites-test/anim-obj/tc_shawl/idle.png","mode":"문답·수수께끼","old":"거울처럼 닦인 이 방패는 날아오는 것을 그대로 되비춰 돌려보낸다. 은빛 테 안 매끄러운 거울 면이 막아선 적의 얼굴을 비추는데, 내리치려던 자는 제 얼굴을 보고 흠칫 멈춘다고 한다. 칼이 아니라 제 얼굴을 들이미는 방패라, 이 앞에서 싸움은 늘 머쓱하게 멈췄다.","neo":"묻는다. 가장 조용히 이기는 방어구는 무엇인가. 거울 면을 가진 이 둥근 방패는 날아오는 것을 그대로 되비춰 돌려보낸다. 칼이 아니라 제 얼굴을 들이미니, 그 앞에서 싸움은 늘 머쓱하게 멎었다."},{"key":"temple_cipher_key","name":"거울 너머의 열쇠","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/tc_key","n":15,"st":"sprites-test/anim-obj/tc_key/idle.png","mode":"문답·수수께끼","old":"열쇠 손잡이의 작은 거울에는 지금 이곳이 아니라, 이 열쇠가 여는 문 너머의 풍경이 비친다. 대리석과 은으로 깎은 이 열쇠는 자물쇠가 아니라 짝이 되는 거울에 비춰야 열린다고 한다. 거울 속 그 풍경을 실제로 찾아낸 자만이 문을 연다는데 — 아직은 아무도.","neo":"묻는다. 자물쇠도 없이 무엇을 여는가. 열쇠 손잡이의 작은 거울엔 이곳이 아니라 문 너머가 비친다. 짝이 되는 거울에 비춰야 열린다는데, 거울 속 그 풍경을 찾아낸 자는 아직 아무도 없다."},{"key":"temple_golemwake_fist","name":"갈라진 거석의 주먹","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/tg_fist","n":15,"st":"sprites-test/anim-obj/tg_fist/idle.png","mode":"일지·기록","old":"신전 수호 거석은 천 년을 잠들어 있었다. 한 사람이 이 돌주먹을 끼고 제단을 두드리자, 잿빛 돌에 금이 가며 그 틈으로 금빛 불이 새어 나왔다. 쿵, 쿵 — 세 번째 울림에 거석이 눈을 떴다. 그날부터 신전은 다시 걷는다.","neo":"각성 첫째 날. 거석은 천 년을 잠들어 있었다. 돌주먹을 끼고 제단을 세 번 두드리자 잿빛 돌에 금이 가고 그 틈으로 금빛 불이 새어 나왔다. 세 번째 울림에 거석이 눈을 떴다. 신전이 다시 걷기 시작했다."},{"key":"temple_golemwake_armor","name":"안에서 타오르는 갑옷","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/tg_armor","n":15,"st":"sprites-test/anim-obj/tg_armor/idle.png","mode":"일지·기록","old":"거석과 같은 돌을 깎아 만든 갑옷이다. 잿빛 표면에 깊은 균열이 지나고, 그 안쪽에서 금빛 불이 주인의 맥박에 맞춰 밝아졌다 잦아든다. 이 갑옷을 두른 자는 거석처럼 단단히 서서, 한 발도 물러서지 않았다.","neo":"각성 셋째 날. 거석과 같은 돌을 깎아 이 갑옷을 지었다. 잿빛 표면의 균열 안에서 금빛 불이 주인의 맥박에 맞춰 밝아졌다 잦아든다. 이 갑옷을 두른 자는 거석처럼 한 발도 물러서지 않았다."},{"key":"temple_golemwake_stone","name":"잠들지 않는 심장석","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/tg_stone","n":15,"st":"sprites-test/anim-obj/tg_stone/idle.png","mode":"일지·기록","old":"거석의 가슴에서 떼어 낸 심장석이다. 잿빛 돌에 난 금 사이로 금빛이 천천히 들어왔다 나갔다 하는데, 가만히 보면 꼭 숨을 쉬는 것 같다. 이 돌을 품으면 좀처럼 지치지 않는다. 거석의 끈기가 옮아온다고들 했다.","neo":"각성 마지막 기록. 거석의 가슴에서 심장석을 떼어 냈다. 잿빛 돌의 금 사이로 금빛이 들고나는데, 가만히 보면 숨을 쉬는 것 같다. 품은 자는 좀처럼 지치지 않았다. 거석의 끈기가 옮아온 모양이다."},{"key":"temple_frostward_bow","name":"봄을 겨눈 석궁","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/temple_bow","n":15,"st":"sprites-test/anim-obj/temple_bow/idle.png","mode":"비문·운문","old":"신전 가장 높은 자리에 걸려 있던 석궁이다. 흰 대리석을 깎아 만들고 몸체엔 식지 않는 청록 룬이 흐른다. 개머리판에 새겨진 비문은 단 한 줄 — '겨눈 곳에 봄이 온다.' 서리 신전에서 가장 따뜻한 말이다.","neo":"겨눈 곳에 봄이 온다. 신전 가장 높은 자리에 걸렸던 석궁, 흰 대리석 몸체에 식지 않는 청록 룬이 흐른다. 개머리판의 비문은 단 한 줄, 서리 신전에서 가장 따뜻한 말이다."},{"key":"temple_frostward_helm","name":"맑은 서리의 관","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/temple_helm","n":15,"st":"sprites-test/anim-obj/temple_helm/idle.png","mode":"비문·운문","old":"흰 대리석을 깎고 이마에 금테를 두른 투구로, 관자놀이를 따라 청록 룬이 한 줄 흐른다. 신관은 큰 결정을 앞두면 이 투구부터 썼다. 룬이 차게 빛나는 동안에는 분노도 두려움도 서리처럼 가라앉아, 오직 또렷한 판단만 남았기 때문이다.","neo":"분노도 두려움도 서리처럼 가라앉는다. 흰 대리석에 금테를 두르고 청록 룬이 관자놀이를 따라 흐르는 투구. 룬이 차게 빛나는 동안엔 오직 또렷한 판단만 남아, 큰 결정 앞의 신관이 먼저 썼다."},{"key":"temple_frostward_orb","name":"식지 않는 심장","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/temple_orb","n":15,"st":"sprites-test/anim-obj/temple_orb/idle.png","mode":"비문·운문","old":"제단 한가운데 놓여 있던 보주다. 대리석과 금 틀 안에서 청록 룬이 새겨진 수정구가 천천히 돌며 빛난다. 한겨울 신전의 등불이 모두 얼어붙은 밤에도, 이 수정구의 청록빛만은 홀로 돌며 타올랐다. 사람들은 그래서 이걸 '신전의 심장'이라 불렀다.","neo":"가장 추운 밤에도 이 빛은 식지 않았다. 대리석과 금 틀 안에서 청록 룬을 새긴 수정구가 천천히 돌며 빛난다. 신전의 등불이 모두 얼어붙은 밤에도 홀로 타올라, 사람들은 이를 신전의 심장이라 불렀다."},{"key":"temple_monk_staff","name":"묻고 두드리는 장봉","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/temple_monk_staff","n":15,"st":"sprites-test/anim-obj/temple_monk_staff/idle.png","mode":"대화극","old":"수행자가 길 위에서 짚고 다니는 장봉으로, 자루에 옥 염주가 감겼다. 갈림길에서 길을 물으면 그는 답하지 않고 장봉으로 땅을 한 번 두드린 뒤 그 울림이 멎기를 기다렸다. ‘먼저 서두르는 마음부터 가라앉히라’는 뜻이었다 — 길은 늘 그다음에야 보였다.","neo":"「길이 어느 쪽입니까.」 노승은 답 대신 장봉으로 땅을 한 번 두드렸다. 옥 염주가 사락이고, 울림이 멎을 때까지 그는 입을 열지 않았다. 「서두르는 마음부터 가라앉히게. 길은 늘 그다음에 보이네.」"},{"key":"temple_monk_sash","name":"한쪽 어깨 띠","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/temple_monk_sash","n":15,"st":"sprites-test/anim-obj/temple_monk_sash/idle.png","mode":"대화극","old":"한쪽 어깨에만 두르는 주황 천이다. 매듭마다 옥 구슬과 작은 부적이 달려 걸을 때마다 사락거린다. 가진 것이라곤 이 천 한 장 — 그래서 그는 어디든 갈 수 있었다.","neo":"「가진 것이 그뿐입니까.」 「이 천 한 장이면 족하네.」 한쪽 어깨에만 두른 주황 천, 매듭마다 옥 구슬과 부적이 달려 걸음마다 사락인다. 「가진 게 적으면 어디든 갈 수 있거든.」"},{"key":"temple_monk_censer","name":"흔들리는 향로","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/temple_monk_censer","n":15,"st":"sprites-test/anim-obj/temple_monk_censer/idle.png","mode":"대화극","old":"사슬에 매단 놋 향로에서 향 연기가 끊임없이 피어오른다. 연기가 곧게 오르면 마음이 고요하다는 뜻, 흩어지면 무언가 다가온다는 뜻. 그래서 수행자는 말없이 이 연기만 바라보아도 제 마음과 둘레의 기척을 함께 가늠할 수 있었다.","neo":"「연기가 흩어집니다.」 「그럼 무언가 다가온다는 뜻이지.」 사슬에 매단 놋 향로에서 향 연기가 끊임없이 오른다. 곧게 오르면 마음이 고요하다는 뜻. 노승은 말없이 연기만 보아도 둘레의 기척을 읽었다."},{"key":"temple_faux_staff","name":"기적인 척 지팡이","slot":"weapon","region":"신전","dir":"sprites-test/anim-obj/tw_staff","n":15,"st":"sprites-test/anim-obj/tw_staff/idle.png","mode":"1인칭 독백","old":"이 지팡이를 번쩍 들고 '빛을 보아라!' 외치면 사람들이 일단 엎드린다. 사실 끝에 달린 금별은 어젯밤 닦아 광낸 거고, 방울은 시장에서 떨이로 샀다. 그래도 약발은 잘 들어서, 자칭 성자는 오늘도 헛기침 한 번 하고 지팡이부터 치켜든다. '기적은 자세가 반이니라.'","neo":"기적은 자세가 반이니라. 이 지팡이를 번쩍 들고 빛을 보아라 외치면 일단 다들 엎드리거든. 끝의 금별은 어젯밤 닦아 광낸 거고 방울은 시장 떨이지만, 약발은 잘 들어. 오늘도 헛기침 한 번 하고 치켜든다."},{"key":"temple_faux_robe","name":"자칭 훈장 사제복","slot":"armor","region":"신전","dir":"sprites-test/anim-obj/tw_robe","n":15,"st":"sprites-test/anim-obj/tw_robe/idle.png","mode":"1인칭 독백","old":"받은 적 없는 훈장을 직접 만들어 잔뜩 달았다. 흰 사제복 위에 금메달과 배지가 빼곡해 걸을 때마다 절그럭댄다. 누가 무슨 공로냐 물으면 '다 기적이지'라며 얼버무린다. 무거워서 오래 못 서 있는 게 유일한 단점.","neo":"이게 다 기적이지. 받은 적 없는 훈장을 직접 만들어 잔뜩 달았더니 걸을 때마다 절그럭댄다. 무슨 공로냐 물으면 그냥 얼버무리면 돼. 단점이 하나, 무거워서 오래는 못 서 있다는 거."},{"key":"temple_faux_halo","name":"철사로 띄운 후광","slot":"accessory","region":"신전","dir":"sprites-test/anim-obj/tw_halo","n":15,"st":"sprites-test/anim-obj/tw_halo/idle.png","mode":"1인칭 독백","old":"머리 위에 후광이 떠 있어야 성자처럼 보인다기에, 가는 철사로 금테를 띄웠다. 살짝 비뚤어졌지만 멀리서 보면 그럴듯하다. 바람이 불면 흔들리는데, 자칭 성자는 그걸 '하늘의 응답'이라 우긴다.","neo":"성자라면 후광이 떠 있어야지. 가는 철사로 금테를 머리 위에 띄웠다. 살짝 비뚤어졌지만 멀리서 보면 그럴듯해. 바람에 흔들리면? 그건 하늘의 응답이라고 우기면 된다."},{"key":"angel_papillon_rapier","name":"나비 레이피어","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/angel_papillon_rapier","n":15,"st":"sprites-test/anim-obj/angel_papillon_rapier/idle.png","mode":"일지·기록","old":"손잡이에 무지갯빛 나비 날개가 달린 가는 검이다. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 피어난다. 이 검에 스친 자는 상처보다 먼저, 눈앞에 흩날리는 빛가루에 정신을 빼앗긴다고 한다.","neo":"관찰 1일차. 무지갯빛 나비 날개를 손잡이에 단 가는 검. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 핀다. 스친 자는 상처보다 먼저 흩날리는 빛가루에 정신을 빼앗긴다고 적어 둔다."},{"key":"angel_papillon_gown","name":"나비 드레스","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/angel_papillon_gown","n":15,"st":"sprites-test/anim-obj/angel_papillon_gown/idle.png","mode":"일지·기록","old":"무지갯빛 나비 날개를 통째로 두른 듯한 흰 드레스다. 한 발짝 옮길 때마다 수백 장의 날개가 함께 숨 쉬듯 색을 바꾼다. 이 드레스를 입은 천사는 군중 속에서도 늘 혼자 빛나, 누구도 그 곁에 다가설 엄두를 내지 못했다.","neo":"관찰 4일차. 무지갯빛 나비 날개를 통째로 두른 듯한 흰 드레스. 한 발짝마다 수백 장의 날개가 숨 쉬듯 색을 바꾼다. 같은 색을 두 번 본 적이 없어, 그림으로 남기길 포기했다."},{"key":"angel_papillon_brooch","name":"나비 떼 브로치","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/angel_papillon_brooch","n":15,"st":"sprites-test/anim-obj/angel_papillon_brooch/idle.png","mode":"일지·기록","old":"수십 마리 나비가 금테 안에 내려앉아 파스텔빛으로 함께 빛나는 브로치다. 가슴에 달면 나비들이 주인의 숨결에 맞춰 날개를 여닫는다 — 마음이 설레면 빠르게, 가라앉으면 천천히. 천사의 기분을 가장 먼저 들키는 물건이다.","neo":"관찰 9일차. 금테 안에 수십 마리 나비가 내려앉은 브로치. 주인의 숨결에 맞춰 날개를 여닫는다. 설레면 빠르게, 가라앉으면 천천히. 기분을 가장 먼저 들키는 물건이라 기록한다."},{"key":"angel_duskwing_sword","name":"노을이 앉는 검","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/angel_sword","n":15,"st":"sprites-test/anim-obj/angel_sword/idle.png","mode":"소문·전설","old":"해가 가장 낮게 걸리는 시간, 이 검은 제일 아름답다. 황금 날개가 손잡이를 감싸고 칼날엔 황혼빛이 흐른다. 검은 깃 하나가 바람에 흔들릴 때마다, 노을이 칼끝에 한 번씩 내려앉는다. 황혼의 날개가 검을 들면 하늘이 잠깐 숨을 멈춘다.","neo":"황혼의 날개가 이 검을 들면 하늘이 잠깐 숨을 멈춘다는 말이 있다. 황금 날개가 손잡이를 감고 칼날엔 황혼빛이 흐른다. 검은 깃 하나가 흔들릴 때마다 노을이 칼끝에 내려앉는다고들 한다."},{"key":"angel_duskwing_armor","name":"저무는 해의 날개","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/angel_armor","n":15,"st":"sprites-test/anim-obj/angel_armor/idle.png","mode":"소문·전설","old":"황혼의 날개가 가장 화려한 순간은 두 날개를 활짝 펼칠 때다. 금빛 갑옷 위로 검은 깃이 부채처럼 퍼지고, 머리 위 옅은 후광이 노을빛으로 물든다. 멀리서 보면 갑옷이 아니라 저무는 해 그 자체 같았다.","neo":"멀리서 보면 갑옷이 아니라 저무는 해 같았다는 이야기가 전한다. 금빛 갑옷 위로 검은 깃이 부채처럼 퍼지고 머리 위 옅은 후광이 노을빛으로 물든다. 두 날개를 활짝 펼친 순간이 가장 화려했다고 한다."},{"key":"angel_duskwing_amulet","name":"황혼을 담은 호박","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/angel_amulet","n":15,"st":"sprites-test/anim-obj/angel_amulet/idle.png","mode":"소문·전설","old":"황혼을 한 조각 떼어 가둔 듯한 호박빛 보석이다. 금빛 날개가 보석을 감싸고 검은 깃 하나가 아래로 길게 드리운다. 해가 완전히 저물면 보석 속 노을도 함께 잠드는데, 이튿날 새벽 다시 켜질 때까지 천사는 그 곁을 떠나지 않았다.","neo":"빛이 기울면 보석 속에서 노을이 돈다는 소문이 있다. 황혼을 한 조각 떼어 담은 듯한 호박빛 보석, 금빛 날개가 감싸고 검은 깃이 길게 드리운다. 그 보석을 본 사람은 다들 한참을 서 있었다더라."},{"key":"angel_rose_rapier","name":"자비의 가는 검","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/angel_rose_rapier","n":15,"st":"sprites-test/anim-obj/angel_rose_rapier/idle.png","mode":"편지·전언","old":"흰 검신에 장미분홍 깃이 돋고 손잡이 위로 옅은 분홍 후광이 돈다. 세라핌은 이 검으로 베기보다 막기를 택했다 — 자비도 칼이 있어야 지킬 수 있다는 걸, 그녀는 오래전부터 알았다.","neo":"나의 세라핌께. 베기보다 막기를 택하신 그대에게 이 가는 검을 보냅니다. 흰 검신에 장미빛 깃이 돋고 손잡이 위로 옅은 분홍 후광이 돕니다. 자비도 칼이 있어야 지킬 수 있음을, 그대는 오래전부터 아셨지요."},{"key":"angel_rose_armor","name":"장미 날개 갑옷","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/angel_rose_armor","n":15,"st":"sprites-test/anim-obj/angel_rose_armor/idle.png","mode":"편지·전언","old":"백금 갑옷 위로 장미분홍 날개가 활짝 펴지고 머리 위 분홍 후광이 은은히 탄다. 분노가 아니라 연민으로 빛나는 유일한 세라핌이라, 그녀 앞에선 적조차 칼을 내렸다.","neo":"나의 세라핌께. 분노가 아니라 연민으로 빛나는 그대를 위해 이 갑옷을 지었습니다. 백금 위로 장미빛 날개가 펴지고 머리 위 분홍 후광이 은은합니다. 그대 앞에선 적조차 칼을 내렸습니다."},{"key":"angel_rose_halo","name":"지지 않는 장미 후광","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/angel_rose_halo","n":15,"st":"sprites-test/anim-obj/angel_rose_halo/idle.png","mode":"편지·전언","old":"옅은 분홍 후광 고리에 장미빛 깃 하나가 매달려 흔들린다. 누군가를 지키려 제 빛을 나눠 줄수록 더 환해지는 후광이라 — 가장 흐린 후광이 실은 가장 많이 베푼 자의 것이었다.","neo":"나의 세라핌께. 마지막으로 이 후광을 전합니다. 누군가를 지키려 빛을 나눌수록 더 환해지는 고리이니, 가장 흐려졌을 때가 가장 많이 베푸신 때입니다. 부디 너무 흐려지기 전에 돌아오십시오."},{"key":"angel_risen_chakram","name":"네가 던진 빛","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/af_chakram","n":15,"st":"sprites-test/anim-obj/af_chakram/idle.png","mode":"2인칭","old":"너는 한 번 떨어졌다. 그리고 다시 일어나 이 빛의 고리를 던졌지. 흑백 깃털이 가장자리를 두르고 가운데로 옅은 후광이 돈다. 돌아올 줄 아는 자만 던질 수 있는 무기다.","neo":"너는 한 번 떨어졌고, 다시 일어나 이 빛의 고리를 던졌다. 흑백 깃털이 가장자리를 두르고 가운데로 옅은 후광이 돈다. 돌아올 줄 아는 자만이 던질 수 있는 무기다."},{"key":"angel_risen_mantle","name":"부러진 적 있는 날개","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/af_mantle","n":15,"st":"sprites-test/anim-obj/af_mantle/idle.png","mode":"2인칭","old":"이 망토는 펼치면 한 쌍의 큰 날개가 된다. 잿빛과 흰빛 깃털이 켜켜이 겹쳐 누구보다 넓게 퍼진다. 한 번 꺾였던 깃들이라는데, 추락을 아는 날개가 가장 멀리 난다. 부러져 본 깃만이 그 말을 제 몸으로 증명할 수 있었다.","neo":"너의 이 망토는 펼치면 한 쌍의 큰 날개가 된다. 잿빛과 흰빛 깃이 켜켜이 겹쳐 누구보다 넓게 퍼진다. 한 번 꺾여 본 깃이라야 가장 멀리 난다는 걸, 너는 이제 안다."},{"key":"angel_risen_brooch","name":"되찾은 후광","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/af_brooch","n":15,"st":"sprites-test/anim-obj/af_brooch/idle.png","mode":"2인칭","old":"잃어버렸던 후광을 작은 고리에 담아 가슴에 단추처럼 달았다. 한때 머리 위에서 빛나던 것이 이제 심장 곁에서 함께 뛴다. 높이 떠 있을 때보다, 가장 가까이 둔 지금이 더 환하다.","neo":"너는 잃었던 후광을 작은 고리에 담아 가슴에 달았다. 한때 머리 위에서 빛나던 것이 이제 심장 곁에서 함께 뛴다. 완벽하진 않아도 네 것이다. 너에겐 그거면 충분하다."},{"key":"angel_cherub_bow","name":"두근 화살","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/aw_bow","n":15,"st":"sprites-test/anim-obj/aw_bow/idle.png","mode":"대화극","old":"구름 위에서 제일 인기 많은 장난감이다. 금빛 하트 활에 깃 달린 화살 — 맞으면 누구든 옆에 있는 사람이 갑자기 좋아 보인다나. 꼬마 천사는 오늘도 구름 뒤에 숨어 활시위를 당긴다.","neo":"「또 누구 맞히려고.」 「쉿, 고르는 중이야.」 구름 위에서 제일 인기 많은 금빛 하트 활, 맞으면 옆 사람이 갑자기 좋아 보인다나. 꼬마 천사는 오늘도 구름 뒤에 숨어 시위를 당긴다."},{"key":"angel_cherub_armor","name":"구름 갑옷","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/aw_armor","n":15,"st":"sprites-test/anim-obj/aw_armor/idle.png","mode":"대화극","old":"구름을 뭉쳐 만든 꼬마 천사의 갑옷이다. 폭신해 보여도 화살 하나 안 통한다나. 가슴 한가운데 금빛 날개 돋친 별이 박히고, 목깃엔 작은 푸른 보석이 둘렸다. 입은 본인은 '이래 봬도 갑옷'이라며 으쓱댄다.","neo":"「그게 갑옷이라고?」 「이래 봬도 화살 하나 안 통해.」 구름을 뭉쳐 만든 꼬마 천사의 갑옷, 가슴 한가운데 금빛 날개 돋친 별이 박혔다. 폭신해 보여도 본인은 잔뜩 으쓱댄다."},{"key":"angel_cherub_halo","name":"구름 두른 금 후광","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/aw_halo","n":15,"st":"sprites-test/anim-obj/aw_halo/idle.png","mode":"대화극","old":"꼬마 천사가 어디서 주워 왔는지, 제 머리보다 큰 황금 후광을 구름에 받쳐 두르고 다닌다. 날개 장식까지 달린 게 영 격에 안 맞지만 — 본인은 “이쯤은 돼야 천사지” 하며 잔뜩 으스댄다. 구름 위에선 다들, 저 후광이 곧 한쪽으로 기울 거라고 내기를 건다.","neo":"「그 후광 좀 큰 거 아니야?」 「이쯤은 돼야 천사지!」 제 머리보다 큰 황금 후광을 구름에 받쳐 두른 꼬마 천사. 날개 장식까지 달린 게 영 격에 안 맞지만, 곧 한쪽으로 기울 거라고 다들 내기를 건다."},{"key":"angel_vesper_halberd","name":"빛바랜 맹세","slot":"weapon","region":"타락천사","dir":"sprites-test/anim-obj/av_halberd","n":15,"st":"sprites-test/anim-obj/av_halberd/idle.png","mode":"비문·운문","old":"오래된 천사상이 들고 있던 창이다. 날개 모양 도끼날에 색이 바랜 금 후광이 걸렸다. 자루엔 닳아 희미해진 비문 한 줄 — '빛이 옅어져도, 약속은 옅어지지 않는다.'","neo":"빛이 옅어져도 약속은 옅어지지 않는다. 오래된 천사상이 들고 있던 창, 날개 모양 도끼날에 색 바랜 금 후광이 걸렸다. 자루엔 닳아 희미해진 비문 한 줄이 남아 있다."},{"key":"angel_penitent_drape","name":"사슬과 한쪽 날개","slot":"armor","region":"타락천사","dir":"sprites-test/anim-obj/angel_penitent_drape","n":15,"st":"sprites-test/anim-obj/angel_penitent_drape/idle.png","mode":"비문·운문","old":"부서진 사슬을 어깨에 두르고, 한쪽엔 잿빛으로 바랜 날개만 남았다. 다 꺼지기 전 마지막 한 줌의 빛을 사슬 끝에 매달고, 그는 외길을 걷는다 — 한쪽 날개로는 날 수 없어도, 끝까지 가는 법만은 잊지 않았다.","neo":"한쪽 날개로는 날 수 없어도 끝까지 가는 법은 잊지 않는다. 부서진 사슬을 어깨에 두르고 잿빛으로 바랜 날개 하나만 남았다. 다 꺼지기 전 마지막 한 줌의 빛을 사슬 끝에 매달고, 그는 외길을 걷는다."},{"key":"angel_vesper_ring","name":"마지막 빛고리","slot":"accessory","region":"타락천사","dir":"sprites-test/anim-obj/av_ring","n":15,"st":"sprites-test/anim-obj/av_ring/idle.png","mode":"비문·운문","old":"천사가 마지막으로 남긴 빛 한 조각을 금 고리에 박아 넣었다. 이 반지를 낀 사람은 그 빛을 다 쓰기 전에 다음 사람에게 물려줘야 한다. 그렇게 천사의 빛은 한곳에 머물지 않고 손에서 손으로 이어졌다.","neo":"한곳에 머물지 않아야 빛은 꺼지지 않는다. 천사가 남긴 빛 한 조각을 금 고리에 박았다. 이 반지를 낀 자는 빛을 다 쓰기 전에 다음 사람에게 물려줘야 한다. 그렇게 빛은 손에서 손으로 이어졌다."},{"key":"orc_hunter_boomerang","name":"돌아오는 뼈","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/orc_hunter_boomerang","n":15,"st":"sprites-test/anim-obj/orc_hunter_boomerang/idle.png","mode":"2인칭","old":"짐승 뼈를 깎아 만든 부메랑이다. 던지면 사냥감을 맞히고 제 손으로 돌아온다 — “안 돌아오면 그게 어디 부메랑이냐”는 게 사냥꾼 지론. 청록 깃이 도는 소리로 적은 뒤늦게 안다, 이미 늦었다는 걸.","neo":"던졌으면 돌아올 것을 믿어라. 짐승 뼈를 깎아 만든 이 부메랑은 사냥감을 맞히고 제 손으로 돌아온다. 청록 깃이 도는 소리를 적이 들었다면, 이미 늦은 것이다."},{"key":"orc_hunter_boots","name":"소리 없는 가죽 부츠","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/orc_hunter_boots","n":15,"st":"sprites-test/anim-obj/orc_hunter_boots/idle.png","mode":"2인칭","old":"짐승 가죽과 털을 덧대 지은 사냥용 부츠다. 밑창에 이끼를 깔아 진창에서도 발소리 하나 새지 않는다. 사냥꾼들 사이엔 이런 말이 있다 — “좋은 사냥꾼은 흔적을 남기지 않고, 더 좋은 사냥꾼은 흔적을 읽는다.”","neo":"발자국을 남기기 전에 끝내라. 짐승 가죽과 털로 지은 이 부츠는 밑창에 이끼를 깔아 진창에서도 소리가 없다. 좋은 사냥꾼은 흔적을 남기지 않고, 더 좋은 사냥꾼은 흔적을 읽는다."},{"key":"orc_hunter_earring","name":"엄니 귀고리","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/orc_hunter_earring","n":15,"st":"sprites-test/anim-obj/orc_hunter_earring/idle.png","mode":"2인칭","old":"잡은 짐승의 가장 큰 엄니를 깎아 귀에 걸었다. 청록 깃과 뼈 구슬을 함께 엮었는데, 더 큰 짐승의 엄니를 구할 때마다 바꿔 달았다. 귀가 무거워질수록 그의 이름도 부족에서 무거워졌다.","neo":"더 큰 짐승을 잡거든 엄니를 바꿔 달아라. 가장 큰 엄니를 깎아 청록 깃과 뼈 구슬을 엮은 귀고리다. 귀가 무거워질수록 네 이름도 부족에서 무거워진다."},{"key":"orc_shaman_staff","name":"묻지 않는 지팡이","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/os_staff","n":15,"st":"sprites-test/anim-obj/os_staff/idle.png","mode":"문답·수수께끼","old":"노인이 답을 모를 때만 꺼내 드는 지팡이다. 뼈와 깃털, 마른 약초가 매달려 바람에 사락거린다. 노인은 묻는 이에게 답하는 대신 지팡이를 바람에 맡기고 그 소리에 오래 귀를 기울인다 — 서두른 입보다 먼저, 바람이 길을 일러 준다고 믿었기 때문이다.","neo":"묻는다. 답을 모를 땐 무엇에게 묻는가. 노인은 뼈와 깃털, 마른 약초를 매단 이 지팡이를 바람에 맡긴다. 서두른 입보다 먼저 바람이 길을 일러 준다고 믿어, 사락이는 소리에 오래 귀를 기울였다."},{"key":"orc_shaman_robe","name":"깃털 두른 침묵","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/os_robe","n":15,"st":"sprites-test/anim-obj/os_robe/idle.png","mode":"문답·수수께끼","old":"수십 마리 새의 깃털과 가죽을 기워 만든 샤먼의 옷이다. 뼈 장식이 걸음마다 달그락거린다. 이 옷을 입은 자에게는 아무도 먼저 말을 걸지 않는다 — 그가 입을 열 때까지 기다리는 게 부족의 오랜 금기다.","neo":"묻는다. 이 옷을 입은 자에게 왜 아무도 먼저 말을 걸지 않는가. 수십 마리 새의 깃털과 가죽을 기운 샤먼의 옷, 뼈 장식이 걸음마다 달그락인다. 그가 입을 열 때까지 기다리는 게 부족의 오랜 금기다."},{"key":"orc_shaman_banner","name":"조상의 깃발","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/os_banner","n":15,"st":"sprites-test/anim-obj/os_banner/idle.png","mode":"문답·수수께끼","old":"낡은 가죽에 깃털과 구슬을 매단 깃발이다. 노인은 큰일을 앞두면 이걸 부족 한가운데 꽂아 둔다. 깃발이 어느 쪽으로 눕는지, 구슬이 어떤 소리로 우는지를 보고 부족은 떠날 때와 머물 때를 정했다 — 깃발은 명령하지 않고, 다만 먼저 알려 줄 뿐이다.","neo":"묻는다. 떠날 때와 머물 때를 어떻게 아는가. 낡은 가죽에 깃털과 구슬을 매단 이 깃발을 부족 한가운데 꽂아 둔다. 어느 쪽으로 눕는지, 구슬이 어떤 소리로 우는지를 보고 정했다. 깃발은 명령하지 않고 먼저 알려 줄 뿐이다."},{"key":"orc_ancestor_maul","name":"조상이 쥔 자루","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/oa_maul","n":15,"st":"sprites-test/anim-obj/oa_maul/idle.png","mode":"비문·운문","old":"마울 머리에 부족을 세운 조상의 얼굴이 큼지막이 새겨졌다. 엄니를 드러낸 그 얼굴 아래로 깃과 구슬이 매달려 흔들린다. 큰 싸움을 앞두면 전사들은 이 얼굴에 이마를 맞대고 이름을 부른다 — 그러면 조상이 한 번 더 팔에 힘을 보탠다고 믿었다.","neo":"이름을 부르면 조상이 팔에 힘을 보탠다. 마울 머리에 부족을 세운 조상의 얼굴이 큼지막이 새겨졌고, 엄니 아래로 깃과 구슬이 흔들린다. 큰 싸움 앞에서 전사들은 이 얼굴에 이마를 맞댄다."},{"key":"orc_ancestor_mask","name":"조상의 얼굴","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/oa_mask","n":15,"st":"sprites-test/anim-obj/oa_mask/idle.png","mode":"비문·운문","old":"축제와 전쟁, 두 날에만 꺼내는 가면이다. 흰 뼈에 붉은 칠로 조상의 얼굴을 새기고 양옆에 깃털을 늘어뜨렸다. 이 가면을 쓴 자는 제 이름 대신 조상의 이름으로 불린다.","neo":"오늘 하루, 너는 네 이름이 아니다. 흰 뼈에 붉은 칠로 조상의 얼굴을 새기고 양옆에 깃을 늘어뜨린 가면. 축제와 전쟁, 두 날에만 꺼내며 쓴 자는 조상의 이름으로 불린다."},{"key":"orc_ancestor_bracelet","name":"손목에 감은 조상","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/oa_bracelet","n":15,"st":"sprites-test/anim-obj/oa_bracelet/idle.png","mode":"비문·운문","old":"먼 길을 떠나는 전사는 이 뼈 팔찌를 손목에 감는다. 조상의 얼굴을 새긴 뼈 구슬 사이로 작은 어금니가 달그락거린다. 외로운 밤, 손목을 쥐고 있으면 부족 전체가 등 뒤에 선 것 같았다.","neo":"손목을 쥐면 부족 전체가 등 뒤에 선다. 조상의 얼굴을 새긴 뼈 구슬 사이로 작은 어금니가 달그락인다. 먼 길을 떠나는 전사가 이 팔찌를 감는 건, 외로운 밤을 견디기 위함이다."},{"key":"orc_ironfang_axe","name":"산을 쪼갠 날","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/orc_axe","n":15,"st":"sprites-test/anim-obj/orc_axe/idle.png","mode":"1인칭 무용담","old":"들어봐, 무쇠엄니 도끼 이야기다. 붉게 칠한 쇳날에 뼈와 쇠사슬 자루 — 이놈을 치켜들면 적들이 먼저 뒷걸음쳤지! 바위? 한 방에 둘로 쪼갰어. 산도 슬그머니 길을 비켰다니까. 못 믿겠다는 얼굴인데… 그럼 네가 한 번 들어보든가.","neo":"들어봐, 무쇠엄니 도끼 이야기다. 붉게 칠한 쇳날에 뼈와 쇠사슬 자루, 이놈을 치켜들면 적들이 먼저 뒷걸음쳤지. 바위? 한 방에 둘로 쪼갰어. 못 믿겠으면 네가 한 번 들어보든가."},{"key":"orc_ironfang_shield","name":"한 발도 안 밀린 방패","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/orc_shield","n":15,"st":"sprites-test/anim-obj/orc_shield/idle.png","mode":"1인칭 무용담","old":"이 방패 뒤에서 무쇠엄니는 단 한 발도 안 물러섰다! 뼈 테두리에 붉은 무늬, 적이 산처럼 밀려와도 꿈쩍을 안 했지. 그날 살아 돌아온 놈들? 죄다 이 뒤에 숨어 있었어. 어이, 너도 겁나면 이쪽으로 와라.","neo":"이 방패 뒤에서 나는 단 한 발도 안 물러섰다. 뼈 테두리에 붉은 무늬, 적이 산처럼 밀려와도 꿈쩍 안 했지. 그날 살아 돌아온 놈들은 죄다 이 뒤에 숨어 있었어. 겁나면 너도 이쪽으로 와라."},{"key":"orc_ironfang_necklace","name":"엄니에 새긴 무용담","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/orc_necklace","n":15,"st":"sprites-test/anim-obj/orc_necklace/idle.png","mode":"1인칭 무용담","old":"엄니 하나가 이긴 싸움 하나야. 무쇠엄니 목에 엄니가 몇 개였냐고? 세다가 다 포기했다! 쇠구슬에 붉은 끈, 절그럭절그럭 — 그 소리만 나도 애송이들은 줄행랑쳤지. 영감은 씩 웃으며 그랬어, '이게 다 내 무용담이야.'","neo":"엄니 하나가 이긴 싸움 하나야. 내 목에 엄니가 몇 개였냐고? 세다 포기했다. 쇠구슬에 붉은 끈, 절그럭절그럭 그 소리만 나도 애송이들은 줄행랑쳤지. 이게 다 내 무용담이다."},{"key":"orc_drum_maul","name":"두드리는 북채","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/orc_drum_maul","n":15,"st":"sprites-test/anim-obj/orc_drum_maul/idle.png","mode":"대화극","old":"뼈와 나무로 만든 큼지막한 북채 마울이다. 원래 북을 치던 건데, 어쩌다 적도 잘 두들기더란다. 부족 악사 왈 — “박자만 맞으면 다 음악이지.”","neo":"「그건 북채잖아.」 「적도 잘 두들겨지던데?」 뼈와 나무로 만든 큼지막한 북채 마울. 원래 북을 치던 건데 어쩌다 전장에서 더 잘 들더란다. 부족 악사 왈, 박자만 맞으면 다 음악이지."},{"key":"orc_drum_shield","name":"북이 된 방패","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/orc_drum_shield","n":15,"st":"sprites-test/anim-obj/orc_drum_shield/idle.png","mode":"대화극","old":"가죽을 팽팽히 메운 전쟁북을 그대로 방패로 쓴다. 적의 일격을 막을 때마다 둥! 하고 울려 — 막는 게 곧 북소리라, 이 부족은 싸우는 내내 노래를 멈추지 않았다.","neo":"「막다가 노래가 되겠어.」 「그게 우리 방식이야.」 가죽을 팽팽히 멘 전쟁북을 그대로 방패로 쓴다. 일격을 막을 때마다 둥 하고 울려, 이 부족은 싸우는 내내 노래를 멈추지 않았다."},{"key":"orc_grumble_tankard","name":"한 잔의 보람","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/ow_tankard","n":15,"st":"sprites-test/anim-obj/ow_tankard/idle.png","mode":"대화극","old":"하루 일이 끝나면 영감은 이 찌그러진 잔부터 채운다. 무쇠 잔 한가운데 제 얼굴을 닮은 오크가 새겨졌는데, '멋있으라고 직접 새겼다'나. 한 모금 들이켜고 나오는 말은 늘 똑같다 — '오늘도 잘 두들겼다.'","neo":"「오늘은 좀 두들겼나?」 「오늘도 잘 두들겼지.」 하루 일이 끝나면 영감은 이 찌그러진 무쇠 잔부터 채운다. 한가운데 제 얼굴을 닮은 오크가 새겨졌는데, 멋있으라고 직접 새겼단다."},{"key":"orc_thunder_axe","name":"천둥을 문 도끼","slot":"weapon","region":"오크 부락","dir":"sprites-test/anim-obj/orc_thunder_axe","n":15,"st":"sprites-test/anim-obj/orc_thunder_axe/idle.png","mode":"소문·전설","old":"들어봐, 폭풍 부족 이야기다. 뼈로 깎은 짐승 머리 아래 청동 날, 휘두르면 날을 따라 푸른 번개가 우지끈 인다! 천둥이 도끼를 따라오는 건지 도끼가 천둥을 부르는 건지 — 글쎄, 그건 맞아 본 놈만 아는데 아무도 말이 없더라.","neo":"폭풍 부족 이야기 들어봤나. 뼈로 깎은 짐승 머리 아래 청동 날, 휘두르면 날을 따라 푸른 번개가 우지끈 인다고 한다. 천둥이 도끼를 따르는지 도끼가 천둥을 부르는지는, 맞아 본 놈만 안다더라."},{"key":"orc_thunder_chest","name":"벼락 맞고도 선 가슴","slot":"armor","region":"오크 부락","dir":"sprites-test/anim-obj/orc_thunder_chest","n":15,"st":"sprites-test/anim-obj/orc_thunder_chest/idle.png","mode":"소문·전설","old":"이 흉갑을 두른 전사는 벼락을 정통으로 맞고도 안 쓰러졌다! 청동 판에 새긴 무늬를 따라 푸른 번개가 지금도 타닥타닥 돈다. 한 번 벼락을 먹고도 버틴 가슴은, 그다음부턴 어떤 천둥소리에도 눈 하나 깜짝 안 한다나. 믿거나 말거나.","neo":"벼락을 정통으로 맞고도 안 쓰러진 전사가 있었다는 말이 전한다. 청동 판에 새긴 무늬를 따라 푸른 번개가 지금도 타닥인다. 한 번 벼락을 먹고 버틴 가슴은 그다음부턴 어떤 천둥에도 눈 하나 깜짝 안 한다나."},{"key":"orc_thunder_charm","name":"폭풍을 가둔 부적","slot":"accessory","region":"오크 부락","dir":"sprites-test/anim-obj/orc_thunder_charm","n":15,"st":"sprites-test/anim-obj/orc_thunder_charm/idle.png","mode":"소문·전설","old":"폭풍 부족 족장이 처음으로 잡은 번개를 가둬 두었다는 보석 부적이다. 뼈와 청동 사이에서 푸른 빛이 타닥 튈 때마다, 먼 하늘이 낮게 우르릉 답한다. 부족은 이 부적이 우는 날이면 큰비가 온다는 걸 알고 미리 가죽을 거뒀다.","neo":"족장이 처음 잡은 번개를 보석에 가뒀다는 이야기가 있다. 뼈와 청동 사이 푸른 빛이 타닥 튈 때마다 먼 하늘이 낮게 답한다. 이 부적이 우는 날이면 큰비가 온다는 걸 알고, 부족은 미리 가죽을 거뒀다고 한다."}];const SLOT={"weapon":"무기","armor":"방어구","accessory":"장신구"};
const LS='storyqa-v1';const RV=JSON.parse(localStorage.getItem(LS)||'{}');const save=()=>localStorage.setItem(LS,JSON.stringify(RV));
const CH=[['keep','이전 유지'],['impold','이전에서 개선'],['adopt','변경(개선본 채택)'],['impnew','변경본에서 개선']];
const app=document.getElementById('app');const anims=[];let cur='';
DATA.forEach((it,i)=>{
 if(it.region!==cur){cur=it.region;const h=document.createElement('h2');h.textContent=it.region;app.appendChild(h);}
 const d=RV[it.key]||(RV[it.key]={pick:'',note:''});
 const hasAnim=!!it.dir;const src=hasAnim?it.dir+'/0.png':it.st;
 const c=document.createElement('div');c.className='card';
 c.innerHTML='<div><img class="shot" src="'+src+'" '+(hasAnim?'data-dir="'+it.dir+'" data-n="'+it.n+'"':'')+'></div>'+
   '<div><div class="nm">'+it.name+'<span class="sl">'+(SLOT[it.slot]||'')+'</span><span class="mode">'+it.mode+'</span></div>'+
   '<div class="box old"><span class="lb">이전</span>'+it.old+'</div>'+
   '<div class="box neo"><span class="lb">개선</span>'+it.neo+'</div>'+
   '<div class="ch">'+CH.map(([v,t])=>'<label data-v="'+v+'"><input type="radio" name="r'+i+'">'+t+'</label>').join('')+'</div>'+
   '<textarea class="note" placeholder="개선 사유 / 추가 요청을 적어 주세요">'+(d.note||'')+'</textarea></div>';
 app.appendChild(c);
 const img=c.querySelector('.shot');if(hasAnim){img._anim=true;anims.push({img,dir:it.dir,n:it.n,i:0});}
 const note=c.querySelector('.note');
 const refl=()=>{c.querySelectorAll('.ch label').forEach(l=>l.classList.toggle('on',l.dataset.v===d.pick));note.classList.toggle('show',d.pick==='impold'||d.pick==='impnew');};
 c.querySelectorAll('.ch label').forEach(l=>l.addEventListener('click',()=>{d.pick=l.dataset.v;l.querySelector('input').checked=true;save();refl();upd();}));
 note.addEventListener('input',()=>{d.note=note.value;save();});
 refl();
});
let last=0;function tick(t){if(t-last>=110){last=t;for(const o of anims){if(o.img._anim){o.i=(o.i+1)%o.n;o.img.src=o.dir+'/'+o.i+'.png';}}}requestAnimationFrame(tick);}requestAnimationFrame(tick);
function cnt(){return Object.values(RV).filter(v=>v.pick).length;}
function upd(){document.getElementById('ct').textContent='총 '+DATA.length+'종 · 선택 '+cnt()+'개';}upd();
const LBL={keep:'이전 유지',impold:'이전에서 개선',adopt:'변경 채택',impnew:'변경본에서 개선'};
document.getElementById('copy').onclick=()=>{const L=['[스토리 결정 — 108종]'];let r='';
 DATA.forEach(it=>{const d=RV[it.key]||{};if(!d.pick)return;if(it.region!==r){r=it.region;L.push('');L.push('== '+it.region+' ==');}
  L.push('· '+it.name+': '+(LBL[d.pick]||d.pick)+((d.pick==='impold'||d.pick==='impnew')&&d.note?(' — '+d.note):''));});
 const t=L.length>1?L.join('\n'):'(선택 없음)';const o=document.getElementById('out');o.classList.add('show');o.value=t;o.select();if(navigator.clipboard)navigator.clipboard.writeText(t);};
document.getElementById('clr').onclick=()=>{if(confirm('선택을 모두 지울까요?')){localStorage.removeItem(LS);location.reload();}};
</script></body></html>
