  .rej textarea{font:inherit;font-size:10px;width:100%;box-sizing:border-box;border:1px solid #2a2b34;border-radius:5px;background:#0c0d12;color:#f0c8c8;padding:4px;resize:vertical;min-height:30px}

  .cmpc .ch{font-size:12px;color:#c9cad3;margin-bottom:6px}.cmpc .ch .fld{font-size:9px;font-weight:800;background:#23303f;color:#8ab6e0;border-radius:4px;padding:1px 5px;margin-left:4px}

<p class="sub">지역 × 세트별 정렬 · 각 아이템마다 이름/스토리/애니 리젝사유를 적고 [제출용 복사]로 내보내세요. 입력은 자동 저장됩니다.</p>

<h2 id="cmph" style="display:none">🔧 변경 검토 (왕국·늪지대) — 전/후 비교 후 롤백·채택·추가리젝 선택</h2>
<div id="cmp"></div>
<div id="app"></div>
<script>
const DATA = [{"region":"왕국","sets":[[{"name":"무도회의 한 수","lore":"리본을 풀기 전까진 나도 그저 춤추는 손님이다. 와인빛 끈을 풀어 이 가는 검을 드러내는 순간, 무도회는 결투가 되지. 오늘 밤엔 나를 화나게 하지 않는 편이 좋을 거야.","dir":"sprites-test/anim-obj/kingdom_masque_saber","n":15,"st":"sprites-test/anim-obj/kingdom_masque_saber/idle.png","slot":"weapon"},{"name":"이름 없는 드레스","lore":"이 검정 드레스를 입는 밤이면 나는 나를 옷장에 두고 온다. 금실과 와인빛 단 속에 남는 건 이름도 얼굴도 없는 누군가. 가장 화려한 드레스는 가장 화려한 비밀을 두르는 법이니까.","dir":"sprites-test/anim-obj/kingdom_masque_gown","n":15,"st":"sprites-test/anim-obj/kingdom_masque_gown/idle.png","slot":"armor"},{"name":"이름을 가린 가면","lore":"이 가면을 쓰면 하룻밤 신분도 죄도 가려진다. 나는 이 얼굴 뒤에서 무엇이든 될 수 있어. 다만 무도회가 끝나고 가면을 벗을 그 순간만은, 나도 조금 두렵다.","dir":"sprites-test/anim-obj/kingdom_masque_mask","n":15,"st":"sprites-test/anim-obj/kingdom_masque_mask/idle.png","slot":"accessory"}],[{"name":"행렬의 창","lore":"친애하는 그대에게. 대관 행렬의 맨 앞, 사자 문장을 새긴 이 금빛 창이 지나거든 길을 비키고 노래를 한 소절 보태 주오. 창끝의 푸른 보석이 길 위에 파란 별을 흩뿌릴 것이오.","dir":"sprites-test/anim-obj/kingdom_spear","n":15,"st":"sprites-test/anim-obj/kingdom_spear/idle.png","slot":"weapon"},{"name":"별을 두른 망토","lore":"오늘 밤 연회의 주인공께 이 망토를 보냅니다. 로열블루 벨벳에 금실이 강처럼 흐르고 보석이 별처럼 박혔으니, 펼치는 순간 밤하늘을 통째로 두른 듯 보이실 겁니다.","dir":"sprites-test/anim-obj/kingdom_cloak","n":15,"st":"sprites-test/anim-obj/kingdom_cloak/idle.png","slot":"armor"},{"name":"별이 박힌 왕관","lore":"마지막으로 이 왕관을 전합니다. 금테에 푸른 보석과 잔별이 촘촘하여 촛불 아래 가장 환할 것입니다. 이 관이 머리에 얹히거든, 부디 노래의 마지막 소절을 터뜨려 주십시오.","dir":"sprites-test/anim-obj/kingdom_crown","n":15,"st":"sprites-test/anim-obj/kingdom_crown/idle.png","slot":"accessory"}],[{"name":"왕을 짊어진 대검","lore":"왕국에 고하노라. 새 왕은 즉위식에서 이 거대한 대검을 두 손으로 머리 위에 들어 올려야 한다. 금과 로열블루로 치장한 이 검을 든 자만이 왕좌의 무게를 감당할 자격이 있다.","dir":"sprites-test/anim-obj/kc_mace","n":15,"st":"sprites-test/anim-obj/kc_mace/idle.png","slot":"weapon"},{"name":"맹세를 쥔 손","lore":"들으라. 왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡아 즉위한다. 양 손등의 두 왕가 문장이 맞닿는 순간 맹세는 성립되며, 한 번 맞잡은 맹세를 무른 왕은 일찍이 없었다.","dir":"sprites-test/anim-obj/kc_gaunt","n":15,"st":"sprites-test/anim-obj/kc_gaunt/idle.png","slot":"armor"},{"name":"사자의 증표","lore":"대관식의 끝을 선포한다. 새 왕의 목에 사자가 포효하는 이 금 메달을 건다. 왕관은 머리에, 약속은 가슴에. 사자가 가슴에서 함께 숨 쉬는 한 그 약속은 유효하다.","dir":"sprites-test/anim-obj/kc_medallion","n":15,"st":"sprites-test/anim-obj/kc_medallion/idle.png","slot":"accessory"}],[{"name":"풀리지 않는 질문","lore":"묻는다. 답 없는 질문도 칼이 될 수 있는가. 성탑의 검사는 이 은빛 레이피어로 답을 대신했다. 찌르면 칼몸의 빛이 한 번 깜빡이고, 답은 끝내 깜빡이지 않는다. 닳는 것은 검뿐이다.","dir":"sprites-test/anim-obj/kr_rapier","n":15,"st":"sprites-test/anim-obj/kr_rapier/idle.png","slot":"weapon"},{"name":"별을 읽는 외투","lore":"묻는다. 밤하늘을 옷으로 입을 수 있는가. 깊은 청색 천에 금실로 해와 달과 별자리를 수놓은 이 외투가 그 답이다. 별 하나가 자리를 옮길 때마다 자락엔 그 밤의 답이 한 줄씩 적혔다.","dir":"sprites-test/anim-obj/kr_coat","n":15,"st":"sprites-test/anim-obj/kr_coat/idle.png","slot":"armor"},{"name":"대답하지 않는 나침반","lore":"묻는다. 별을 손바닥에 담으면 앞날도 보이는가. 금빛 고리 가운데 푸른 별을 맞추면 그날 밤하늘이 손에 들어온다. 다만 이걸로 사람의 앞날까지 본 자는 하나같이 입을 닫았다.","dir":"sprites-test/anim-obj/kr_astro","n":15,"st":"sprites-test/anim-obj/kr_astro/idle.png","slot":"accessory"}],[{"name":"동트는 맹세","lore":"너는 성문 앞에서 이 검을 처음 받아 든다. 금빛으로 휘어 오른 손잡이, 푸른 가죽 자루, 곧은 강철 양날. 기억해라. 이 검을 든 자는 동이 틀 때까지 자리를 지킨다.","dir":"sprites-test/anim-obj/sword","n":15,"st":"sprites-test/anim-obj/sword/idle.png","slot":"weapon"},{"name":"여명의 벽","lore":"너는 혼자가 아니다. 가슴에 금빛 태양을 새긴 이 은빛 흉갑은 어깨를 맞댈수록 단단해진다. 네가 무릎 꿇으면 옆 사람이 반 발짝 당겨 그 자리를 메운다. 그렇게 늘어선 한 줄을 사람들은 여명의 벽이라 불렀다.","dir":"sprites-test/anim-obj/cuirass","n":15,"st":"sprites-test/anim-obj/cuirass/idle.png","slot":"armor"},{"name":"새벽지기의 표식","lore":"오늘 밤 새벽 차례는 너다. 이 반지를 받아라. 금테 속 네모난 푸른 보석이 별빛을 머금으면 네가 동쪽 하늘을 가장 먼저 맞는 사람이다. 반지는 누구의 것도 아니고 깨어 있는 사람의 것이다.","dir":"sprites-test/anim-obj/ring","n":15,"st":"sprites-test/anim-obj/ring/idle.png","slot":"accessory"}],[{"name":"매발톱 장갑","lore":"왕실 매사냥꾼은 칼을 차지 않는다는 말이 있다. 매의 발톱을 본떠 금으로 벼린 이 장갑이면 충분하다고. 매가 하늘에서 내리꽂듯, 그도 단 한 번에 끝낸다고들 한다.","dir":"sprites-test/anim-obj/kingdom_falcon_claw","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_claw/idle.png","slot":"weapon"},{"name":"매를 받는 토시","lore":"토시가 닳을수록 매와 보낸 시간이 길다는 말이 전해진다. 금테와 매 문장을 새긴 두꺼운 가죽 토시, 매가 앉는 자리라 흠집이 가실 날이 없다. 사냥꾼의 자랑은 늘 이 팔에 있었다고 한다.","dir":"sprites-test/anim-obj/kingdom_falcon_bracer","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_bracer/idle.png","slot":"armor"},{"name":"방울 달린 매 두건","lore":"방울 소리가 신호라는 소문이 있다. 이 두건을 씌우면 매가 눈을 감은 듯 얌전해지고, 사냥꾼이 신호를 주면 그제야 솟구친다고. 딸랑 소리가 나는 순간 하늘에서 그림자가 떨어진다더라.","dir":"sprites-test/anim-obj/kingdom_falcon_hood","n":15,"st":"sprites-test/anim-obj/kingdom_falcon_hood/idle.png","slot":"accessory"}]]},{"region":"늪지대","sets":[[{"name":"이슬로 벼린 검","lore":"여왕께. 새벽 수면의 이슬을 모아 벼렸다는 이 가는 검을 바칩니다. 잠자리 날개로 손잡이를 감고 큰 진주를 박았으니, 휘두르면 아침 안개가 흩날리는 듯 보일 것입니다.","dir":"sprites-test/anim-obj/ml_blade","n":15,"st":"sprites-test/anim-obj/ml_blade/idle.png","slot":"weapon"},{"name":"수련이 피는 드레스","lore":"여왕께. 물 위를 걸으실 때 발끝마다 핀다는 수련을 본떠 이 드레스를 지었습니다. 분홍과 흰 꽃잎을 겹겹이 올리고 진주 이슬을 점점이 맺었으니, 움직이실 때마다 작은 별처럼 구를 것입니다.","dir":"sprites-test/anim-obj/ml_gown","n":15,"st":"sprites-test/anim-obj/ml_gown/idle.png","slot":"armor"},{"name":"진주를 엮은 화관","lore":"여왕께. 가장 오래 산 조개들이 바친 진주로 이 화관을 엮었습니다. 수련 줄기를 둥글게 말고 흰 수련 한 송이를 얹었으니, 이슬 맺힌 새벽엔 멀리서도 여왕이 어디 계신지 알 것입니다.","dir":"sprites-test/anim-obj/ml_tiara","n":15,"st":"sprites-test/anim-obj/ml_tiara/idle.png","slot":"accessory"}],[{"name":"안개가 건넨 곡도","lore":"늪에 들어간 사람은 많아도 돌아온 사람은 드물다고들 한다. 덩굴이 자루를 감고 칼날 옆에 청록 버섯이 돋은 이 곡도는 안개 속에서 주웠다는 이야기뿐. 누가 떨어뜨렸는지는 아무도 모른다.","dir":"sprites-test/anim-obj/marsh_blade","n":15,"st":"sprites-test/anim-obj/marsh_blade/idle.png","slot":"weapon"},{"name":"늪이 삼킨 이끼갑옷","lore":"이끼와 나무껍질이 엉겨 갑옷이 되기까지 몇 해가 걸렸는지 아무도 모른다고 한다. 가슴엔 본 적 없는 청록 무늬가 돋고 갈대 두건이 얼굴을 가렸다. 이걸 입었던 게 사람이긴 했는지조차 말이 엇갈린다.","dir":"sprites-test/anim-obj/marsh_armor","n":15,"st":"sprites-test/anim-obj/marsh_armor/idle.png","slot":"armor"},{"name":"홀리는 등불","lore":"안개 짙은 밤이면 늪 한가운데 작은 불빛이 흔들린다는 소문이 있다. 녹슨 랜턴 속 청록 도깨비불을 따라가면 길이 나온다는 이도, 영영 못 돌아왔다는 이도 있다.","dir":"sprites-test/anim-obj/marsh_lantern","n":15,"st":"sprites-test/anim-obj/marsh_lantern/idle.png","slot":"accessory"}],[{"name":"퉤! 하는 대롱","lore":"「개굴! 쏠 때마다 그런 소리가 난다니까.」 「그거 개구리가 우는 거야, 네가 흉내 내는 거야?」 갈대 대롱에 개구리 한 마리 앉은 이 무기를 두고, 늪에선 아직도 그 논쟁이 한창이다.","dir":"sprites-test/anim-obj/mf_blow","n":15,"st":"sprites-test/anim-obj/mf_blow/idle.png","slot":"weapon"},{"name":"개구리 탈 망토","lore":"「또 따라온다!」 큼지막한 개구리 머리 두건에 수련잎 망토를 두르면 진짜 개구리들이 동료인 줄 알고 졸졸 따라붙는다. 「떼어 내는 게 일이야.」 늪 아이들이 제일 갖고 싶어 하면서도 늘 하는 말이다.","dir":"sprites-test/anim-obj/mf_hood","n":15,"st":"sprites-test/anim-obj/mf_hood/idle.png","slot":"armor"},{"name":"반딧불 충전기","lore":"「불 꺼졌어!」 「흔들어. 자는 거야.」 밤마다 반딧불을 모아 담는 이 유리병, 안에선 작은 개구리가 불빛을 지킨다나. 어두운 길엔 이만 한 게 없지만 반딧불이 잠들면 깨우는 게 일이다.","dir":"sprites-test/anim-obj/mf_jar","n":15,"st":"sprites-test/anim-obj/mf_jar/idle.png","slot":"accessory"}],[{"name":"늪이 건넨 삼지창","lore":"너는 늪을 건넜고, 늪은 가장 좋은 것을 내주었다. 청록 청동을 정교하게 벼린 삼지창, 가운데 에메랄드 수련이 빛난다. 진창에서 이걸 건져 든 너를, 늪은 비로소 제 주인으로 받아들인 것이다.","dir":"sprites-test/anim-obj/mb_trident","n":15,"st":"sprites-test/anim-obj/mb_trident/idle.png","slot":"weapon"},{"name":"늪빛 흉갑","lore":"너는 늪을 건넜고, 늪은 너에게 제 빛깔을 입혔다. 깊은 물에 푸르게 슨 청동 흉갑, 가슴엔 청록 수련 문장이 빛난다. 이 색은 늪을 건너고도 가라앉지 않은 자에게만 남는다.","dir":"sprites-test/anim-obj/mb_chest","n":15,"st":"sprites-test/anim-obj/mb_chest/idle.png","slot":"armor"},{"name":"부르면 모이는 뿔피리","lore":"너는 혼자 싸우지 않아도 된다. 이 청동 뿔피리를 한 번 불면 안개 속 어디선가 늪지기들이 답한다. 수련잎 무늬가 새겨진 주둥이에서 반딧불 같은 빛이 샌다. 부를 줄만 알면 된다.","dir":"sprites-test/anim-obj/mb_horn","n":15,"st":"sprites-test/anim-obj/mb_horn/idle.png","slot":"accessory"}],[{"name":"한 방 작살","lore":"그물은 운이고 작살은 실력이지. 뼈와 늪나무로 깎고 끝에 미늘을 단 이놈에 진주 몇 알을 미끼로 달아 뒀어. 잡히는 게 물고기뿐이면 다행인데, 가끔은 더 이상한 게 걸려 올라온다니까.","dir":"sprites-test/anim-obj/marsh_angler_harpoon","n":15,"st":"sprites-test/anim-obj/marsh_angler_harpoon/idle.png","slot":"weapon"},{"name":"도롱이","lore":"늪에선 기다리는 놈이 다 잡는 거야. 짚과 갈대를 촘촘히 엮은 이 도롱이를 두르고 갈대밭에 가만히 서 있으면, 새도 물고기도 나를 갈대인 줄 안다. 갑옷값도 굳었지, 안 그래?","dir":"sprites-test/anim-obj/marsh_angler_cape","n":15,"st":"sprites-test/anim-obj/marsh_angler_cape/idle.png","slot":"armor"},{"name":"반딧불 통발","lore":"빛을 보고 모인 물고기가 제 발로 들어온다니까. 등에 메는 버들 통발에 반딧불 등을 넣어 미끼로 써. 다만 너무 환하면 정작 물고기는 안 오고 모기만 잔뜩 꼬이는 게 흠이지.","dir":"sprites-test/anim-obj/marsh_angler_creel","n":15,"st":"sprites-test/anim-obj/marsh_angler_creel/idle.png","slot":"accessory"}],[{"name":"길잡이 낫","lore":"묻는다. 낫은 무엇을 베기 위한 것인가. 늪의 안내인은 고개를 젓는다. 이끼 슨 청동 낫 둘레로 반딧불이 길을 그리니, 이건 베는 게 아니라 앞을 가린 갈대만 젖혀 이미 있는 길을 드러내는 도구다.","dir":"sprites-test/anim-obj/marsh_fen_scythe","n":15,"st":"sprites-test/anim-obj/marsh_fen_scythe/idle.png","slot":"weapon"},{"name":"안갯속 길손의 외투","lore":"묻는다. 안갯속에서 어떻게 사라지지 않는가. 이끼빛 외투에 박힌 반딧불이 밤마다 다른 길을 그려 주기 때문이다. 안내인은 길을 외우지 않고, 그를 따라간 자는 같은 길을 두 번 밟지 않는다.","dir":"sprites-test/anim-obj/marsh_fen_cloak","n":15,"st":"sprites-test/anim-obj/marsh_fen_cloak/idle.png","slot":"armor"},{"name":"안내인의 증표","lore":"묻는다. 늪에서 길을 잃지 않는 방법은 무엇인가. 답은 하나, 서로의 빛을 믿는 것. 녹슨 청동 테 속 초록 보석을 들어 보이면, 안갯속 다른 안내인들이 불빛으로 답한다.","dir":"sprites-test/anim-obj/mg_medal","n":15,"st":"sprites-test/anim-obj/mg_medal/idle.png","slot":"accessory"}]]},{"region":"화산","sets":[[{"name":"춤추는 쌍불꽃","lore":"무희가 쌍칼을 엇갈려 돌리면 불의 고리가 떠오른다는 소문이 있다. 금빛 휜 두 날 끝에 주황 불꽃이 일고, 적은 그 궤적에 홀려 한 발 늦게야 베인 걸 알았다고 한다.","dir":"sprites-test/anim-obj/volcano_dancer_daggers","n":15,"st":"sprites-test/anim-obj/volcano_dancer_daggers/idle.png","slot":"weapon"},{"name":"불길 케이프","lore":"무희가 한 바퀴 돌면 자락의 불길이 둥근 고리를 그리며 따라온다고 한다. 주황·붉은 비단 끝이 불꽃으로 타오르니, 관객은 그 궤적에 홀려 무희가 어디로 사라졌는지 보지 못했다더라.","dir":"sprites-test/anim-obj/volcano_dancer_cape","n":15,"st":"sprites-test/anim-obj/volcano_dancer_cape/idle.png","slot":"armor"},{"name":"불꽃 부채","lore":"무희의 부채가 닫히는 순간이 공연의 끝이라는 말이 전해진다. 펼치면 가장자리에 잔불을 가두어 두다가, 마지막에 탁 접으며 그 불을 한꺼번에 풀어놓는다고. 그때가 진짜 불의 시작이었다.","dir":"sprites-test/anim-obj/volcano_dancer_fan","n":15,"st":"sprites-test/anim-obj/volcano_dancer_fan/idle.png","slot":"accessory"}],[{"name":"재에서 당기는 활","lore":"너는 한 번 재가 되어 보았다. 그 자리에서 불사조의 깃을 주워 이 활을 메웠지. 흑요석 몸체에 금빛 불꽃 날개가 펼쳐지고, 시위를 당기면 균열마다 잿불이 살아난다. 너는 누구보다 뜨겁게 다시 탄다.","dir":"sprites-test/anim-obj/volcano_phoenix_bow","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_bow/idle.png","slot":"weapon"},{"name":"다시 타오른 가슴","lore":"너는 한 번 무너져 보았다. 그래서 이 갑옷이 네 가슴에 맞는다. 흑요석 판을 가르고 금빛 날개가 솟았고, 균열 사이 잿불이 들숨처럼 깊어졌다 풀린다. 부서진 자리를 아는 너만이 그 자리를 다시 채운다.","dir":"sprites-test/anim-obj/volcano_phoenix_cuirass","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_cuirass/idle.png","slot":"armor"},{"name":"꺼지지 않는 깃","lore":"네가 주저앉는 밤이면 이 깃이 먼저 일어선다. 금빛 깃털 끝에 잿불 한 점이 매달려 숨을 고르고, 바람이 거셀수록 더 또렷이 탄다. 불사조가 너에게 남긴 단 한 올이다.","dir":"sprites-test/anim-obj/volcano_phoenix_pendant","n":15,"st":"sprites-test/anim-obj/volcano_phoenix_pendant/idle.png","slot":"accessory"}],[{"name":"재를 다스리는 곡도","lore":"산에 고하노라. 여제가 이 곡도를 한 번 들면 그것으로 명령은 끝이다. 금빛 휜 날의 루비가 산속 불을 끌어오면 칼끝에서 잔불이 흘러 재가 스스로 길을 비킨다. 여제가 가리킨 곳은 곧 불의 영토다.","dir":"sprites-test/anim-obj/vg_blade","n":15,"st":"sprites-test/anim-obj/vg_blade/idle.png","slot":"weapon"},{"name":"용암으로 짠 드레스","lore":"선포하노라. 이 드레스는 베틀이 아니라 분화구에서 났다. 녹은 금을 실로 뽑아 짜고 루비 불씨를 박았으니, 걸친 자가 용암을 맨발로 밟아도 데지 않는다. 화산이 그녀를 제 주인으로 인정한 증표다.","dir":"sprites-test/anim-obj/vg_gown","n":15,"st":"sprites-test/anim-obj/vg_gown/idle.png","slot":"armor"},{"name":"불씨를 얹은 보관","lore":"고하노라. 이 보관이 여제의 머리에 얹히는 순간 불꽃들이 일제히 고개를 든다. 녹은 금 위에 큰 루비가 앉고 끝마다 작은 불꽃이 산다. 이 불이 사그라드는 날, 여제의 시대도 저문다.","dir":"sprites-test/anim-obj/vg_tiara","n":15,"st":"sprites-test/anim-obj/vg_tiara/idle.png","slot":"accessory"}],[{"name":"비늘을 깬 부리","lore":"다들 큰 검을 들고 갔지만 나는 이 곡괭이를 챙겼다. 비늘은 검을 튕겨내니까. 검은 강철 부리에 붉은 비늘 손잡이, 나는 이걸로 비늘 한 장을 정확히 꿰뚫었다. 용을 잡는 건 힘이 아니라 한 점이더라.","dir":"sprites-test/anim-obj/vs_pick","n":15,"st":"sprites-test/anim-obj/vs_pick/idle.png","slot":"weapon"},{"name":"용을 노려본 투구","lore":"나는 용과 정면으로 눈을 맞췄다. 검은 강철에 붉은 용비늘을 덧대고 두 뿔 사이로 잿불이 도는 이 투구를 쓰고서. 불길이 얼굴을 핥아도 나는 눈을 감지 않았다. 두 뿔이 아직 그날의 열기를 머금고 있다.","dir":"sprites-test/anim-obj/vs_helm","n":15,"st":"sprites-test/anim-obj/vs_helm/idle.png","slot":"armor"},{"name":"베어 낸 송곳니","lore":"나는 용을 벤 뒤 송곳니 하나를 뽑아 목에 걸었다. 강철 띠로 밑동을 감고 붉은 보석과 깃털을 매달았지. 누가 무용을 물으면 나는 한마디만 한다. 한 마리. 그게 내가 말한 유일한 자랑이다.","dir":"sprites-test/anim-obj/vs_fang","n":15,"st":"sprites-test/anim-obj/vs_fang/idle.png","slot":"accessory"}],[{"name":"재를 가르는 칼","lore":"묻는다. 다 식은 화산 자리엔 무엇이 남는가. 재뿐이다. 흑요석을 휘어 벼린 이 칼이 붉게 달면 잿더미에 묻혔던 길과 형체가 되살아난다. 무엇을 베러 가느냐 물으면 그자는 늘 답을 미뤘다.","dir":"sprites-test/anim-obj/ve_blade","n":15,"st":"sprites-test/anim-obj/ve_blade/idle.png","slot":"weapon"},{"name":"식지 않는 흉갑","lore":"묻는다. 다 식은 줄 알았던 것을 두드리면 무엇이 나오는가. 흑요석 판을 이어 붙인 이 흉갑은 판 사이로 붉은 잿불이 숨 쉰다. 두드리면 속에서 아직 뜨거운 기운이 올라온다.","dir":"sprites-test/anim-obj/ve_plate","n":15,"st":"sprites-test/anim-obj/ve_plate/idle.png","slot":"armor"},{"name":"재가 흐르는 모래시계","lore":"묻는다. 화산은 언제 깨어나는가. 흑요석 모래시계 속 잿불이 모래처럼 흐르지만, 신기하게도 바닥까지 떨어지는 법이 없다. 아직 완전히 잠들지는 않았다는 뜻이라고들 한다.","dir":"sprites-test/anim-obj/ve_hourglass","n":15,"st":"sprites-test/anim-obj/ve_hourglass/idle.png","slot":"accessory"}],[{"name":"불에서 난 언월","lore":"불에서 났으니 불을 두려워 말라. 용이 스러진 자리에 신전이 섰고, 그 뼈를 깎아 이 언월도를 벼렸다. 흑요석 날을 타고 용암이 흐르니, 치켜들면 용의 마지막 숨이 다시 타오른다.","dir":"sprites-test/anim-obj/volcano_glaive","n":15,"st":"sprites-test/anim-obj/volcano_glaive/idle.png","slot":"weapon"},{"name":"용골 방패","lore":"산을 태우던 용도 끝내 한 줌 비늘로 남았다. 가장 두꺼운 등비늘과 갈비뼈로 지은 이 방패, 검은 면을 용암이 핏줄처럼 흐른다. 그 앞에서 불길은 고개를 숙인다. 불을 가장 잘 아는 건 용이었으니.","dir":"sprites-test/anim-obj/volcano_coat","n":15,"st":"sprites-test/anim-obj/volcano_coat/idle.png","slot":"armor"},{"name":"잠들지 않는 용안","lore":"죽어 뼈가 되어도 눈은 감기지 않았다. 금테 속 호박빛 용안이 화로 위에서 밤이 깊을수록 천천히 깜빡인다. 제가 지키던 산을 끝까지 내려다보려는 듯, 한 번 깜빡일 때마다 산속 불씨도 함께 깜빡인다.","dir":"sprites-test/anim-obj/volcano_dragoneye","n":15,"st":"sprites-test/anim-obj/volcano_dragoneye/idle.png","slot":"accessory"}]]},{"region":"신전","sets":[[{"name":"무지개를 문 지팡이","lore":"무녀께. 축일에 드실 지팡이를 올립니다. 백대리석 자루 끝 수정이 무지개로 타오르거든 그 빛을 천장으로 흘려보내 주십시오. 색이 쏟아지는 그 순간을 사람들은 수정의 노래라 부릅니다.","dir":"sprites-test/anim-obj/sf_staff","n":15,"st":"sprites-test/anim-obj/sf_staff/idle.png","slot":"weapon"},{"name":"빛으로 짠 예복","lore":"무녀께. 축일의 예복을 지어 올립니다. 흰 비단에 금실을 흘리고 가슴과 소매에 수정을 별처럼 박았으니, 걸음마다 빛이 잘게 부서져 멀리선 별무리가 걸어오는 듯 보일 것입니다.","dir":"sprites-test/anim-obj/sf_dress","n":15,"st":"sprites-test/anim-obj/sf_dress/idle.png","slot":"armor"},{"name":"새벽빛 관","lore":"무녀께. 예복 위에 마지막으로 얹을 관을 전합니다. 금빛 날개가 수정을 떠받치고 옅은 별빛 후광이 돕니다. 관이 첫 음을 내면 신전의 모든 수정이 같은 음으로 떨며 답할 것입니다.","dir":"sprites-test/anim-obj/sf_diadem","n":15,"st":"sprites-test/anim-obj/sf_diadem/idle.png","slot":"accessory"}],[{"name":"비추는 은부채","lore":"묻는다. 마주한 자가 제 모습을 보면 어떤 표정을 짓는가. 거울처럼 닦은 은 부채를 펼치면 살마다 빛이 되비친다. 비친 얼굴은 늘 조금 일그러져 있었는데, 신전 사람들은 그게 숨긴 마음이라 했다.","dir":"sprites-test/anim-obj/tc_blade","n":15,"st":"sprites-test/anim-obj/tc_blade/idle.png","slot":"weapon"},{"name":"되비추는 거울 방패","lore":"묻는다. 가장 조용히 이기는 방어구는 무엇인가. 거울 면을 가진 이 둥근 방패는 날아오는 것을 그대로 되비춰 돌려보낸다. 칼이 아니라 제 얼굴을 들이미니, 그 앞에서 싸움은 늘 머쓱하게 멎었다.","dir":"sprites-test/anim-obj/tc_shawl","n":15,"st":"sprites-test/anim-obj/tc_shawl/idle.png","slot":"armor"},{"name":"거울 너머의 열쇠","lore":"묻는다. 자물쇠도 없이 무엇을 여는가. 열쇠 손잡이의 작은 거울엔 이곳이 아니라 문 너머가 비친다. 짝이 되는 거울에 비춰야 열린다는데, 거울 속 그 풍경을 찾아낸 자는 아직 아무도 없다.","dir":"sprites-test/anim-obj/tc_key","n":15,"st":"sprites-test/anim-obj/tc_key/idle.png","slot":"accessory"}],[{"name":"갈라진 거석의 주먹","lore":"각성 첫째 날. 거석은 천 년을 잠들어 있었다. 돌주먹을 끼고 제단을 세 번 두드리자 잿빛 돌에 금이 가고 그 틈으로 금빛 불이 새어 나왔다. 세 번째 울림에 거석이 눈을 떴다. 신전이 다시 걷기 시작했다.","dir":"sprites-test/anim-obj/tg_fist","n":15,"st":"sprites-test/anim-obj/tg_fist/idle.png","slot":"weapon"},{"name":"안에서 타오르는 갑옷","lore":"각성 셋째 날. 거석과 같은 돌을 깎아 이 갑옷을 지었다. 잿빛 표면의 균열 안에서 금빛 불이 주인의 맥박에 맞춰 밝아졌다 잦아든다. 이 갑옷을 두른 자는 거석처럼 한 발도 물러서지 않았다.","dir":"sprites-test/anim-obj/tg_armor","n":15,"st":"sprites-test/anim-obj/tg_armor/idle.png","slot":"armor"},{"name":"잠들지 않는 심장석","lore":"각성 마지막 기록. 거석의 가슴에서 심장석을 떼어 냈다. 잿빛 돌의 금 사이로 금빛이 들고나는데, 가만히 보면 숨을 쉬는 것 같다. 품은 자는 좀처럼 지치지 않았다. 거석의 끈기가 옮아온 모양이다.","dir":"sprites-test/anim-obj/tg_stone","n":15,"st":"sprites-test/anim-obj/tg_stone/idle.png","slot":"accessory"}],[{"name":"봄을 겨눈 석궁","lore":"겨눈 곳에 봄이 온다. 신전 가장 높은 자리에 걸렸던 석궁, 흰 대리석 몸체에 식지 않는 청록 룬이 흐른다. 개머리판의 비문은 단 한 줄, 서리 신전에서 가장 따뜻한 말이다.","dir":"sprites-test/anim-obj/temple_bow","n":15,"st":"sprites-test/anim-obj/temple_bow/idle.png","slot":"weapon"},{"name":"맑은 서리의 관","lore":"분노도 두려움도 서리처럼 가라앉는다. 흰 대리석에 금테를 두르고 청록 룬이 관자놀이를 따라 흐르는 투구. 룬이 차게 빛나는 동안엔 오직 또렷한 판단만 남아, 큰 결정 앞의 신관이 먼저 썼다.","dir":"sprites-test/anim-obj/temple_helm","n":15,"st":"sprites-test/anim-obj/temple_helm/idle.png","slot":"armor"},{"name":"식지 않는 심장","lore":"가장 추운 밤에도 이 빛은 식지 않았다. 대리석과 금 틀 안에서 청록 룬을 새긴 수정구가 천천히 돌며 빛난다. 신전의 등불이 모두 얼어붙은 밤에도 홀로 타올라, 사람들은 이를 신전의 심장이라 불렀다.","dir":"sprites-test/anim-obj/temple_orb","n":15,"st":"sprites-test/anim-obj/temple_orb/idle.png","slot":"accessory"}],[{"name":"묻고 두드리는 장봉","lore":"「길이 어느 쪽입니까.」 노승은 답 대신 장봉으로 땅을 한 번 두드렸다. 옥 염주가 사락이고, 울림이 멎을 때까지 그는 입을 열지 않았다. 「서두르는 마음부터 가라앉히게. 길은 늘 그다음에 보이네.」","dir":"sprites-test/anim-obj/temple_monk_staff","n":15,"st":"sprites-test/anim-obj/temple_monk_staff/idle.png","slot":"weapon"},{"name":"한쪽 어깨 띠","lore":"「가진 것이 그뿐입니까.」 「이 천 한 장이면 족하네.」 한쪽 어깨에만 두른 주황 천, 매듭마다 옥 구슬과 부적이 달려 걸음마다 사락인다. 「가진 게 적으면 어디든 갈 수 있거든.」","dir":"sprites-test/anim-obj/temple_monk_sash","n":15,"st":"sprites-test/anim-obj/temple_monk_sash/idle.png","slot":"armor"},{"name":"흔들리는 향로","lore":"「연기가 흩어집니다.」 「그럼 무언가 다가온다는 뜻이지.」 사슬에 매단 놋 향로에서 향 연기가 끊임없이 오른다. 곧게 오르면 마음이 고요하다는 뜻. 노승은 말없이 연기만 보아도 둘레의 기척을 읽었다.","dir":"sprites-test/anim-obj/temple_monk_censer","n":15,"st":"sprites-test/anim-obj/temple_monk_censer/idle.png","slot":"accessory"}],[{"name":"기적인 척 지팡이","lore":"기적은 자세가 반이니라. 이 지팡이를 번쩍 들고 빛을 보아라 외치면 일단 다들 엎드리거든. 끝의 금별은 어젯밤 닦아 광낸 거고 방울은 시장 떨이지만, 약발은 잘 들어. 오늘도 헛기침 한 번 하고 치켜든다.","dir":"sprites-test/anim-obj/tw_staff","n":15,"st":"sprites-test/anim-obj/tw_staff/idle.png","slot":"weapon"},{"name":"자칭 훈장 사제복","lore":"이게 다 기적이지. 받은 적 없는 훈장을 직접 만들어 잔뜩 달았더니 걸을 때마다 절그럭댄다. 무슨 공로냐 물으면 그냥 얼버무리면 돼. 단점이 하나, 무거워서 오래는 못 서 있다는 거.","dir":"sprites-test/anim-obj/tw_robe","n":15,"st":"sprites-test/anim-obj/tw_robe/idle.png","slot":"armor"},{"name":"철사로 띄운 후광","lore":"성자라면 후광이 떠 있어야지. 가는 철사로 금테를 머리 위에 띄웠다. 살짝 비뚤어졌지만 멀리서 보면 그럴듯해. 바람에 흔들리면? 그건 하늘의 응답이라고 우기면 된다.","dir":"sprites-test/anim-obj/tw_halo","n":15,"st":"sprites-test/anim-obj/tw_halo/idle.png","slot":"accessory"}]]},{"region":"타락천사","sets":[[{"name":"나비 레이피어","lore":"관찰 1일차. 무지갯빛 나비 날개를 손잡이에 단 가는 검. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 핀다. 스친 자는 상처보다 먼저 흩날리는 빛가루에 정신을 빼앗긴다고 적어 둔다.","dir":"sprites-test/anim-obj/angel_papillon_rapier","n":15,"st":"sprites-test/anim-obj/angel_papillon_rapier/idle.png","slot":"weapon"},{"name":"나비 드레스","lore":"관찰 4일차. 무지갯빛 나비 날개를 통째로 두른 듯한 흰 드레스. 한 발짝마다 수백 장의 날개가 숨 쉬듯 색을 바꾼다. 같은 색을 두 번 본 적이 없어, 그림으로 남기길 포기했다.","dir":"sprites-test/anim-obj/angel_papillon_gown","n":15,"st":"sprites-test/anim-obj/angel_papillon_gown/idle.png","slot":"armor"},{"name":"나비 떼 브로치","lore":"관찰 9일차. 금테 안에 수십 마리 나비가 내려앉은 브로치. 주인의 숨결에 맞춰 날개를 여닫는다. 설레면 빠르게, 가라앉으면 천천히. 기분을 가장 먼저 들키는 물건이라 기록한다.","dir":"sprites-test/anim-obj/angel_papillon_brooch","n":15,"st":"sprites-test/anim-obj/angel_papillon_brooch/idle.png","slot":"accessory"}],[{"name":"노을이 앉는 검","lore":"황혼의 날개가 이 검을 들면 하늘이 잠깐 숨을 멈춘다는 말이 있다. 황금 날개가 손잡이를 감고 칼날엔 황혼빛이 흐른다. 검은 깃 하나가 흔들릴 때마다 노을이 칼끝에 내려앉는다고들 한다.","dir":"sprites-test/anim-obj/angel_sword","n":15,"st":"sprites-test/anim-obj/angel_sword/idle.png","slot":"weapon"},{"name":"저무는 해의 날개","lore":"멀리서 보면 갑옷이 아니라 저무는 해 같았다는 이야기가 전한다. 금빛 갑옷 위로 검은 깃이 부채처럼 퍼지고 머리 위 옅은 후광이 노을빛으로 물든다. 두 날개를 활짝 펼친 순간이 가장 화려했다고 한다.","dir":"sprites-test/anim-obj/angel_armor","n":15,"st":"sprites-test/anim-obj/angel_armor/idle.png","slot":"armor"},{"name":"황혼을 담은 호박","lore":"빛이 기울면 보석 속에서 노을이 돈다는 소문이 있다. 황혼을 한 조각 떼어 담은 듯한 호박빛 보석, 금빛 날개가 감싸고 검은 깃이 길게 드리운다. 그 보석을 본 사람은 다들 한참을 서 있었다더라.","dir":"sprites-test/anim-obj/angel_amulet","n":15,"st":"sprites-test/anim-obj/angel_amulet/idle.png","slot":"accessory"}],[{"name":"자비의 가는 검","lore":"나의 세라핌께. 베기보다 막기를 택하신 그대에게 이 가는 검을 보냅니다. 흰 검신에 장미빛 깃이 돋고 손잡이 위로 옅은 분홍 후광이 돕니다. 자비도 칼이 있어야 지킬 수 있음을, 그대는 오래전부터 아셨지요.","dir":"sprites-test/anim-obj/angel_rose_rapier","n":15,"st":"sprites-test/anim-obj/angel_rose_rapier/idle.png","slot":"weapon"},{"name":"장미 날개 갑옷","lore":"나의 세라핌께. 분노가 아니라 연민으로 빛나는 그대를 위해 이 갑옷을 지었습니다. 백금 위로 장미빛 날개가 펴지고 머리 위 분홍 후광이 은은합니다. 그대 앞에선 적조차 칼을 내렸습니다.","dir":"sprites-test/anim-obj/angel_rose_armor","n":15,"st":"sprites-test/anim-obj/angel_rose_armor/idle.png","slot":"armor"},{"name":"지지 않는 장미 후광","lore":"나의 세라핌께. 마지막으로 이 후광을 전합니다. 누군가를 지키려 빛을 나눌수록 더 환해지는 고리이니, 가장 흐려졌을 때가 가장 많이 베푸신 때입니다. 부디 너무 흐려지기 전에 돌아오십시오.","dir":"sprites-test/anim-obj/angel_rose_halo","n":15,"st":"sprites-test/anim-obj/angel_rose_halo/idle.png","slot":"accessory"}],[{"name":"네가 던진 빛","lore":"너는 한 번 떨어졌고, 다시 일어나 이 빛의 고리를 던졌다. 흑백 깃털이 가장자리를 두르고 가운데로 옅은 후광이 돈다. 돌아올 줄 아는 자만이 던질 수 있는 무기다.","dir":"sprites-test/anim-obj/af_chakram","n":15,"st":"sprites-test/anim-obj/af_chakram/idle.png","slot":"weapon"},{"name":"부러진 적 있는 날개","lore":"너의 이 망토는 펼치면 한 쌍의 큰 날개가 된다. 잿빛과 흰빛 깃이 켜켜이 겹쳐 누구보다 넓게 퍼진다. 한 번 꺾여 본 깃이라야 가장 멀리 난다는 걸, 너는 이제 안다.","dir":"sprites-test/anim-obj/af_mantle","n":15,"st":"sprites-test/anim-obj/af_mantle/idle.png","slot":"armor"},{"name":"되찾은 후광","lore":"너는 잃었던 후광을 작은 고리에 담아 가슴에 달았다. 한때 머리 위에서 빛나던 것이 이제 심장 곁에서 함께 뛴다. 완벽하진 않아도 네 것이다. 너에겐 그거면 충분하다.","dir":"sprites-test/anim-obj/af_brooch","n":15,"st":"sprites-test/anim-obj/af_brooch/idle.png","slot":"accessory"}],[{"name":"두근 화살","lore":"「또 누구 맞히려고.」 「쉿, 고르는 중이야.」 구름 위에서 제일 인기 많은 금빛 하트 활, 맞으면 옆 사람이 갑자기 좋아 보인다나. 꼬마 천사는 오늘도 구름 뒤에 숨어 시위를 당긴다.","dir":"sprites-test/anim-obj/aw_bow","n":15,"st":"sprites-test/anim-obj/aw_bow/idle.png","slot":"weapon"},{"name":"구름 갑옷","lore":"「그게 갑옷이라고?」 「이래 봬도 화살 하나 안 통해.」 구름을 뭉쳐 만든 꼬마 천사의 갑옷, 가슴 한가운데 금빛 날개 돋친 별이 박혔다. 폭신해 보여도 본인은 잔뜩 으쓱댄다.","dir":"sprites-test/anim-obj/aw_armor","n":15,"st":"sprites-test/anim-obj/aw_armor/idle.png","slot":"armor"},{"name":"구름 두른 금 후광","lore":"「그 후광 좀 큰 거 아니야?」 「이쯤은 돼야 천사지!」 제 머리보다 큰 황금 후광을 구름에 받쳐 두른 꼬마 천사. 날개 장식까지 달린 게 영 격에 안 맞지만, 곧 한쪽으로 기울 거라고 다들 내기를 건다.","dir":"sprites-test/anim-obj/aw_halo","n":15,"st":"sprites-test/anim-obj/aw_halo/idle.png","slot":"accessory"}],[{"name":"빛바랜 맹세","lore":"빛이 옅어져도 약속은 옅어지지 않는다. 오래된 천사상이 들고 있던 창, 날개 모양 도끼날에 색 바랜 금 후광이 걸렸다. 자루엔 닳아 희미해진 비문 한 줄이 남아 있다.","dir":"sprites-test/anim-obj/av_halberd","n":15,"st":"sprites-test/anim-obj/av_halberd/idle.png","slot":"weapon"},{"name":"사슬과 한쪽 날개","lore":"한쪽 날개로는 날 수 없어도 끝까지 가는 법은 잊지 않는다. 부서진 사슬을 어깨에 두르고 잿빛으로 바랜 날개 하나만 남았다. 다 꺼지기 전 마지막 한 줌의 빛을 사슬 끝에 매달고, 그는 외길을 걷는다.","dir":"sprites-test/anim-obj/angel_penitent_drape","n":15,"st":"sprites-test/anim-obj/angel_penitent_drape/idle.png","slot":"armor"},{"name":"마지막 빛고리","lore":"한곳에 머물지 않아야 빛은 꺼지지 않는다. 천사가 남긴 빛 한 조각을 금 고리에 박았다. 이 반지를 낀 자는 빛을 다 쓰기 전에 다음 사람에게 물려줘야 한다. 그렇게 빛은 손에서 손으로 이어졌다.","dir":"sprites-test/anim-obj/av_ring","n":15,"st":"sprites-test/anim-obj/av_ring/idle.png","slot":"accessory"}]]},{"region":"오크 부락","sets":[[{"name":"돌아오는 뼈","lore":"던졌으면 돌아올 것을 믿어라. 짐승 뼈를 깎아 만든 이 부메랑은 사냥감을 맞히고 제 손으로 돌아온다. 청록 깃이 도는 소리를 적이 들었다면, 이미 늦은 것이다.","dir":"sprites-test/anim-obj/orc_hunter_boomerang","n":15,"st":"sprites-test/anim-obj/orc_hunter_boomerang/idle.png","slot":"weapon"},{"name":"소리 없는 가죽 부츠","lore":"발자국을 남기기 전에 끝내라. 짐승 가죽과 털로 지은 이 부츠는 밑창에 이끼를 깔아 진창에서도 소리가 없다. 좋은 사냥꾼은 흔적을 남기지 않고, 더 좋은 사냥꾼은 흔적을 읽는다.","dir":"sprites-test/anim-obj/orc_hunter_boots","n":15,"st":"sprites-test/anim-obj/orc_hunter_boots/idle.png","slot":"armor"},{"name":"엄니 귀고리","lore":"더 큰 짐승을 잡거든 엄니를 바꿔 달아라. 가장 큰 엄니를 깎아 청록 깃과 뼈 구슬을 엮은 귀고리다. 귀가 무거워질수록 네 이름도 부족에서 무거워진다.","dir":"sprites-test/anim-obj/orc_hunter_earring","n":15,"st":"sprites-test/anim-obj/orc_hunter_earring/idle.png","slot":"accessory"}],[{"name":"묻지 않는 지팡이","lore":"묻는다. 답을 모를 땐 무엇에게 묻는가. 노인은 뼈와 깃털, 마른 약초를 매단 이 지팡이를 바람에 맡긴다. 서두른 입보다 먼저 바람이 길을 일러 준다고 믿어, 사락이는 소리에 오래 귀를 기울였다.","dir":"sprites-test/anim-obj/os_staff","n":15,"st":"sprites-test/anim-obj/os_staff/idle.png","slot":"weapon"},{"name":"깃털 두른 침묵","lore":"묻는다. 이 옷을 입은 자에게 왜 아무도 먼저 말을 걸지 않는가. 수십 마리 새의 깃털과 가죽을 기운 샤먼의 옷, 뼈 장식이 걸음마다 달그락인다. 그가 입을 열 때까지 기다리는 게 부족의 오랜 금기다.","dir":"sprites-test/anim-obj/os_robe","n":15,"st":"sprites-test/anim-obj/os_robe/idle.png","slot":"armor"},{"name":"조상의 깃발","lore":"묻는다. 떠날 때와 머물 때를 어떻게 아는가. 낡은 가죽에 깃털과 구슬을 매단 이 깃발을 부족 한가운데 꽂아 둔다. 어느 쪽으로 눕는지, 구슬이 어떤 소리로 우는지를 보고 정했다. 깃발은 명령하지 않고 먼저 알려 줄 뿐이다.","dir":"sprites-test/anim-obj/os_banner","n":15,"st":"sprites-test/anim-obj/os_banner/idle.png","slot":"accessory"}],[{"name":"조상이 쥔 자루","lore":"이름을 부르면 조상이 팔에 힘을 보탠다. 마울 머리에 부족을 세운 조상의 얼굴이 큼지막이 새겨졌고, 엄니 아래로 깃과 구슬이 흔들린다. 큰 싸움 앞에서 전사들은 이 얼굴에 이마를 맞댄다.","dir":"sprites-test/anim-obj/oa_maul","n":15,"st":"sprites-test/anim-obj/oa_maul/idle.png","slot":"weapon"},{"name":"조상의 얼굴","lore":"오늘 하루, 너는 네 이름이 아니다. 흰 뼈에 붉은 칠로 조상의 얼굴을 새기고 양옆에 깃을 늘어뜨린 가면. 축제와 전쟁, 두 날에만 꺼내며 쓴 자는 조상의 이름으로 불린다.","dir":"sprites-test/anim-obj/oa_mask","n":15,"st":"sprites-test/anim-obj/oa_mask/idle.png","slot":"armor"},{"name":"손목에 감은 조상","lore":"손목을 쥐면 부족 전체가 등 뒤에 선다. 조상의 얼굴을 새긴 뼈 구슬 사이로 작은 어금니가 달그락인다. 먼 길을 떠나는 전사가 이 팔찌를 감는 건, 외로운 밤을 견디기 위함이다.","dir":"sprites-test/anim-obj/oa_bracelet","n":15,"st":"sprites-test/anim-obj/oa_bracelet/idle.png","slot":"accessory"}],[{"name":"산을 쪼갠 날","lore":"들어봐, 무쇠엄니 도끼 이야기다. 붉게 칠한 쇳날에 뼈와 쇠사슬 자루, 이놈을 치켜들면 적들이 먼저 뒷걸음쳤지. 바위? 한 방에 둘로 쪼갰어. 못 믿겠으면 네가 한 번 들어보든가.","dir":"sprites-test/anim-obj/orc_axe","n":15,"st":"sprites-test/anim-obj/orc_axe/idle.png","slot":"weapon"},{"name":"한 발도 안 밀린 방패","lore":"이 방패 뒤에서 나는 단 한 발도 안 물러섰다. 뼈 테두리에 붉은 무늬, 적이 산처럼 밀려와도 꿈쩍 안 했지. 그날 살아 돌아온 놈들은 죄다 이 뒤에 숨어 있었어. 겁나면 너도 이쪽으로 와라.","dir":"sprites-test/anim-obj/orc_shield","n":15,"st":"sprites-test/anim-obj/orc_shield/idle.png","slot":"armor"},{"name":"엄니에 새긴 무용담","lore":"엄니 하나가 이긴 싸움 하나야. 내 목에 엄니가 몇 개였냐고? 세다 포기했다. 쇠구슬에 붉은 끈, 절그럭절그럭 그 소리만 나도 애송이들은 줄행랑쳤지. 이게 다 내 무용담이다.","dir":"sprites-test/anim-obj/orc_necklace","n":15,"st":"sprites-test/anim-obj/orc_necklace/idle.png","slot":"accessory"}],[{"name":"두드리는 북채","lore":"「그건 북채잖아.」 「적도 잘 두들겨지던데?」 뼈와 나무로 만든 큼지막한 북채 마울. 원래 북을 치던 건데 어쩌다 전장에서 더 잘 들더란다. 부족 악사 왈, 박자만 맞으면 다 음악이지.","dir":"sprites-test/anim-obj/orc_drum_maul","n":15,"st":"sprites-test/anim-obj/orc_drum_maul/idle.png","slot":"weapon"},{"name":"북이 된 방패","lore":"「막다가 노래가 되겠어.」 「그게 우리 방식이야.」 가죽을 팽팽히 멘 전쟁북을 그대로 방패로 쓴다. 일격을 막을 때마다 둥 하고 울려, 이 부족은 싸우는 내내 노래를 멈추지 않았다.","dir":"sprites-test/anim-obj/orc_drum_shield","n":15,"st":"sprites-test/anim-obj/orc_drum_shield/idle.png","slot":"armor"},{"name":"한 잔의 보람","lore":"「오늘은 좀 두들겼나?」 「오늘도 잘 두들겼지.」 하루 일이 끝나면 영감은 이 찌그러진 무쇠 잔부터 채운다. 한가운데 제 얼굴을 닮은 오크가 새겨졌는데, 멋있으라고 직접 새겼단다.","dir":"sprites-test/anim-obj/ow_tankard","n":15,"st":"sprites-test/anim-obj/ow_tankard/idle.png","slot":"accessory"}],[{"name":"천둥을 문 도끼","lore":"폭풍 부족 이야기 들어봤나. 뼈로 깎은 짐승 머리 아래 청동 날, 휘두르면 날을 따라 푸른 번개가 우지끈 인다고 한다. 천둥이 도끼를 따르는지 도끼가 천둥을 부르는지는, 맞아 본 놈만 안다더라.","dir":"sprites-test/anim-obj/orc_thunder_axe","n":15,"st":"sprites-test/anim-obj/orc_thunder_axe/idle.png","slot":"weapon"},{"name":"벼락 맞고도 선 가슴","lore":"벼락을 정통으로 맞고도 안 쓰러진 전사가 있었다는 말이 전한다. 청동 판에 새긴 무늬를 따라 푸른 번개가 지금도 타닥인다. 한 번 벼락을 먹고 버틴 가슴은 그다음부턴 어떤 천둥에도 눈 하나 깜짝 안 한다나.","dir":"sprites-test/anim-obj/orc_thunder_chest","n":15,"st":"sprites-test/anim-obj/orc_thunder_chest/idle.png","slot":"armor"},{"name":"폭풍을 가둔 부적","lore":"족장이 처음 잡은 번개를 보석에 가뒀다는 이야기가 있다. 뼈와 청동 사이 푸른 빛이 타닥 튈 때마다 먼 하늘이 낮게 답한다. 이 부적이 우는 날이면 큰비가 온다는 걸 알고, 부족은 미리 가죽을 거뒀다고 한다.","dir":"sprites-test/anim-obj/orc_thunder_charm","n":15,"st":"sprites-test/anim-obj/orc_thunder_charm/idle.png","slot":"accessory"}]]}];
const CHANGES = [{"region":"왕국","set":1,"name":"무도회의 한 수","field":"스토리","before":"와인빛 리본을 묶은 가는 금 세이버다. 무도회에선 칼을 빼지 않는 게 예의지만, 이 검을 찬 자가 리본을 풀면 춤은 곧 결투가 됐다. 우아함과 위협은 늘 같은 손끝에 있었다.","after":"리본을 풀기 전까진 나도 그저 춤추는 손님이다. 와인빛 끈을 풀어 이 가는 검을 드러내는 순간, 무도회는 결투가 되지. 오늘 밤엔 나를 화나게 하지 않는 편이 좋을 거야."},{"region":"왕국","set":1,"name":"무도회의 한 수","field":"애니","before":"손잡이 1px 떨림(스크립트 재정렬 보정)","beforeDir":"sprites-test/anim-before/kingdom_masque_saber","afterDir":"sprites-test/anim-obj/kingdom_masque_saber","n":15},{"region":"왕국","set":1,"name":"이름 없는 드레스","field":"스토리","before":"검정 비단에 금실과 와인빛 단을 겹겹이 두른 무도회 드레스다. 입은 사람이 누군지 끝내 아무도 몰랐다 — 가면무도회에서 가장 화려한 드레스는 늘 이름이 없었으니까.","after":"이 검정 드레스를 입는 밤이면 나는 나를 옷장에 두고 온다. 금실과 와인빛 단 속에 남는 건 이름도 얼굴도 없는 누군가. 가장 화려한 드레스는 가장 화려한 비밀을 두르는 법이니까."},{"region":"왕국","set":1,"name":"이름을 가린 가면","field":"스토리","before":"금 세공 위로 와인빛 깃이 솟은 가면이다. 쓰면 신분도 죄도 하룻밤 가려진다. 무도회가 끝나고 가면을 벗는 순간이 가장 두렵다고들 했다 — 가면 뒤의 얼굴을 다시 마주해야 하니까.","after":"이 가면을 쓰면 하룻밤 신분도 죄도 가려진다. 나는 이 얼굴 뒤에서 무엇이든 될 수 있어. 다만 무도회가 끝나고 가면을 벗을 그 순간만은, 나도 조금 두렵다."},{"region":"왕국","set":3,"name":"맹세를 쥔 손","field":"스토리","before":"왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡으며 즉위한다. 왼 손등엔 사자가 으르렁대고, 오른 손등엔 또 다른 왕가의 문장이 새겨졌다. 푸른 법랑이 손가락을 감쌌다. 한 번 맞잡고서 약속을 무른 왕은 없었다.","after":"들으라. 왕은 이 금빛 장갑을 끼고 선왕의 손을 맞잡아 즉위한다. 양 손등의 두 왕가 문장이 맞닿는 순간 맹세는 성립되며, 한 번 맞잡은 맹세를 무른 왕은 일찍이 없었다."},{"region":"왕국","set":3,"name":"사자의 증표","field":"스토리","before":"대관식이 끝나면 새 왕의 목에 이 메달이 걸린다. 금빛 원판 한가운데 사자가 포효하고, 그 위로 푸른 사파이어가 별처럼 박혔다. 왕이 고개를 숙일 때마다 사자도 가슴 위에서 함께 끄덕인다 — '왕관은 머리에, 약속은 가슴에.'","after":"대관식의 끝을 선포한다. 새 왕의 목에 사자가 포효하는 이 금 메달을 건다. 왕관은 머리에, 약속은 가슴에. 사자가 가슴에서 함께 숨 쉬는 한 그 약속은 유효하다."},{"region":"왕국","set":4,"name":"풀리지 않는 질문","field":"스토리","before":"성탑 꼭대기 방엔 답이 없는 질문 하나가 늘 걸려 있었다. 은빛 칼날에 사파이어 손잡이, 칼몸엔 옅은 빛이 한 줄 흐른다. 그 방을 지키던 검사는 평생 그 질문을 곱씹었다는데 — 끝내 답을 찾았는지는, 이 검만이 안다.","after":"묻는다. 답 없는 질문도 칼이 될 수 있는가. 성탑의 검사는 이 은빛 레이피어로 답을 대신했다. 찌르면 칼몸의 빛이 한 번 깜빡이고, 답은 끝내 깜빡이지 않는다. 닳는 것은 검뿐이다."},{"region":"왕국","set":5,"name":"새벽지기의 표식","field":"스토리","before":"근위대에는 모두가 잠든 새벽을 홀로 지키는 한 사람이 있다. 금테 안에 네모난 푸른 보석을 박고 둘레를 푸른빛으로 두른 이 반지가 그 사람의 표식이다. 보석이 별빛을 머금으면 그는 성벽 위에서 가장 먼저 동쪽 하늘을 바라본다. 누군가는 깨어 있어야, 모두가 마음 놓고 잠들 수 있으니까.","after":"오늘 밤 새벽 차례는 너다. 이 반지를 받아라. 금테 속 네모난 푸른 보석이 별빛을 머금으면 네가 동쪽 하늘을 가장 먼저 맞는 사람이다. 반지는 누구의 것도 아니고 깨어 있는 사람의 것이다."},{"region":"왕국","set":6,"name":"매발톱 장갑","field":"애니","before":"손가락 칼날 움직임 없음 → 발톱 굽힘 동작 추가","beforeDir":"sprites-test/anim-before/kingdom_falcon_claw","afterDir":"sprites-test/anim-obj/kingdom_falcon_claw","n":15},{"region":"왕국","set":6,"name":"매를 받는 토시","field":"애니","before":"전체 발광 과함 → 중앙 매 문양만 발광","beforeDir":"sprites-test/anim-before/kingdom_falcon_bracer","afterDir":"sprites-test/anim-obj/kingdom_falcon_bracer","n":15},{"region":"왕국","set":6,"name":"방울 달린 매 두건","field":"이름","before":"눈 가린 매 두건","after":"방울 달린 매 두건"},{"region":"왕국","set":6,"name":"방울 달린 매 두건","field":"스토리","before":"작은 방울이 달린 매 두건이다. 씌우면 매가 얌전해지고, 벗기면 곧장 날아오른다. 방울 소리는 사냥의 신호 — 딸랑, 하는 순간 하늘에서 그림자가 떨어진다.","after":"방울 소리가 신호라는 소문이 있다. 이 두건을 씌우면 매가 눈을 감은 듯 얌전해지고, 사냥꾼이 신호를 주면 그제야 솟구친다고. 딸랑 소리가 나는 순간 하늘에서 그림자가 떨어진다더라."},{"region":"왕국","set":6,"name":"방울 달린 매 두건","field":"애니","before":"번쩍임 과함 → 움직임 유지, 번쩍임 제거","beforeDir":"sprites-test/anim-before/kingdom_falcon_hood","afterDir":"sprites-test/anim-obj/kingdom_falcon_hood","n":15},{"region":"늪지대","set":1,"name":"수련이 피는 드레스","field":"애니","before":"무지개빛 일렁임 끊김 → 부드러운 연속 흐름(정적도 신규 생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/ml_gown","afterDir":"sprites-test/anim-obj/ml_gown","n":15},{"region":"늪지대","set":2,"name":"안개가 건넨 곡도","field":"스토리","before":"늪에 들어간 사람은 많아도, 돌아온 사람은 드물다. 덩굴이 칼자루를 감고 칼날 옆엔 청록빛 버섯이 돋은 이 곡도는 안개 속에서 주웠다고들 한다. 누가 떨어뜨렸는지는 아무도 묻지 않는다 — 늪은 답을 돌려주지 않으니까.","after":"늪에 들어간 사람은 많아도 돌아온 사람은 드물다고들 한다. 덩굴이 자루를 감고 칼날 옆에 청록 버섯이 돋은 이 곡도는 안개 속에서 주웠다는 이야기뿐. 누가 떨어뜨렸는지는 아무도 모른다."},{"region":"늪지대","set":4,"name":"늪이 건넨 삼지창","field":"스토리","before":"너는 늪을 건넜고, 늪은 가장 좋은 것을 내주었다. 청록빛 청동을 정교하게 벼린 삼지창, 가운데엔 에메랄드 수련이 빛난다. 진창에서 이걸 건져 든 자는 — 늪이 비로소 제 주인을 골랐다는 뜻이라 했다.","after":"너는 늪을 건넜고, 늪은 가장 좋은 것을 내주었다. 청록 청동을 정교하게 벼린 삼지창, 가운데 에메랄드 수련이 빛난다. 진창에서 이걸 건져 든 너를, 늪은 비로소 제 주인으로 받아들인 것이다."},{"region":"늪지대","set":5,"name":"도롱이","field":"스토리","before":"짚과 갈대를 엮어 비를 막는 도롱이다. 그물까지 덧대 비 오는 날엔 우비, 사냥 땐 위장이 된다. “늪에선 이게 갑옷이지” — 어부는 갑옷값 굳었다며 늘 싱글거린다.","after":"늪에선 기다리는 놈이 다 잡는 거야. 짚과 갈대를 촘촘히 엮은 이 도롱이를 두르고 갈대밭에 가만히 서 있으면, 새도 물고기도 나를 갈대인 줄 안다. 갑옷값도 굳었지, 안 그래?"},{"region":"늪지대","set":5,"name":"도롱이","field":"애니","before":"물 떨어지는 애니 어색 → 짚자락 흔들림으로 변경","beforeDir":"sprites-test/anim-before/marsh_angler_cape","afterDir":"sprites-test/anim-obj/marsh_angler_cape","n":15},{"region":"늪지대","set":5,"name":"반딧불 통발","field":"스토리","before":"등에 메는 버들 통발인데, 안에 반딧불 등을 넣어 미끼로 쓴다. 빛을 보고 모인 물고기가 제 발로 들어온다나. 가끔 통발이 너무 환하면 — 물고기보다 먼저 도깨비불이 따라붙는다.","after":"빛을 보고 모인 물고기가 제 발로 들어온다니까. 등에 메는 버들 통발에 반딧불 등을 넣어 미끼로 써. 다만 너무 환하면 정작 물고기는 안 오고 모기만 잔뜩 꼬이는 게 흠이지."},{"region":"늪지대","set":5,"name":"반딧불 통발","field":"애니","before":"뒤쪽 원형 빛효과 이상 → 제거, 중앙 반딧불만 발광","beforeDir":"sprites-test/anim-before/marsh_angler_creel","afterDir":"sprites-test/anim-obj/marsh_angler_creel","n":15},{"region":"늪지대","set":6,"name":"길잡이 낫","field":"스토리","before":"늪의 안내인은 검을 들지 않는다. 이끼 슨 청동 낫 둘레로 에메랄드 반딧불이 모여 길을 그린다. 베기 위한 것이 아니라 갈대를 걷어 길을 트기 위한 것 — 따라온 자가 무엇을 보았는지는 늪만 안다.","after":"묻는다. 낫은 무엇을 베기 위한 것인가. 늪의 안내인은 고개를 젓는다. 이끼 슨 청동 낫 둘레로 반딧불이 길을 그리니, 이건 베는 게 아니라 앞을 가린 갈대만 젖혀 이미 있는 길을 드러내는 도구다."},{"region":"늪지대","set":6,"name":"길잡이 낫","field":"애니","before":"위아래 떨림(스크립트 재정렬 보정)","beforeDir":"sprites-test/anim-before/marsh_fen_scythe","afterDir":"sprites-test/anim-obj/marsh_fen_scythe","n":15},{"region":"늪지대","set":6,"name":"안갯속 길손의 외투","field":"스토리","before":"이 외투를 걸친 안내인은 안개 속에서도 사라지지 않는다. 이끼빛 천에 박힌 반딧불이 숨 쉬듯 깜빡여, 뒤따르는 자는 그 빛만 보고 걷는다. 멈추면 빛도 멈추니, 안내인은 결코 뒤를 돌아보지 않는다.","after":"묻는다. 안갯속에서 어떻게 사라지지 않는가. 이끼빛 외투에 박힌 반딧불이 밤마다 다른 길을 그려 주기 때문이다. 안내인은 길을 외우지 않고, 그를 따라간 자는 같은 길을 두 번 밟지 않는다."},{"region":"늪지대","set":6,"name":"안내인의 증표","field":"이름","before":"고인 물의 증표","after":"안내인의 증표"},{"region":"늪지대","set":6,"name":"안내인의 증표","field":"스토리","before":"제단 한가운데 걸려 있던 메달이다. 녹슨 청동 테 안, 고인 물처럼 잔잔한 보석이 창백한 초록빛으로 가라앉아 있다. 들여다본 자는 제 얼굴 대신 가라앉은 신전을 보았다고 한다.","after":"묻는다. 늪에서 길을 잃지 않는 방법은 무엇인가. 답은 하나, 서로의 빛을 믿는 것. 녹슨 청동 테 속 초록 보석을 들어 보이면, 안갯속 다른 안내인들이 불빛으로 답한다."},{"region":"화산","set":1,"name":"불길 케이프","field":"스토리","before":"주황·붉은 비단 자락 끝이 불꽃으로 타오르는 케이프다. 무희가 돌 때마다 불길이 함께 휘날려 — 천이 타는 게 아니라, 천이 곧 불이었다.","after":"무희가 한 바퀴 돌면 자락의 불길이 둥근 고리를 그리며 따라온다고 한다. 주황·붉은 비단 끝이 불꽃으로 타오르니, 관객은 그 궤적에 홀려 무희가 어디로 사라졌는지 보지 못했다더라."},{"region":"화산","set":1,"name":"불꽃 부채","field":"스토리","before":"금살에 붉은 비단을 펴고 가장자리에 잔불이 도는 부채다. 한 번 접었다 펴면 잔불이 확 일어 — 무희의 부채가 닫히는 순간이 공연의 끝이자, 불의 시작이었다.","after":"무희의 부채가 닫히는 순간이 공연의 끝이라는 말이 전해진다. 펼치면 가장자리에 잔불을 가두어 두다가, 마지막에 탁 접으며 그 불을 한꺼번에 풀어놓는다고. 그때가 진짜 불의 시작이었다."},{"region":"화산","set":1,"name":"불꽃 부채","field":"애니","before":"불꽃 번쩍임 과함 → 약하게/제거","beforeDir":"sprites-test/anim-before/volcano_dancer_fan","afterDir":"sprites-test/anim-obj/volcano_dancer_fan","n":15},{"region":"화산","set":2,"name":"재에서 당기는 활","field":"스토리","before":"...한 번 타 버린 활이기에 — 다시 불붙는 법을 안다. (마무리 표현 교체)","after":"너는 한 번 재가 되어 보았다. 그 자리에서 불사조의 깃을 주워 이 활을 메웠지. 흑요석 몸체에 금빛 불꽃 날개가 펼쳐지고, 시위를 당기면 균열마다 잿불이 살아난다. 너는 누구보다 뜨겁게 다시 탄다."},{"region":"화산","set":2,"name":"다시 타오른 가슴","field":"스토리","before":"흑요석 판 위로 금빛 불사조 날개가 솟았다. 균열 사이 잿불이 숨처럼 밝아졌다 잦아드는데, 한 번 무너졌던 자만 이 갑옷을 입는다. 재가 된 자리에서 다시 선 가슴은 두 번 무너지지 않는다.","after":"너는 한 번 무너져 보았다. 그래서 이 갑옷이 네 가슴에 맞는다. 흑요석 판을 가르고 금빛 날개가 솟았고, 균열 사이 잿불이 들숨처럼 깊어졌다 풀린다. 부서진 자리를 아는 너만이 그 자리를 다시 채운다."},{"region":"화산","set":2,"name":"다시 타오른 가슴","field":"애니","before":"1프레임 위아래 움찔 → 스크립트 보정","beforeDir":"sprites-test/anim-before/volcano_phoenix_cuirass","afterDir":"sprites-test/anim-obj/volcano_phoenix_cuirass","n":15},{"region":"화산","set":2,"name":"꺼지지 않는 깃","field":"스토리","before":"금빛 깃털 끝에 작은 잿불이 매달려 깜빡인다. 불사조가 떠나며 남긴 단 한 올이라는데, 거센 바람에도 이 불씨만은 꺼진 적이 없다. 품은 자가 쓰러질 때마다 깃은 한 번씩 더 밝아진다.","after":"네가 주저앉는 밤이면 이 깃이 먼저 일어선다. 금빛 깃털 끝에 잿불 한 점이 매달려 숨을 고르고, 바람이 거셀수록 더 또렷이 탄다. 불사조가 너에게 남긴 단 한 올이다."},{"region":"화산","set":3,"name":"용암으로 짠 드레스","field":"스토리","before":"...산이 그녀를 제 주인으로 안다 → 화산이 그녀를 제 주인으로 안다 (산→화산)","after":"선포하노라. 이 드레스는 베틀이 아니라 분화구에서 났다. 녹은 금을 실로 뽑아 짜고 루비 불씨를 박았으니, 걸친 자가 용암을 맨발로 밟아도 데지 않는다. 화산이 그녀를 제 주인으로 인정한 증표다."},{"region":"화산","set":3,"name":"불씨를 얹은 보관","field":"스토리","before":"여제의 머리에 얹히는 순간, 이 보관의 불씨는 절대 꺼지지 않는다. 녹은 금 위에 큰 루비가 앉고 끝마다 작은 불꽃이 살아 흔들린다. 산이 잠들어도 이 불씨만은 깨어 있어, 다음 여제가 누구인지를 가만히 기다린다.","after":"고하노라. 이 보관이 여제의 머리에 얹히는 순간 불꽃들이 일제히 고개를 든다. 녹은 금 위에 큰 루비가 앉고 끝마다 작은 불꽃이 산다. 이 불이 사그라드는 날, 여제의 시대도 저문다."},{"region":"화산","set":3,"name":"불씨를 얹은 보관","field":"애니","before":"효과 정신없음 → 보석만 고급스럽게 발광(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/vg_tiara","afterDir":"sprites-test/anim-obj/vg_tiara","n":15},{"region":"화산","set":4,"name":"비늘을 깬 부리","field":"스토리","before":"...한 점이더라 → 한 점이다 (어미 변경)","after":"다들 큰 검을 들고 갔지만 나는 이 곡괭이를 챙겼다. 비늘은 검을 튕겨내니까. 검은 강철 부리에 붉은 비늘 손잡이, 나는 이걸로 비늘 한 장을 정확히 꿰뚫었다. 용을 잡는 건 힘이 아니라 한 점이더라."},{"region":"화산","set":4,"name":"용을 노려본 투구","field":"스토리","before":"...이마에 남은 그을음이 그 증거다 (마무리 표현 교체)","after":"나는 용과 정면으로 눈을 맞췄다. 검은 강철에 붉은 용비늘을 덧대고 두 뿔 사이로 잿불이 도는 이 투구를 쓰고서. 불길이 얼굴을 핥아도 나는 눈을 감지 않았다. 두 뿔이 아직 그날의 열기를 머금고 있다."},{"region":"화산","set":4,"name":"용을 노려본 투구","field":"애니","before":"위아래 떨림 → 스크립트 보정","beforeDir":"sprites-test/anim-before/vs_helm","afterDir":"sprites-test/anim-obj/vs_helm","n":15},{"region":"화산","set":4,"name":"베어 낸 송곳니","field":"스토리","before":"...그게 그가 한 유일한 자랑이었다 → 그게 그가 말한 유일한 자랑이었다","after":"나는 용을 벤 뒤 송곳니 하나를 뽑아 목에 걸었다. 강철 띠로 밑동을 감고 붉은 보석과 깃털을 매달았지. 누가 무용을 물으면 나는 한마디만 한다. 한 마리. 그게 내가 말한 유일한 자랑이다."},{"region":"화산","set":4,"name":"베어 낸 송곳니","field":"애니","before":"좌우 떨림 → 스크립트 보정","beforeDir":"sprites-test/anim-before/vs_fang","afterDir":"sprites-test/anim-obj/vs_fang","n":15},{"region":"화산","set":5,"name":"재를 가르는 칼","field":"스토리","before":"화산이 잠든 자리엔 재만 남는다. 검은 흑요석을 휘어 벼린 이 칼에 붉은 빛이 돌면, 한 번 휘두를 때마다 잿가루가 갈라지며 길이 드러난다. 무엇을 베러 가느냐 물으면 그자는 늘 대답을 미뤘다.","after":"묻는다. 다 식은 화산 자리엔 무엇이 남는가. 재뿐이다. 흑요석을 휘어 벼린 이 칼이 붉게 달면 잿더미에 묻혔던 길과 형체가 되살아난다. 무엇을 베러 가느냐 물으면 그자는 늘 답을 미뤘다."},{"region":"화산","set":5,"name":"재가 흐르는 모래시계","field":"스토리","before":"...다 떨어지면 누군가 조용히 다시 뒤집어 둔다고 한다... (모순 제거 재구성)","after":"묻는다. 화산은 언제 깨어나는가. 흑요석 모래시계 속 잿불이 모래처럼 흐르지만, 신기하게도 바닥까지 떨어지는 법이 없다. 아직 완전히 잠들지는 않았다는 뜻이라고들 한다."},{"region":"화산","set":6,"name":"불에서 난 언월","field":"스토리","before":"용이 스러진 자리에 신전이 섰다. 그 뼈를 깎아 만든 언월도는 흑요석 날에 용암이 흐른다. 제단의 시 한 줄이 자루에 새겨져 있다 — '불에서 났으니, 불을 두려워 말라.' 큰 의식 때만 제단에서 내려온다.","after":"불에서 났으니 불을 두려워 말라. 용이 스러진 자리에 신전이 섰고, 그 뼈를 깎아 이 언월도를 벼렸다. 흑요석 날을 타고 용암이 흐르니, 치켜들면 용의 마지막 숨이 다시 타오른다."},{"region":"화산","set":6,"name":"용골 방패","field":"스토리","before":"...불을 가장 잘 아는 건 용 자신이었으니까 (마무리 표현 교체)","after":"산을 태우던 용도 끝내 한 줌 비늘로 남았다. 가장 두꺼운 등비늘과 갈비뼈로 지은 이 방패, 검은 면을 용암이 핏줄처럼 흐른다. 그 앞에서 불길은 고개를 숙인다. 불을 가장 잘 아는 건 용이었으니."},{"region":"화산","set":6,"name":"잠들지 않는 용안","field":"스토리","before":"신전 가장 깊은 곳, 식지 않는 화로 위에 이 펜던트가 걸려 있다. 금테 안 호박빛 용안은 밤에도 천천히 깜빡이는데, 사람들은 용이 아직 어딘가에서 지켜본다는 증표로 여긴다.","after":"죽어 뼈가 되어도 눈은 감기지 않았다. 금테 속 호박빛 용안이 화로 위에서 밤이 깊을수록 천천히 깜빡인다. 제가 지키던 산을 끝까지 내려다보려는 듯, 한 번 깜빡일 때마다 산속 불씨도 함께 깜빡인다."},{"region":"화산","set":6,"name":"잠들지 않는 용안","field":"애니","before":"깜빡임 컨셉 보완 → 눈이 한 번 깜빡(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/volcano_dragoneye","afterDir":"sprites-test/anim-obj/volcano_dragoneye","n":15},{"region":"신전","set":1,"name":"무지개를 문 지팡이","field":"애니","before":"위아래 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/sf_staff","afterDir":"sprites-test/anim-obj/sf_staff","n":15},{"region":"신전","set":1,"name":"새벽빛 관","field":"스토리","before":"예복 위에 마지막으로 얹는 관이다. 금빛 날개가 가운데 수정을 떠받치고 그 위로 옅은 후광이 돈다. 이 관을 쓴 무녀가 손을 들면 신전의 모든 수정이 한꺼번에 화답해 빛났다고 한다.","after":"무녀께. 예복 위에 마지막으로 얹을 관을 전합니다. 금빛 날개가 수정을 떠받치고 옅은 별빛 후광이 돕니다. 관이 첫 음을 내면 신전의 모든 수정이 같은 음으로 떨며 답할 것입니다."},{"region":"신전","set":2,"name":"되비추는 거울 방패","field":"스토리","before":"...신전에서 가장 조용한 방어구다 (마무리 표현 교체)","after":"묻는다. 가장 조용히 이기는 방어구는 무엇인가. 거울 면을 가진 이 둥근 방패는 날아오는 것을 그대로 되비춰 돌려보낸다. 칼이 아니라 제 얼굴을 들이미니, 그 앞에서 싸움은 늘 머쓱하게 멎었다."},{"region":"신전","set":2,"name":"되비추는 거울 방패","field":"애니","before":"거울면 이미지 변화 강조(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/tc_shawl","afterDir":"sprites-test/anim-obj/tc_shawl","n":15},{"region":"신전","set":2,"name":"거울 너머의 열쇠","field":"스토리","before":"열쇠 손잡이에 박힌 작은 거울에는 늘 다른 곳이 비친다 — 지금 여기가 아니라, 이 열쇠가 여는 문 너머가. 대리석과 은으로 깎은 이것을 맞는 거울에 비추면 비로소 열린다는데, 그 거울을 찾은 사람은 아직 없다.","after":"묻는다. 자물쇠도 없이 무엇을 여는가. 열쇠 손잡이의 작은 거울엔 이곳이 아니라 문 너머가 비친다. 짝이 되는 거울에 비춰야 열린다는데, 거울 속 그 풍경을 찾아낸 자는 아직 아무도 없다."},{"region":"신전","set":2,"name":"거울 너머의 열쇠","field":"애니","before":"위아래 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/tc_key","afterDir":"sprites-test/anim-obj/tc_key","n":15},{"region":"신전","set":3,"name":"잠들지 않는 심장석","field":"애니","before":"1프레임 위로 움찔 → 스크립트 보정","beforeDir":"sprites-test/anim-before/tg_stone","afterDir":"sprites-test/anim-obj/tg_stone","n":15},{"region":"신전","set":4,"name":"봄을 겨눈 석궁","field":"스토리","before":"...서리 신전에서 가장 따뜻한 말이라고들 한다 → 가장 따뜻한 말이다","after":"겨눈 곳에 봄이 온다. 신전 가장 높은 자리에 걸렸던 석궁, 흰 대리석 몸체에 식지 않는 청록 룬이 흐른다. 개머리판의 비문은 단 한 줄, 서리 신전에서 가장 따뜻한 말이다."},{"region":"신전","set":4,"name":"맑은 서리의 관","field":"스토리","before":"신관들이 의식 때 쓰던 투구다. 대리석 이마에 금테를 두르고, 청록 룬이 관자놀이를 따라 빛난다. 쓰면 머릿속이 서리처럼 맑아진다고 적혀 있다. 그래서 큰 결정을 앞둔 자에게 먼저 씌웠다.","after":"분노도 두려움도 서리처럼 가라앉는다. 흰 대리석에 금테를 두르고 청록 룬이 관자놀이를 따라 흐르는 투구. 룬이 차게 빛나는 동안엔 오직 또렷한 판단만 남아, 큰 결정 앞의 신관이 먼저 썼다."},{"region":"신전","set":4,"name":"식지 않는 심장","field":"스토리","before":"...신전이 가장 추운 밤에도 이 빛만은 식지 않았다 (해당 문장 교체)","after":"가장 추운 밤에도 이 빛은 식지 않았다. 대리석과 금 틀 안에서 청록 룬을 새긴 수정구가 천천히 돌며 빛난다. 신전의 등불이 모두 얼어붙은 밤에도 홀로 타올라, 사람들은 이를 신전의 심장이라 불렀다."},{"region":"신전","set":5,"name":"묻고 두드리는 장봉","field":"스토리","before":"염주를 감은 수행자의 장봉이다. 답을 구할 땐 땅을 한 번 두드리고 한참을 기다린다. “장봉은 길을 짚는 것이지 가르치는 게 아니다” — 노승은 그 말만 남기고 또 길을 떠났다.","after":"「길이 어느 쪽입니까.」 노승은 답 대신 장봉으로 땅을 한 번 두드렸다. 옥 염주가 사락이고, 울림이 멎을 때까지 그는 입을 열지 않았다. 「서두르는 마음부터 가라앉히게. 길은 늘 그다음에 보이네.」"},{"region":"신전","set":5,"name":"묻고 두드리는 장봉","field":"애니","before":"1프레임 위아래 움찔 → 스크립트 보정","beforeDir":"sprites-test/anim-before/temple_monk_staff","afterDir":"sprites-test/anim-obj/temple_monk_staff","n":15},{"region":"신전","set":5,"name":"한쪽 어깨 띠","field":"이름","before":"한쪽 어깨 가사","after":"한쪽 어깨 띠"},{"region":"신전","set":5,"name":"한쪽 어깨 띠","field":"스토리","before":"한쪽 어깨에만 두르는 주황 가사다. (가사 → 천)","after":"「가진 것이 그뿐입니까.」 「이 천 한 장이면 족하네.」 한쪽 어깨에만 두른 주황 천, 매듭마다 옥 구슬과 부적이 달려 걸음마다 사락인다. 「가진 게 적으면 어디든 갈 수 있거든.」"},{"region":"신전","set":5,"name":"한쪽 어깨 띠","field":"애니","before":"효과 부족 → 구슬 흔들림+은은한 빛 추가","beforeDir":"sprites-test/anim-before/temple_monk_sash","afterDir":"sprites-test/anim-obj/temple_monk_sash","n":15},{"region":"신전","set":5,"name":"흔들리는 향로","field":"스토리","before":"...수행자는 연기를 읽어 길흉을 점쳤다 (앞 내용과 정합되게 교체)","after":"「연기가 흩어집니다.」 「그럼 무언가 다가온다는 뜻이지.」 사슬에 매단 놋 향로에서 향 연기가 끊임없이 오른다. 곧게 오르면 마음이 고요하다는 뜻. 노승은 말없이 연기만 보아도 둘레의 기척을 읽었다."},{"region":"신전","set":5,"name":"흔들리는 향로","field":"애니","before":"1프레임 좌우 틀어짐 → 스크립트 보정","beforeDir":"sprites-test/anim-before/temple_monk_censer","afterDir":"sprites-test/anim-obj/temple_monk_censer","n":15},{"region":"신전","set":6,"name":"기적인 척 지팡이","field":"애니","before":"지팡이 흔들림 → 고정+별 반짝(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/tw_staff","afterDir":"sprites-test/anim-obj/tw_staff","n":15},{"region":"신전","set":6,"name":"자칭 훈장 사제복","field":"애니","before":"발광 위주 → 메달/훈장 흔들림(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/tw_robe","afterDir":"sprites-test/anim-obj/tw_robe","n":15},{"region":"신전","set":6,"name":"철사로 띄운 후광","field":"애니","before":"품질 낮음 → 정적·애니 모두 재생성","beforeDir":"sprites-test/anim-before/tw_halo","afterDir":"sprites-test/anim-obj/tw_halo","n":15},{"region":"타락천사","set":1,"name":"나비 레이피어","field":"스토리","before":"손잡이에 무지갯빛 나비 날개가 달린 가는 검이다. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 섰다. 베인 자리에 핏자국 대신 비늘가루가 남았다는 이야기가 있다.","after":"관찰 1일차. 무지갯빛 나비 날개를 손잡이에 단 가는 검. 휘두르면 날개가 빛을 갈라 잠깐 무지개가 핀다. 스친 자는 상처보다 먼저 흩날리는 빛가루에 정신을 빼앗긴다고 적어 둔다."},{"region":"타락천사","set":1,"name":"나비 레이피어","field":"애니","before":"1프레임 위아래 움찔 → 스크립트 보정","beforeDir":"sprites-test/anim-before/angel_papillon_rapier","afterDir":"sprites-test/anim-obj/angel_papillon_rapier","n":15},{"region":"타락천사","set":1,"name":"나비 드레스","field":"스토리","before":"깃털 대신 무지갯빛 나비 날개가 돋은 흰 드레스다. 빛이 닿는 각도마다 색이 바뀌어, 같은 드레스를 두 번 본 사람이 없었다. 천사가 걸으면 작은 나비들이 뒤를 따랐다.","after":"관찰 4일차. 무지갯빛 나비 날개를 통째로 두른 듯한 흰 드레스. 한 발짝마다 수백 장의 날개가 숨 쉬듯 색을 바꾼다. 같은 색을 두 번 본 적이 없어, 그림으로 남기길 포기했다."},{"region":"타락천사","set":1,"name":"나비 떼 브로치","field":"스토리","before":"금테 안에 작은 나비들이 모여 파스텔빛으로 빛나는 브로치다. 가만히 보면 한 마리씩 날개를 폈다 접는다 — 갇힌 게 아니라 잠시 쉬어 가는 거라고, 천사는 그렇게 말했다.","after":"관찰 9일차. 금테 안에 수십 마리 나비가 내려앉은 브로치. 주인의 숨결에 맞춰 날개를 여닫는다. 설레면 빠르게, 가라앉으면 천천히. 기분을 가장 먼저 들키는 물건이라 기록한다."},{"region":"타락천사","set":1,"name":"나비 떼 브로치","field":"애니","before":"나비가 가운데에서 뿜어져 나오는 느낌으로 개선","beforeDir":"sprites-test/anim-before/angel_papillon_brooch","afterDir":"sprites-test/anim-obj/angel_papillon_brooch","n":15},{"region":"타락천사","set":2,"name":"노을이 앉는 검","field":"스토리","before":"...하늘이 잠깐 숨을 멈춘다더라 → 숨을 멈춘다","after":"황혼의 날개가 이 검을 들면 하늘이 잠깐 숨을 멈춘다는 말이 있다. 황금 날개가 손잡이를 감고 칼날엔 황혼빛이 흐른다. 검은 깃 하나가 흔들릴 때마다 노을이 칼끝에 내려앉는다고들 한다."},{"region":"타락천사","set":2,"name":"저무는 해의 날개","field":"애니","before":"갑옷 발광 → 후광 발광+날개 움직임(정적 재생성, 롤백 가능)","beforeDir":"sprites-test/anim-before/angel_armor","afterDir":"sprites-test/anim-obj/angel_armor","n":15},{"region":"타락천사","set":2,"name":"황혼을 담은 호박","field":"스토리","before":"가슴에 단 호박빛 보석은 황혼을 한 조각 떼어 담은 듯하다. 양옆 금빛 날개가 보석을 감싸고 아래로 검은 깃 하나가 길게 드리운다. 빛이 기울면 보석 속에서 노을이 천천히 도는데, 그걸 본 사람은 다들 한참을 서 있었다.","after":"빛이 기울면 보석 속에서 노을이 돈다는 소문이 있다. 황혼을 한 조각 떼어 담은 듯한 호박빛 보석, 금빛 날개가 감싸고 검은 깃이 길게 드리운다. 그 보석을 본 사람은 다들 한참을 서 있었다더라."},{"region":"타락천사","set":3,"name":"자비의 가는 검","field":"스토리","before":"...그는 오래전에 알았다 → 그녀는 오래전부터 알았다","after":"나의 세라핌께. 베기보다 막기를 택하신 그대에게 이 가는 검을 보냅니다. 흰 검신에 장미빛 깃이 돋고 손잡이 위로 옅은 분홍 후광이 돕니다. 자비도 칼이 있어야 지킬 수 있음을, 그대는 오래전부터 아셨지요."},{"region":"타락천사","set":3,"name":"장미 날개 갑옷","field":"스토리","before":"...그 앞에선 적조차 칼을 내렸다 → 그녀 앞에선 (그→그녀)","after":"나의 세라핌께. 분노가 아니라 연민으로 빛나는 그대를 위해 이 갑옷을 지었습니다. 백금 위로 장미빛 날개가 펴지고 머리 위 분홍 후광이 은은합니다. 그대 앞에선 적조차 칼을 내렸습니다."},{"region":"타락천사","set":3,"name":"지지 않는 장미 후광","field":"스토리","before":"옅은 분홍 후광 고리에 장미빛 깃 하나가 흔들린다. 사랑을 한 번이라도 지켜 낸 자에게만 빛이 보인다는데, 빛이 흐려지면 누군가 대신 지켜 줄 차례라는 뜻이었다.","after":"나의 세라핌께. 마지막으로 이 후광을 전합니다. 누군가를 지키려 빛을 나눌수록 더 환해지는 고리이니, 가장 흐려졌을 때가 가장 많이 베푸신 때입니다. 부디 너무 흐려지기 전에 돌아오십시오."},{"region":"타락천사","set":3,"name":"지지 않는 장미 후광","field":"애니","before":"스크립트(lock-top)로 윗부분이 고정돼 아래만 움직임 → 원본 풀 애니로 되돌림","beforeDir":"sprites-test/anim-before/angel_rose_halo","afterDir":"sprites-test/anim-obj/angel_rose_halo","n":15},{"region":"타락천사","set":4,"name":"부러진 적 있는 날개","field":"스토리","before":"...추락을 아는 날개가 가장 멀리 난다고, 너는 그제야 알았다 (마무리 교체)","after":"너의 이 망토는 펼치면 한 쌍의 큰 날개가 된다. 잿빛과 흰빛 깃이 켜켜이 겹쳐 누구보다 넓게 퍼진다. 한 번 꺾여 본 깃이라야 가장 멀리 난다는 걸, 너는 이제 안다."},{"region":"타락천사","set":4,"name":"되찾은 후광","field":"스토리","before":"잃었던 후광을 다시 단추처럼 가슴에 달았다. 작은 금빛 고리 안에 깃털 하나가 옅게 빛난다. 완벽하진 않아도 — 네 것이다. 그거면 충분하다.","after":"너는 잃었던 후광을 작은 고리에 담아 가슴에 달았다. 한때 머리 위에서 빛나던 것이 이제 심장 곁에서 함께 뛴다. 완벽하진 않아도 네 것이다. 너에겐 그거면 충분하다."},{"region":"타락천사","set":5,"name":"두근 화살","field":"스토리","before":"...활시위를 당긴다, 누굴 맞힐지 고르면서 → '누굴 맞힐지 고르면서' 삭제","after":"「또 누구 맞히려고.」 「쉿, 고르는 중이야.」 구름 위에서 제일 인기 많은 금빛 하트 활, 맞으면 옆 사람이 갑자기 좋아 보인다나. 꼬마 천사는 오늘도 구름 뒤에 숨어 시위를 당긴다."},{"region":"타락천사","set":5,"name":"구름 갑옷","field":"스토리","before":"...양옆 작은 금빛 날개가 파닥이고 별 하나가 콕 박혔다 → 바뀐 이미지(중앙 날개별+푸른 보석 깃)에 맞게 형태 묘사 변경","after":"「그게 갑옷이라고?」 「이래 봬도 화살 하나 안 통해.」 구름을 뭉쳐 만든 꼬마 천사의 갑옷, 가슴 한가운데 금빛 날개 돋친 별이 박혔다. 폭신해 보여도 본인은 잔뜩 으쓱댄다."},{"region":"타락천사","set":5,"name":"구름 두른 금 후광","field":"이름","before":"삐뚤 후광","after":"구름 두른 금 후광"},{"region":"타락천사","set":5,"name":"구름 두른 금 후광","field":"스토리","before":"아무리 똑바로 씌워도 오 분이면 다시 비뚤어진다. 작은 구름이 매달린 이 후광을 두고 구름 위에선 농담처럼 말한다 — 반듯한 후광보다 비뚤어진 후광이 더 자주 웃는다고. (바뀐 이미지=웅장한 금 날개 후광에 맞게 재생성)","after":"「그 후광 좀 큰 거 아니야?」 「이쯤은 돼야 천사지!」 제 머리보다 큰 황금 후광을 구름에 받쳐 두른 꼬마 천사. 날개 장식까지 달린 게 영 격에 안 맞지만, 곧 한쪽으로 기울 거라고 다들 내기를 건다."},{"region":"타락천사","set":6,"name":"사슬과 한쪽 날개","field":"스토리","before":"부서진 사슬을 어깨에 두르고, 한쪽엔 잿빛으로 바랜 날개만 남았다. 한쪽 날개로는 날지 못한다. 그래도 그는 걷는다 — 날 수 없게 된 뒤에야 비로소 어디로 가야 할지 알았으니까. (세트 컨셉에 맞게 재구성)","after":"한쪽 날개로는 날 수 없어도 끝까지 가는 법은 잊지 않는다. 부서진 사슬을 어깨에 두르고 잿빛으로 바랜 날개 하나만 남았다. 다 꺼지기 전 마지막 한 줌의 빛을 사슬 끝에 매달고, 그는 외길을 걷는다."},{"region":"오크 부락","set":1,"name":"돌아오는 뼈","field":"애니","before":"아래위 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/orc_hunter_boomerang","afterDir":"sprites-test/anim-obj/orc_hunter_boomerang","n":15},{"region":"오크 부락","set":1,"name":"소리 없는 가죽 부츠","field":"스토리","before":"짐승 가죽과 털로 지은 사냥용 부츠다. 뼈 장식을 박았어도 진창에서 소리 하나 안 난다. 이 부츠 자국을 본 짐승은 없다 — 발자국이 남기 전에 사냥이 끝나니까.","after":"발자국을 남기기 전에 끝내라. 짐승 가죽과 털로 지은 이 부츠는 밑창에 이끼를 깔아 진창에서도 소리가 없다. 좋은 사냥꾼은 흔적을 남기지 않고, 더 좋은 사냥꾼은 흔적을 읽는다."},{"region":"오크 부락","set":1,"name":"소리 없는 가죽 부츠","field":"애니","before":"움직임이 눈에 안 띔 → 가운데 해골 표정이 바뀌게","beforeDir":"sprites-test/anim-before/orc_hunter_boots","afterDir":"sprites-test/anim-obj/orc_hunter_boots","n":15},{"region":"오크 부락","set":1,"name":"엄니 귀고리","field":"스토리","before":"...엄니 하나가 사냥 하나다 → 더 큰 짐승의 엄니를 구할 때마다 바꿔 달았다","after":"더 큰 짐승을 잡거든 엄니를 바꿔 달아라. 가장 큰 엄니를 깎아 청록 깃과 뼈 구슬을 엮은 귀고리다. 귀가 무거워질수록 네 이름도 부족에서 무거워진다."},{"region":"오크 부락","set":1,"name":"엄니 귀고리","field":"애니","before":"아래위 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/orc_hunter_earring","afterDir":"sprites-test/anim-obj/orc_hunter_earring","n":15},{"region":"오크 부락","set":2,"name":"묻지 않는 지팡이","field":"스토리","before":"이 지팡이는 답을 모를 때 꺼낸다. 뼈와 깃털, 마른 약초가 매달려 바람에 달그락거리는데, 노인은 그 소리를 한참 듣고서야 입을 뗀다. (식상하지 않게 재구성)","after":"묻는다. 답을 모를 땐 무엇에게 묻는가. 노인은 뼈와 깃털, 마른 약초를 매단 이 지팡이를 바람에 맡긴다. 서두른 입보다 먼저 바람이 길을 일러 준다고 믿어, 사락이는 소리에 오래 귀를 기울였다."},{"region":"오크 부락","set":2,"name":"묻지 않는 지팡이","field":"애니","before":"프레임 하단 검은 가로줄(그림자 바) → 스크립트로 제거","beforeDir":"sprites-test/anim-before/os_staff","afterDir":"sprites-test/anim-obj/os_staff","n":15},{"region":"오크 부락","set":2,"name":"깃털 두른 침묵","field":"애니","before":"아래위 미세 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/os_robe","afterDir":"sprites-test/anim-obj/os_robe","n":15},{"region":"오크 부락","set":2,"name":"조상의 깃발","field":"스토리","before":"바람 부는 날이면 노인은 이 깃발을 제일 높은 곳에 건다. 낡은 가죽에 깃털과 구슬이 매달려 사락거리는데, 부족은 그 소리로 날씨와 사냥때를 읽었다. 깃발이 가장 크게 울던 날, 부족은 한 번도 빈손으로 돌아온 적이 없다.","after":"묻는다. 떠날 때와 머물 때를 어떻게 아는가. 낡은 가죽에 깃털과 구슬을 매단 이 깃발을 부족 한가운데 꽂아 둔다. 어느 쪽으로 눕는지, 구슬이 어떤 소리로 우는지를 보고 정했다. 깃발은 명령하지 않고 먼저 알려 줄 뿐이다."},{"region":"오크 부락","set":3,"name":"조상이 쥔 자루","field":"스토리","before":"부족의 가장 오래된 무기다. 자루 끝 두 얼굴은 부족을 세운 두 조상이라 한다... (바뀐 이미지=조상 얼굴 하나에 맞게 재생성)","after":"이름을 부르면 조상이 팔에 힘을 보탠다. 마울 머리에 부족을 세운 조상의 얼굴이 큼지막이 새겨졌고, 엄니 아래로 깃과 구슬이 흔들린다. 큰 싸움 앞에서 전사들은 이 얼굴에 이마를 맞댄다."},{"region":"오크 부락","set":3,"name":"조상의 얼굴","field":"스토리","before":"...이 가면을 쓴 자는 그날 하루, 제 이름 대신 조상의 이름으로 불린다 → '그날 하루' 삭제","after":"오늘 하루, 너는 네 이름이 아니다. 흰 뼈에 붉은 칠로 조상의 얼굴을 새기고 양옆에 깃을 늘어뜨린 가면. 축제와 전쟁, 두 날에만 꺼내며 쓴 자는 조상의 이름으로 불린다."},{"region":"오크 부락","set":3,"name":"손목에 감은 조상","field":"스토리","before":"...조상의 이름을 새긴 뼈 구슬 → 조상의 얼굴을 새긴 뼈 구슬","after":"손목을 쥐면 부족 전체가 등 뒤에 선다. 조상의 얼굴을 새긴 뼈 구슬 사이로 작은 어금니가 달그락인다. 먼 길을 떠나는 전사가 이 팔찌를 감는 건, 외로운 밤을 견디기 위함이다."},{"region":"오크 부락","set":5,"name":"두드리는 북채","field":"애니","before":"아래위 미세 움직임 → 스크립트 보정","beforeDir":"sprites-test/anim-before/orc_drum_maul","afterDir":"sprites-test/anim-obj/orc_drum_maul","n":15},{"region":"오크 부락","set":6,"name":"천둥을 문 도끼","field":"스토리","before":"...맞은 놈은 끝내 못 물어봤어 (다른 스타일로 재생성)","after":"폭풍 부족 이야기 들어봤나. 뼈로 깎은 짐승 머리 아래 청동 날, 휘두르면 날을 따라 푸른 번개가 우지끈 인다고 한다. 천둥이 도끼를 따르는지 도끼가 천둥을 부르는지는, 맞아 본 놈만 안다더라."},{"region":"오크 부락","set":6,"name":"벼락 맞고도 선 가슴","field":"스토리","before":"...한 번 벼락 먹은 가슴은 그다음부턴 벼락을 되돌려준다나 (되돌려줌 → 다른 표현)","after":"벼락을 정통으로 맞고도 안 쓰러진 전사가 있었다는 말이 전한다. 청동 판에 새긴 무늬를 따라 푸른 번개가 지금도 타닥인다. 한 번 벼락을 먹고 버틴 가슴은 그다음부턴 어떤 천둥에도 눈 하나 깜짝 안 한다나."},{"region":"오크 부락","set":6,"name":"폭풍을 가둔 부적","field":"스토리","before":"폭풍 부족 족장이 잡은 첫 번개를 보석에 가뒀다고 한다... (이해되게 재구성)","after":"족장이 처음 잡은 번개를 보석에 가뒀다는 이야기가 있다. 뼈와 청동 사이 푸른 빛이 타닥 튈 때마다 먼 하늘이 낮게 답한다. 이 부적이 우는 날이면 큰비가 온다는 걸 알고, 부족은 미리 가죽을 거뒀다고 한다."}];
const SLOT_KO = {weapon:'무기',armor:'방어구',accessory:'장신구'};
const LS='finalqa-v1'; const RV=JSON.parse(localStorage.getItem(LS)||'{}'); const save=()=>localStorage.setItem(LS,JSON.stringify(RV));
const app=document.getElementById('app'); const anims=[];
// 변경 검토 섹션
const CD_LS='finalqa-decide-v1'; const CD=JSON.parse(localStorage.getItem(CD_LS)||'{}'); const cds=()=>localStorage.setItem(CD_LS,JSON.stringify(CD));
if(CHANGES.length){document.getElementById('cmph').style.display='';}
const cmp=document.getElementById('cmp');
CHANGES.forEach((c,i)=>{
  const cid='c'+i; const d=CD[cid]||(CD[cid]={pick:'',rej:''});
  let bH,aH;
  if(c.field==='애니'){bH='<img class="shot" src="'+c.beforeDir+'/0.png" data-dir="'+c.beforeDir+'" data-n="'+c.n+'">';aH='<img class="shot" src="'+c.afterDir+'/0.png" data-dir="'+c.afterDir+'" data-n="'+c.n+'">';}
  else{bH='<div class="txt">'+c.before+'</div>';aH='<div class="txt aft">'+c.after+'</div>';}
  const card=document.createElement('div'); card.className='cmpc';
  card.innerHTML='<div class="ch">'+c.region+' · 세트'+c.set+' · <b>'+c.name+'</b><span class="fld">'+c.field+'</span></div>'+
    '<div class="ba"><div class="col"><div class="lbl">변경 전</div>'+bH+'</div><div class="col"><div class="lbl aftl">변경 후</div>'+aH+'</div></div>'+
    '<div class="dec"><button data-p="rollback">↩ 롤백</button><button data-p="accept">✓ 채택</button><button data-p="rereject">✗ 추가리젝</button></div>'+
    '<textarea class="rr" placeholder="추가 리젝 사유를 적어 주세요">'+(d.rej||'')+'</textarea>';
  cmp.appendChild(card);
  const refl=()=>{card.querySelectorAll('.dec button').forEach(b=>b.classList.toggle('on',b.dataset.p===d.pick));card.classList.toggle('roll',d.pick==='rollback');card.classList.toggle('acc',d.pick==='accept');card.classList.toggle('rj',d.pick==='rereject');};
  card.querySelectorAll('.dec button').forEach(b=>b.onclick=()=>{d.pick=b.dataset.p;cds();refl();});
  const rr=card.querySelector('.rr'); rr.addEventListener('input',()=>{d.rej=rr.value;cds();});
  refl();
  if(c.field==='애니')[...card.querySelectorAll('img.shot[data-dir]')].forEach(img=>{img._anim=true;anims.push({img,dir:img.dataset.dir,n:+img.dataset.n,i:0});});
});
DATA.forEach((reg,ri)=>{
  const h=document.createElement('h2'); h.textContent=reg.region; app.appendChild(h);
  reg.sets.forEach((items,si)=>{
    const sd=document.createElement('div'); sd.className='set';
    const sh=document.createElement('div'); sh.className='sh'; sh.textContent='세트 '+(si+1); sd.appendChild(sh);
    const row=document.createElement('div'); row.className='row';
    items.forEach((it,ii)=>{
      const id=ri+'#'+si+'#'+ii;
      const rv=RV[id]||(RV[id]={nm:'',st:'',an:''});
      const hasAnim=!!it.dir; const src=hasAnim?it.dir+'/0.png':it.st;
      const c=document.createElement('div'); c.className='card';
      c.innerHTML='<div class="stage"><span class="slot">'+(SLOT_KO[it.slot]||'')+'</span>'+
        '<img class="shot" src="'+src+'" '+(hasAnim?'data-dir="'+it.dir+'" data-n="'+it.n+'"':'')+' data-static="'+it.st+'">'+
        (hasAnim?'<div class="tg"><button class="bA on">애</button><button class="bS">정</button></div>':'')+'</div>'+
        '<div class="meta"><div class="nm">'+it.name+'</div><div class="lore">'+it.lore+'</div>'+
        '<div class="rej">'+
          '<div class="ttl"><span class="tag nm">이름</span></div><textarea data-f="nm" placeholder="이름 리젝사유 (없으면 비움)">'+rv.nm+'</textarea>'+
          '<div class="ttl"><span class="tag st">스토리</span></div><textarea data-f="st" placeholder="스토리 리젝사유">'+rv.st+'</textarea>'+
          '<div class="ttl"><span class="tag an">애니</span></div><textarea data-f="an" placeholder="애니 리젝사유">'+rv.an+'</textarea>'+
        '</div></div>';
      row.appendChild(c);
      const img=c.querySelector('.shot');
      if(hasAnim){img._anim=true;const bA=c.querySelector('.bA'),bS=c.querySelector('.bS');
        bA.onclick=()=>{img._anim=true;bA.classList.add('on');bS.classList.remove('on');};
        bS.onclick=()=>{img._anim=false;img.src=img.dataset.static;bS.classList.add('on');bA.classList.remove('on');};
        anims.push({img,dir:it.dir,n:it.n,i:0});}
      const flag=()=>c.classList.toggle('flag',!!(rv.nm||rv.st||rv.an));
      c.querySelectorAll('textarea').forEach(t=>t.addEventListener('input',()=>{rv[t.dataset.f]=t.value;save();flag();upd();}));
      flag();
    });
    sd.appendChild(row); app.appendChild(sd);
  });
});
let last=0; function tick(t){if(t-last>=110){last=t;for(const o of anims){if(o.img._anim){o.i=(o.i+1)%o.n;o.img.src=o.dir+'/'+o.i+'.png';}}}requestAnimationFrame(tick);} requestAnimationFrame(tick);
function count(){let n=0;for(const k in RV){const r=RV[k];if(r.nm||r.st||r.an)n++;}return n;}
function upd(){document.getElementById('ct').textContent='총 108종 · 리젝 표시 '+count()+'개';}
upd();
document.getElementById('copy').onclick=()=>{
  const L=['[최종 108종 리젝 제출]'];
  DATA.forEach((reg,ri)=>{let rh=false;
    reg.sets.forEach((items,si)=>{let sh=false;
      items.forEach((it,ii)=>{const r=RV[ri+'#'+si+'#'+ii]||{};const parts=[];
        if(r.nm)parts.push('이름: '+r.nm);if(r.st)parts.push('스토리: '+r.st);if(r.an)parts.push('애니: '+r.an);
        if(parts.length){if(!rh){L.push('');L.push('== '+reg.region+' ==');rh=true;}if(!sh){L.push('['+'세트'+(si+1)+']');sh=true;}
          L.push('· '+it.name);parts.forEach(p=>L.push('   - '+p));}
      });});});
  const txt=L.length>1?L.join('\n'):'(리젝 없음)';
  const o=document.getElementById('out');o.classList.add('show');o.value=txt;o.select();
  if(navigator.clipboard)navigator.clipboard.writeText(txt);
};
document.getElementById('cdcopy').onclick=()=>{
  const L=['[변경 결정 — 왕국·늪지대]'];
  CHANGES.forEach((c,i)=>{const d=CD['c'+i]||{};const p=d.pick==='rollback'?'↩ 롤백':d.pick==='accept'?'✓ 채택':d.pick==='rereject'?'✗ 추가리젝':'(미정)';
    L.push('· '+c.region+' 세트'+c.set+' '+c.name+' ['+c.field+']: '+p+(d.pick==='rereject'&&d.rej?(' — '+d.rej):''));});
  const t=L.join('\n');const o=document.getElementById('out');o.classList.add('show');o.value=t;o.select();if(navigator.clipboard)navigator.clipboard.writeText(t);
};
document.getElementById('clr').onclick=()=>{if(confirm('입력을 모두 지울까요?')){localStorage.removeItem(LS);localStorage.removeItem('finalqa-decide-v1');location.reload();}};
