<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>인생강화 — 게임 문구 전수조사 리뷰</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e2230; --line: #2a2f3e;
    --text: #e8eaf0; --dim: #8b91a5; --accent: #7c9aff; --ok: #4ade80; --warn: #fbbf24; --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.5 -apple-system, "Apple SD Gothic Neo", "Pretendard", sans-serif; }
  header { position: sticky; top: 0; z-index: 10; background: rgba(15,17,21,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); padding: 12px 20px; }
  h1 { font-size: 16px; margin: 0 0 8px; }
  h1 small { color: var(--dim); font-weight: 400; margin-left: 8px; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .controls input[type=search] { flex: 1 1 220px; min-width: 180px; background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 10px; font-size: 13px; outline: none; }
  .controls input[type=search]:focus { border-color: var(--accent); }
  select { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 8px; font-size: 13px; }
  .btn { background: var(--panel2); border: 1px solid var(--line); color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #0b0d12; border-color: var(--accent); font-weight: 600; }
  .stats { color: var(--dim); font-size: 12px; margin-top: 6px; display: flex; gap: 14px; flex-wrap: wrap; }
  .stats b { color: var(--text); }
  main { padding: 16px 20px 80px; max-width: 1280px; margin: 0 auto; }
  .group { margin-bottom: 28px; }
  .group > h2 { font-size: 14px; color: var(--accent); border-bottom: 1px solid var(--line); padding-bottom: 6px; margin: 0 0 10px; position: sticky; top: 108px; background: var(--bg); z-index: 5; }
  .group > h2 .cnt { color: var(--dim); font-weight: 400; font-size: 12px; margin-left: 6px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: grid; grid-template-columns: 130px 1fr 240px; gap: 12px; align-items: start; }
  @media (max-width: 900px) { .card { grid-template-columns: 1fr; } }
  .meta { font-size: 11px; color: var(--dim); word-break: break-all; }
  .meta .tag { display: inline-block; border-radius: 5px; padding: 1px 7px; font-size: 10.5px; font-weight: 600; margin-bottom: 5px; }
  .tag.toast-error { background: #3b1d22; color: #f87171; }
  .tag.toast-header { background: #1d2a3b; color: #7c9aff; }
  .tag.toast-resource { background: #1d3b2a; color: #4ade80; }
  .tag.confirm { background: #3b331d; color: #fbbf24; }
  .tag.alert { background: #3b1d38; color: #e879f9; }
  .tag.error-map { background: #2d1d3b; color: #c084fc; }
  .tag.inline-error { background: #3b241d; color: #fb923c; }
  .tag.empty-state { background: #22262f; color: #9ca3af; }
  .tag.button-state { background: #1d363b; color: #22d3ee; }
  .tag.feed-message { background: #1d3b33; color: #34d399; }
  .tag.mail-message { background: #33301d; color: #d9c76a; }
  .tag.push-message { background: #241d3b; color: #a78bfa; }
  .meta .code { color: #c084fc; font-family: ui-monospace, monospace; font-size: 10.5px; }
  .meta .loc { font-family: ui-monospace, monospace; }
  .body .trigger { font-size: 12px; color: var(--dim); margin-bottom: 5px; }
  .body .trigger::before { content: "⚡ "; }
  .msg { background: var(--panel2); border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; font-size: 13.5px; white-space: pre-wrap; word-break: break-word; outline: none; min-height: 20px; }
  .msg:focus { border-color: var(--accent); }
  .card.edited .msg { border-color: var(--warn); }
  .orig { font-size: 11px; color: var(--dim); margin-top: 5px; display: none; white-space: pre-wrap; }
  .card.edited .orig { display: block; }
  .orig::before { content: "원문: "; color: #6b7080; }
  .review { display: flex; flex-direction: column; gap: 6px; }
  .status-row { display: flex; gap: 4px; }
  .st { flex: 1; text-align: center; font-size: 11.5px; padding: 5px 2px; border-radius: 6px; border: 1px solid var(--line); background: var(--panel2); color: var(--dim); cursor: pointer; user-select: none; }
  .st.on-ok { background: #14351f; color: var(--ok); border-color: #14532d; }
  .st.on-fix { background: #38270e; color: var(--warn); border-color: #713f12; }
  .st.on-del { background: #3b1519; color: var(--bad); border-color: #7f1d1d; }
  .memo { background: var(--panel2); border: 1px solid var(--line); border-radius: 6px; color: var(--text); font-size: 12px; padding: 6px 8px; resize: vertical; min-height: 30px; font-family: inherit; }
  .memo::placeholder { color: #565c6e; }
  .card.hidden { display: none; }
  .card.st-ok { opacity: .55; }
  .card.st-del .msg { text-decoration: line-through; opacity: .6; }
  footer.bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,17,21,.95); border-top: 1px solid var(--line); padding: 10px 20px; display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--dim); }
  footer.bar .spacer { flex: 1; }
  #toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: var(--accent); color: #0b0d12; font-weight: 600; padding: 8px 16px; border-radius: 8px; opacity: 0; transition: opacity .25s; pointer-events: none; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>게임 문구 전수조사 <small id="subtitle"></small></h1>
  <div class="controls">
    <input type="search" id="q" placeholder="메시지·트리거·파일 검색…">
    <select id="fScreen"><option value="">화면 전체</option></select>
    <select id="fType"><option value="">유형 전체</option></select>
    <select id="fStatus">
      <option value="">상태 전체</option>
      <option value="none">미검토</option>
      <option value="ok">OK</option>
      <option value="fix">수정필요</option>
      <option value="del">삭제제안</option>
    </select>
    <button class="btn" id="btnReset">필터 초기화</button>
    <button class="btn" id="btnExportJson">JSON 내보내기</button>
    <button class="btn primary" id="btnExportMd">수정안 내보내기 (MD)</button>
  </div>
  <div class="stats" id="stats"></div>
</header>
<main id="list"></main>
<footer class="bar">
  <span>검토 상태·수정문구·메모는 브라우저(localStorage)에 자동 저장됩니다.</span>
  <span class="spacer"></span>
  <button class="btn" id="btnClear">검토 데이터 초기화</button>
</footer>
<div id="toast"></div>

const TYPE_LABEL = {
  'toast-error': '에러 토스트', 'toast-header': '헤더 토스트', 'toast-resource': '자원 토스트',
  'confirm': '컨펌 팝업', 'alert': 'alert', 'error-map': '에러코드 맵',
  'inline-error': '인라인 에러', 'empty-state': '빈 상태', 'button-state': '버튼 상태',
  'feed-message': '월드 피드', 'mail-message': '우편 문구', 'push-message': '푸시 문구',
};
const LS_KEY = 'copy-review-v1';
let store = {};
try { store = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch (e) { store = {}; }
const save = () => localStorage.setItem(LS_KEY, JSON.stringify(store));
const keyOf = (d) => d.file + ':' + d.line + ':' + d.message.slice(0, 40);

// 그룹: screen 기준
const groups = {};
DATA.forEach((d, i) => { d._i = i; (groups[d.screen] ||= []).push(d); });

const $list = document.getElementById('list');
const frag = document.createDocumentFragment();
Object.entries(groups).forEach(([screen, items]) => {
  const g = document.createElement('section');
  g.className = 'group';
  g.innerHTML = `<h2>${screen}<span class="cnt">${items.length}건</span></h2>`;
  items.forEach(d => {
    const k = keyOf(d);
    const s = store[k] || {};
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.key = k; card.dataset.i = d._i;
    card.innerHTML = `
      <div class="meta">
        <span class="tag ${d.type}">${TYPE_LABEL[d.type] || d.type}</span><br>
        <span class="loc">${d.file}:${d.line}</span>
        ${d.code ? `<br><span class="code">${d.code}</span>` : ''}
      </div>
      <div class="body">
        <div class="trigger"></div>
        <div class="msg" contenteditable="true" spellcheck="false"></div>
        <div class="orig"></div>
      </div>
      <div class="review">
        <div class="status-row">
          <span class="st" data-st="ok">OK</span>
          <span class="st" data-st="fix">수정필요</span>
          <span class="st" data-st="del">삭제제안</span>
        </div>
        <textarea class="memo" placeholder="메모…"></textarea>
      </div>`;
    card.querySelector('.trigger').textContent = d.trigger || '';
    card.querySelector('.msg').textContent = s.edit ?? d.message;
    card.querySelector('.orig').textContent = d.message;
    card.querySelector('.memo').value = s.memo || '';
    applyState(card, d, s);
    frag.appendChild(card) && g.appendChild(card);
  });
  frag.appendChild(g);
});
$list.appendChild(frag);

function applyState(card, d, s) {
  card.classList.toggle('edited', !!s.edit && s.edit !== d.message);
  card.classList.remove('st-ok', 'st-fix', 'st-del');
  if (s.status) card.classList.add('st-' + s.status);
  card.querySelectorAll('.st').forEach(el => {
    el.classList.toggle('on-' + el.dataset.st, s.status === el.dataset.st);
    ['ok','fix','del'].forEach(x => { if (x !== el.dataset.st) el.classList.remove('on-' + x); });
  });
}

$list.addEventListener('click', e => {
  const st = e.target.closest('.st'); if (!st) return;
  const card = st.closest('.card'); const k = card.dataset.key; const d = DATA[card.dataset.i];
  const s = store[k] ||= {};
  s.status = s.status === st.dataset.st ? null : st.dataset.st;
  applyState(card, d, s); save(); updateStats(); applyFilter();
});
$list.addEventListener('input', e => {
  const card = e.target.closest('.card'); if (!card) return;
  const k = card.dataset.key; const d = DATA[card.dataset.i]; const s = store[k] ||= {};
  if (e.target.classList.contains('msg')) {
    const v = e.target.textContent;
    if (v === d.message) delete s.edit; else s.edit = v;
    card.classList.toggle('edited', 'edit' in s);
    if ('edit' in s && !s.status) { s.status = 'fix'; applyState(card, d, s); }
  } else if (e.target.classList.contains('memo')) {
    if (e.target.value) s.memo = e.target.value; else delete s.memo;
  }
  save(); updateStats();
});

// 필터
const $q = document.getElementById('q'), $fS = document.getElementById('fScreen'),
      $fT = document.getElementById('fType'), $fSt = document.getElementById('fStatus');
[...new Set(DATA.map(d => d.screen))].forEach(s => $fS.add(new Option(s, s)));
[...new Set(DATA.map(d => d.type))].forEach(t => $fT.add(new Option(TYPE_LABEL[t] || t, t)));
function applyFilter() {
  const q = $q.value.trim().toLowerCase(), sc = $fS.value, ty = $fT.value, st = $fSt.value;
  document.querySelectorAll('.card').forEach(card => {
    const d = DATA[card.dataset.i]; const s = store[card.dataset.key] || {};
    let show = true;
    if (sc && d.screen !== sc) show = false;
    if (ty && d.type !== ty) show = false;
    if (st) { const cur = s.status || 'none'; if (cur !== st) show = false; }
    if (q && show) {
      const hay = (d.message + ' ' + (s.edit||'') + ' ' + d.trigger + ' ' + d.file + ' ' + (d.code||'')).toLowerCase();
      if (!hay.includes(q)) show = false;
    }
    card.classList.toggle('hidden', !show);
  });
  document.querySelectorAll('.group').forEach(g => {
    const vis = g.querySelectorAll('.card:not(.hidden)').length;
    g.style.display = vis ? '' : 'none';
    g.querySelector('.cnt').textContent = vis + '건';
  });
}
[$q, $fS, $fT, $fSt].forEach(el => el.addEventListener('input', applyFilter));
document.getElementById('btnReset').onclick = () => { $q.value=''; $fS.value=''; $fT.value=''; $fSt.value=''; applyFilter(); };

function updateStats() {
  const total = DATA.length;
  let ok=0, fix=0, del=0, edited=0;
  DATA.forEach(d => { const s = store[keyOf(d)] || {};
    if (s.status==='ok') ok++; if (s.status==='fix') fix++; if (s.status==='del') del++;
    if (s.edit) edited++; });
  document.getElementById('stats').innerHTML =
    `총 <b>${total}</b>건 · 미검토 <b>${total-ok-fix-del}</b> · <b style="color:var(--ok)">OK ${ok}</b> · <b style="color:var(--warn)">수정필요 ${fix}</b> · <b style="color:var(--bad)">삭제제안 ${del}</b> · 문구수정 <b>${edited}</b>`;
  document.getElementById('subtitle').textContent = `토스트·컨펌·에러 등 ${total}건`;
}

// 내보내기
function download(name, text) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type:'text/plain;charset=utf-8'}));
  a.download = name; a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('btnExportJson').onclick = () => {
  const out = DATA.map(d => { const s = store[keyOf(d)] || {};
    return {...d, _i: undefined, review: {status: s.status||null, edit: s.edit||null, memo: s.memo||null}}; });
  download('copy-review-export.json', JSON.stringify(out, null, 2));
  showToast('JSON 내보내기 완료');
};
document.getElementById('btnExportMd').onclick = () => {
  const rows = DATA.filter(d => { const s = store[keyOf(d)] || {}; return s.status==='fix'||s.status==='del'||s.edit||s.memo; });
  if (!rows.length) return showToast('수정필요/삭제제안/수정문구가 없습니다');
  let md = '# 문구 수정안\n\n';
  rows.forEach(d => { const s = store[keyOf(d)] || {};
    md += `## ${d.file}:${d.line}\n- 화면: ${d.screen} / 유형: ${TYPE_LABEL[d.type]||d.type}${d.code?` / 코드: \`${d.code}\``:''}\n- 노출조건: ${d.trigger}\n- 상태: ${s.status==='del'?'삭제제안':s.status==='ok'?'OK':'수정필요'}\n- 현재: ${d.message}\n`;
    if (s.edit) md += `- **수정안: ${s.edit}**\n`;
    if (s.memo) md += `- 메모: ${s.memo}\n`;
    md += '\n';
  });
  download('copy-review-fixes.md', md);
  showToast(`수정안 ${rows.length}건 내보내기 완료`);
};
document.getElementById('btnClear').onclick = () => {
  if (!confirm('검토 상태·수정문구·메모를 모두 초기화할까요?')) return;
  store = {}; save(); location.reload();
};
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}
updateStats(); applyFilter();
</script>
</body>
</html>
