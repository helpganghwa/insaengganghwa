<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>아이템 wornDesc 리뷰 — 신·구 대조</title>
<style>
  :root {
    --bg:#0f1115; --panel:#171a21; --panel2:#1e2230; --line:#2a2f3e;
    --text:#e8eaf0; --dim:#8b91a5; --accent:#7c9aff; --ok:#4ade80; --bad:#f87171; --warn:#fbbf24;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font:14px/1.55 -apple-system,"Apple SD Gothic Neo","Pretendard",sans-serif; }
  header { position:sticky; top:0; z-index:10; background:rgba(15,17,21,.94); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); padding:12px 20px; }
  h1 { font-size:16px; margin:0 0 8px; }
  h1 small { color:var(--dim); font-weight:400; margin-left:8px; }
  .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  input[type=search], select { background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:7px 10px; font-size:13px; outline:none; }
  input[type=search] { flex:1 1 220px; min-width:180px; }
  input[type=search]:focus, select:focus { border-color:var(--accent); }
  .btn { background:var(--panel2); border:1px solid var(--line); color:var(--text); border-radius:8px; padding:7px 12px; font-size:13px; cursor:pointer; white-space:nowrap; }
  .btn:hover { border-color:var(--accent); }
  .btn.primary { background:var(--accent); color:#0b0d12; border-color:var(--accent); font-weight:600; }
  .stats { color:var(--dim); font-size:12px; margin-top:6px; display:flex; gap:14px; flex-wrap:wrap; }
  .stats b { color:var(--text); }
  main { padding:16px 20px 90px; max-width:1180px; margin:0 auto; }
  .group > h2 { font-size:14px; color:var(--accent); border-bottom:1px solid var(--line); padding-bottom:6px; margin:22px 0 10px; position:sticky; top:104px; background:var(--bg); z-index:5; }
  .group > h2 .cnt { color:var(--dim); font-weight:400; font-size:12px; margin-left:6px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:8px; display:grid; grid-template-columns:110px 1fr 300px; gap:14px; align-items:start; }
  @media (max-width:860px){ .card { grid-template-columns:90px 1fr; } .review-col { grid-column:1 / -1; } }
  .sprite { width:110px; height:110px; background:#0b0d12; border:1px solid var(--line); border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .sprite img { width:100px; height:100px; object-fit:contain; image-rendering:pixelated; }
  .sprite .miss { color:var(--dim); font-size:10px; text-align:center; }
  .body .name { font-size:15px; font-weight:700; }
  .body .meta { font-size:11px; color:var(--dim); margin:1px 0 7px; }
  .body .meta .region { color:var(--warn); }
  .worn { border:1px solid var(--line); border-radius:7px; padding:6px 9px; font-size:12px; line-height:1.5; }
  .worn .lbl { display:block; font-size:9.5px; color:var(--dim); margin-bottom:2px; letter-spacing:.03em; }
  .worn.old { background:transparent; color:#79808f; font-family:ui-monospace,monospace; font-size:11px; }
  .worn.new { background:var(--panel2); color:#dfe6f5; font-family:ui-monospace,monospace; font-size:11.5px; margin-top:5px; border-color:#33406b; }
  .worn.new .lbl { color:var(--accent); }
  .worn.ko { background:var(--panel2); margin-top:5px; color:var(--text); font-size:12.5px; }
  .note { margin-top:5px; font-size:11px; color:var(--warn); }
  .note::before { content:"⚠ 이미지 대조: "; }
  .review-col { display:flex; flex-direction:column; gap:6px; }
  .rejbtn { text-align:center; font-size:13px; font-weight:700; padding:8px; border-radius:8px; border:1px solid var(--line); background:var(--panel2); color:var(--dim); cursor:pointer; user-select:none; }
  .rejbtn.on { background:#3b1519; color:var(--bad); border-color:#7f1d1d; }
  .reason { background:var(--panel2); border:1px solid var(--line); border-radius:7px; color:var(--text); font-size:12.5px; padding:7px 9px; resize:vertical; min-height:58px; font-family:inherit; }
  .reason::placeholder { color:#565c6e; }
  .card.rejected { border-color:#7f1d1d; }
  .card.hidden { display:none; }
  footer.bar { position:fixed; bottom:0; left:0; right:0; background:rgba(15,17,21,.96); border-top:1px solid var(--line); padding:10px 20px; display:flex; gap:10px; align-items:center; font-size:12px; color:var(--dim); }
  footer .spacer { flex:1; }
  #toast { position:fixed; bottom:58px; left:50%; transform:translateX(-50%); background:var(--accent); color:#0b0d12; font-weight:600; padding:8px 16px; border-radius:8px; opacity:0; transition:opacity .25s; pointer-events:none; }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<header>
  <h1>wornDesc 리뷰 — 신·구 대조 <small id="subtitle"></small></h1>
  <div class="controls">
    <input type="search" id="q" placeholder="이름·묘사·번역·key 검색…">
    <select id="fSlot"><option value="">부위 전체</option><option value="weapon">무기</option><option value="armor">방어구</option><option value="accessory">장신구</option></select>
    <select id="fRegion"><option value="">지역 전체</option></select>
    <select id="fStatus"><option value="">상태 전체</option><option value="rej">리젝만</option><option value="ok">미리젝만</option><option value="note">불일치 발견만</option></select>
    <button class="btn" id="btnReset">필터 초기화</button>
    <button class="btn primary" id="btnExport">리젝 목록 내보내기</button>

</header>

  <span class="spacer"></span>
  <button class="btn" id="btnClear">리뷰 초기화</button>
</footer>

<script>
const DATA = [{"key":"kingdom_ribbon_rapier","slot":"weapon","nameKo":"창천검","region":"왕국","oldWorn":"slender silver rapier with a swept gold guard, a blue gem and a long trailing blue ribbon","newWorn":"slender silver rapier, gold swept guard set with a blue gem, long blue gold-edged ribbon wound around the hilt","newKo":"가느다란 은빛 레이피어. 금색 곡선 가드에 파란 보석이 박혀 있고, 자루에는 금테를 두른 긴 파란 리본이 감겨 있다.","note":""},{"key":"kingdom_court_twin_sabers","slot":"weapon","nameKo":"청홍 쌍검","region":"왕국","oldWorn":"twin broad nearly-straight silver blades with ornate gold scrollwork guards and gold-and-white striped grips — a matched pair, one with a blue gem and one with a red gem, dual-wielded with one blade gripped in each hand, both drawn (never sheathed)","newWorn":"a matched pair of straight silver sabers, gold scrollwork guards, one blue gem and one red gem","newKo":"곧게 뻗은 은빛 세이버 한 쌍. 금 당초무늬 가드에 한 자루는 파란 보석, 다른 한 자루는 붉은 보석이 박혀 있다.","note":"기존의 자세 지시문(dual-wielded, never sheathed) 제거. 그립은 gold-and-white striped라기보다 은백색 감김에 가까움."},{"key":"kingdom_winged_coronation_sword","slot":"weapon","nameKo":"창궁검","region":"왕국","oldWorn":"regal steel longsword with a golden winged crossguard, a sky-blue gem in the hilt, a golden crown pommel and a blue-and-white striped grip","newWorn":"long silver longsword, gold spread-wing crossguard set with a sky-blue gem, gold crown pommel, blue-and-white striped grip","newKo":"긴 은빛 롱소드. 하늘색 보석이 박힌 금 날개 크로스가드, 금 왕관 폼멜, 파랑-흰색 줄무늬 그립.","note":"무드 형용사 regal 제거. 나머지는 이미지와 일치."},{"key":"kingdom_falcon_cane_sword","slot":"weapon","nameKo":"매 머리 지팡이검","region":"왕국","oldWorn":"polished deep-burgundy cane-sword with a brass falcon-head handle and gold vine filigree running along the shaft","newWorn":"slim dark-burgundy cane sword, gold falcon-head handle, gold vine scrollwork along the shaft, gold ferrule tip","newKo":"가느다란 짙은 버건디색 지팡이 검. 금 매 머리 손잡이, 자루를 따라 새겨진 금 덩굴 문양, 금색 물미 끝.","note":"이미지에 뚜렷한 금색 물미(ferrule) 끝이 기존 묘사에 없어 추가."},{"key":"temple_frost_odachi","slot":"weapon","nameKo":"눈꽃 대도","region":"신전","oldWorn":"long slender odachi with a pale ice-blue blade, a six-petal snowflake guard, a silver-wrapped hilt and a hanging white tassel","newWorn":"long curved pale ice-blue odachi with a jagged icy edge, white snowflake guard, white tassel at the pommel","newKo":"길게 휜 옅은 얼음빛 오오다치. 들쭉날쭉한 얼음 날, 흰 눈꽃 가드, 폼멜에 흰 술 장식.","note":"기존의 six-petal(여섯 꽃잎) 개수는 스프라이트 크기에서 확인 불가라 제거. 뚜렷한 들쭉날쭉한 얼음 날은 기존에 없어 추가. 자루 감김은 은색보다 회색에 가까움."},{"key":"volcano_emberveined_greatsword","slot":"weapon","nameKo":"용암을 가둔 대검","region":"화산","oldWorn":"massive obsidian greatsword veined with glowing orange lava and a gold-edged blade, a golden winged demon-face crossguard set with an orange gem, and a glowing orange orb pommel","newWorn":"massive dark greatsword with a glowing orange lava core and gold edges, gold winged crossguard, glowing orange orb pommel","newKo":"거대한 어두운 대검. 날 중심에서 주황 용암이 타오르고 가장자리는 금빛, 금 날개 크로스가드와 빛나는 주황 구슬 폼멜.","note":"기존의 demon-face(악마 얼굴) 크로스가드는 이미지에서 식별 불가 — 날개 달린 문장만 보임."},{"key":"swamp_lotus_trident","slot":"weapon","nameKo":"피어나는 삼지창","region":"늪지대","oldWorn":"slender mint-wood trident with three prongs and small water-lily blooms","newWorn":"slender mint-green trident, three pale prongs, white lotus blossoms and leafy vines wrapped below the head","newKo":"가느다란 민트색 삼지창. 세 갈래 옅은 창끝 아래로 흰 연꽃과 잎 덩굴이 감겨 있다.","note":"덩굴이 자루를 따라 감겨 내려오는 것이 뚜렷한데 기존 묘사에 없어 추가."},{"key":"angel_star_wand","slot":"weapon","nameKo":"유성의 지팡이","region":"타락천사","oldWorn":"slim silver-and-gold wand topped with a large winged golden star and a blue gem on the shaft","newWorn":"slim white-and-gold wand topped with a large gold star, small white wings at its base, a blue gem on the shaft","newKo":"가느다란 흰색-금색 완드. 꼭대기에 큰 금 별, 그 아래 작은 흰 날개 한 쌍, 자루에는 파란 보석.","note":"기존 'winged golden star'는 오독 소지 — 날개는 금색이 아니라 흰 깃털 날개."},{"key":"volcano_dragonjaw_halberd","slot":"weapon","nameKo":"포효하는 용턱","region":"화산","oldWorn":"heavy halberd whose axe-head is forged as a roaring horned 테두리와 손잡이 술 장식이 이미지에 뚜렷함"},{"key":"commander_feather_epaulets","slot":"accessory","nameKo":"푸른 깃 견장","region":"왕국","oldWorn":"gold shoulder epaulets with fanned blue feathers, hanging silver chains and blue gems","newWorn":"large gold shoulder epaulets, fanned blue-and-white feathers behind each plate, blue gems, gold chains with blue drops beneath","newKo":"커다란 금빛 견장 한 쌍. 각 판 뒤로 파랑·흰색 깃털이 부챗살처럼 펼쳐지고, 파란 보석이 박히며 아래로 파란 물방울 보석이 달린 금 사슬이 늘어진다.","note":"기존 'silver chains'와 달리 늘어진 사슬은 금색임"},{"key":"pumpkin_witch_hat","slot":"accessory","nameKo":"마녀의 뾰족 모자","region":"일반","oldWorn":"wide black pointed witch hat with an orange band, gold buckle and a tiny pumpkin charm","newWorn":"wide black pointed witch hat, orange band with gold buckle, tiny pumpkin charm dangling at the side","newKo":"챙 넓은 검은 뾰족 마녀 모자. 주황 띠에 금 버클이 채워져 있고, 옆으로 조그만 호박 장식이 대롱 매달려 있다.","note":""},{"key":"phantom_half_mask","slot":"accessory","nameKo":"상아 반가면","region":"왕국","oldWorn":"white porcelain half-mask with gold filigree and a black tassel","newWorn":"small white porcelain half-mask, gold scroll filigree, a black tassel on a gold chain at one side","newKo":"얼굴에 쓰는 작은 흰 도자기 반가면. 금빛 소용돌이 세공이 새겨지고, 한쪽 옆에 금 사슬로 검은 술 장식이 늘어져 있다.","note":""},{"key":"valkyrie_winged_circlet","slot":"accessory","nameKo":"발키리의 날개 서클릿","region":"타락천사","oldWorn":"silver-and-gold circlet with feathered side-wings and a blue gem","newWorn":"slim silver circlet, oval blue gem in gold filigree at the front, white feathered wings at each side","newKo":"가는 은빛 서클릿. 정면에 금 세공으로 감싼 타원형 파란 보석이 박히고, 양옆으로 흰 깃털 날개가 크게 뻗어 있다.","note":"기존 'side-wings'가 암시하는 것보다 날개가 크고 넓게 펼쳐져 있음"},{"key":"devil_horn_headband","slot":"accessory","nameKo":"작은 악마의 뿔","region":"일반","oldWorn":"crimson devil-horn headband with little black bat wings","newWorn":"thin dark bronze headband, glossy crimson horns on top, small black bat wings at each side","newKo":"가느다란 짙은 청동빛 머리띠. 위로 윤기 나는 진홍 뿔 한 쌍이 솟고, 양옆에 작은 검은 박쥐 날개가 달려 있다.","note":""},{"key":"dragonknight_horned_helm","slot":"accessory","nameKo":"용면 투구","region":"화산","oldWorn":"obsidian horned great-helm with a snarling golden dragon face and gold wings","newWorn":"large dark obsidian great-helm, golden dragon face on the front, flared gold fin-like horns on each side","newKo":"머리 전체를 덮는 커다란 흑요석 그레이트헬름. 전면에 금빛 용의 얼굴이 새겨지고, 양옆에서 금빛 지느러미 모양 뿔이 활짝 펼쳐진다.","note":"기존 'gold wings'는 실제로는 지느러미처럼 갈라진 뿔 형태에 가까움"},{"key":"paladin_winged_helm","slot":"accessory","nameKo":"백은 날개 투구","region":"타락천사","oldWorn":"white-silver great-helm with a gold cross, small silver wings and a blue plume","newWorn":"rounded white-silver great-helm, gold-edged black cross on the front, small white wings at the sides, blue plume","newKo":"둥근 백은빛 그레이트헬름. 전면에 금 테두리의 검은 십자가가 크게 새겨지고, 양옆에 작은 흰 날개, 정수리에 파란 깃털 장식이 솟아 있다.","note":""},{"key":"frost_kite_shield","slot":"accessory","nameKo":"빙정 방패","region":"신전","oldWorn":"frost-blue crystal kite shield with silver edging and a snowflake boss","newWorn":"large ice-blue crystal kite shield, silver filigree edging, a big silver snowflake across the face, icicle tips below","newKo":"커다란 얼음빛 수정 카이트 실드. 은세공 테두리에 방패면 가득 큰 은빛 눈결정이 그려져 있고 아래쪽엔 고드름 끝이 돋아 있다.","note":"착용 배치는 compose 규칙이 결정: 기본은 한쪽 팔에 착용, 무기가 양손을 쓸 때만 등 뒤 결속."},{"key":"round_gold_glasses","slot":"accessory","nameKo":"금테 둥근 안경","region":"일반","oldWorn":"round thin-rimmed gold eyeglasses with clear lenses","newWorn":"small round thin gold-rimmed eyeglasses, pale gray tinted lenses with light glare, thin gold arms","newKo":"가는 금테의 작은 원형 안경. 옅은 회색빛이 감도는 렌즈에 빛 반사가 어리고, 안경다리도 가는 금색이다.","note":"기존 'clear lenses'와 달리 렌즈는 옅은 회색 틴트가 들어가 있음"}];
const SLOT_LABEL = { weapon:'무기', armor:'방어구', accessory:'장신구' };
const LS_KEY = 'worndesc-review-v2';
let store = {};
try { store = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){ store = {}; }
const save = () => localStorage.setItem(LS_KEY, JSON.stringify(store));

const $list = document.getElementById('list');
const groups = {};
DATA.forEach((d,i) => { d._i=i; (groups[d.slot] ||= []).push(d); });
const SLOT_ORDER = ['weapon','armor','accessory'];

const frag = document.createDocumentFragment();
for (const slot of SLOT_ORDER) {
  const items = groups[slot]; if (!items) continue;
  const g = document.createElement('section'); g.className='group'; g.dataset.slot=slot;
  g.innerHTML = `<h2>${SLOT_LABEL[slot]||slot}<span class="cnt">${items.length}종</span></h2>`;
  for (const d of items) {
    const s = store[d.key] || {};
    const card = document.createElement('div');
    card.className='card'; card.dataset.key=d.key; card.dataset.i=d._i;
    card.innerHTML = `
      <div class="sprite"><img loading="lazy" src="sprites/${d.slot}/${d.key}.png" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'miss',textContent:'이미지 없음'}))"></div>
      <div class="body">
        <div class="name"></div>
        <div class="meta"><span class="region"></span> · <span class="k"></span></div>
        <div class="worn old"><span class="lbl">OLD (현행)</span><span class="old-t"></span></div>
        <div class="worn new"><span class="lbl">NEW (채택 예정)</span><span class="new-t"></span></div>
        <div class="worn ko"><span class="lbl">NEW 한글 번역</span><span class="ko-t"></span></div>
        <div class="note" style="display:none"></div>
      </div>
      <div class="review-col">
        <div class="rejbtn">리젝</div>
        <textarea class="reason" placeholder="리젝 사유 — 새 묘사의 무엇이 틀렸/부족한지"></textarea>
      </div>`;
    card.querySelector('.name').textContent = d.nameKo;
    card.querySelector('.region').textContent = d.region || '';
    card.querySelector('.k').textContent = d.key;
    card.querySelector('.old-t').textContent = d.oldWorn || '(없음)';
    card.querySelector('.new-t').textContent = d.newWorn;
    card.querySelector('.ko-t').textContent = d.newKo;
    if (d.note && d.note.trim()) { const n=card.querySelector('.note'); n.textContent=d.note; n.style.display=''; }
    card.querySelector('.reason').value = s.reason || '';
    applyState(card, s);
    g.appendChild(card);
  }
  frag.appendChild(g);
}
$list.appendChild(frag);

function applyState(card, s) {
  const rej = !!s.rejected;
  card.classList.toggle('rejected', rej);
  const btn = card.querySelector('.rejbtn');
  btn.classList.toggle('on', rej);
  btn.textContent = rej ? '✕ 리젝됨' : '리젝';
}

$list.addEventListener('click', e => {
  const btn = e.target.closest('.rejbtn'); if (!btn) return;
  const card = btn.closest('.card'); const k = card.dataset.key;
  const s = store[k] ||= {};
  s.rejected = !s.rejected;
  applyState(card, s); save(); updateStats(); applyFilter();
});
$list.addEventListener('input', e => {
  const ta = e.target.closest('.reason'); if (!ta) return;
  const k = ta.closest('.card').dataset.key; const s = store[k] ||= {};
  if (ta.value) s.reason = ta.value; else delete s.reason;
  save();
});

const $q=document.getElementById('q'), $fSlot=document.getElementById('fSlot'), $fRegion=document.getElementById('fRegion'), $fStatus=document.getElementById('fStatus');
[...new Set(DATA.map(d=>d.region).filter(Boolean))].sort().forEach(r=>$fRegion.add(new Option(r,r)));
function applyFilter() {
  const q=$q.value.trim().toLowerCase(), slot=$fSlot.value, region=$fRegion.value, st=$fStatus.value;
  document.querySelectorAll('.card').forEach(card => {
    const d = DATA[card.dataset.i]; const s = store[d.key] || {};
    let show = true;
    if (slot && d.slot!==slot) show=false;
    if (region && d.region!==region) show=false;
    if (st==='rej' && !s.rejected) show=false;
    if (st==='ok' && s.rejected) show=false;
    if (st==='note' && !(d.note && d.note.trim())) show=false;
    if (q && show) {
      const hay = (d.nameKo+' '+d.key+' '+(d.oldWorn||'')+' '+d.newWorn+' '+d.newKo+' '+(d.note||'')+' '+(s.reason||'')).toLowerCase();
      if (!hay.includes(q)) show=false;
    }
    card.classList.toggle('hidden', !show);
  });
  document.querySelectorAll('.group').forEach(g => {
    const vis = g.querySelectorAll('.card:not(.hidden)').length;
    g.style.display = vis ? '' : 'none';
    g.querySelector('.cnt').textContent = vis+'종';
  });
}
[$q,$fSlot,$fRegion,$fStatus].forEach(el=>el.addEventListener('input',applyFilter));
document.getElementById('btnReset').onclick=()=>{ $q.value='';$fSlot.value='';$fRegion.value='';$fStatus.value=''; applyFilter(); };

function updateStats() {
  const total=DATA.length; let rej=0; const notes=DATA.filter(d=>d.note&&d.note.trim()).length;
  DATA.forEach(d=>{ if((store[d.key]||{}).rejected) rej++; });
  document.getElementById('stats').innerHTML = `총 <b>${total}</b>종 · <b style="color:var(--bad)">리젝 ${rej}</b> · 통과 <b style="color:var(--ok)">${total-rej}</b> · 구묘사↔이미지 불일치 발견 <b style="color:var(--warn)">${notes}</b>`;
  document.getElementById('subtitle').textContent = `${total}종 · 이미지 대조 재작성본 검수`;
}
function download(name,text){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'})); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }

document.getElementById('btnExport').onclick = () => {
  const rows = DATA.filter(d => (store[d.key]||{}).rejected);
  if (!rows.length) return showToast('리젝된 항목이 없습니다');
  let md = '# wornDesc 신규안 리젝 목록\n\n';
  rows.forEach(d => { const s=store[d.key]||{};
    md += `## ${d.nameKo} (${d.key})\n- 부위: ${SLOT_LABEL[d.slot]||d.slot} / 지역: ${d.region||'-'}\n- 스프라이트: public/sprites/${d.slot}/${d.key}.png\n- OLD: ${d.oldWorn||'(없음)'}\n- NEW(리젝됨): ${d.newWorn}\n- NEW 번역: ${d.newKo}\n- 리젝 사유: ${s.reason||'(미작성)'}\n\n`;
  });
  download('worndesc-v2-rejects.md', md);
  showToast(`리젝 ${rows.length}종 내보내기 완료`);
};
document.getElementById('btnExportAll').onclick = () => {
  const out = DATA.map(d => { const s=store[d.key]||{}; return { key:d.key, slot:d.slot, nameKo:d.nameKo, oldWorn:d.oldWorn, newWorn:d.newWorn, newKo:d.newKo, note:d.note||null, rejected:!!s.rejected, reason:s.reason||null }; });
  download('worndesc-v2-all.json', JSON.stringify(out,null,2));
  showToast('전체 JSON 내보내기 완료');
};
document.getElementById('btnClear').onclick = () => {
  if (!confirm('리젝 상태·사유를 모두 초기화할까요?')) return;
  store={}; save(); location.reload();
};
updateStats(); applyFilter();
</script>
</body>
</html>
