const REGS=['전체','천계','왕국','늪지','오크','신전','화산'];
const SLOTKO={weapon:'무기',armor:'방어구',accessory:'장신구'};
const LSK='worndesc_rejects_v1';
let store={}; try{store=JSON.parse(localStorage.getItem(LSK)||'{}')}catch(e){store={}}
let cur='전체';
const wrap=document.getElementById('wrap'), fl=document.getElementById('filters');
const cntEl=document.getElementById('cnt'), modal=document.getElementById('modal'), outEl=document.getElementById('out');
REGS.forEach(r=>{const b=document.createElement('button');b.textContent=r;if(r==='전체')b.classList.add('on');b.onclick=()=>{cur=r;[...fl.children].forEach(c=>c.classList.toggle('on',c.textContent===r));render()};fl.appendChild(b)});
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function save(){localStorage.setItem(LSK,JSON.stringify(store));updateCnt()}
function updateCnt(){const n=Object.values(store).filter(v=>v&&v.trim()).length;cntEl.textContent='작성 '+n+'건'}
function render(){
  const list = cur==='전체'?ROWS:ROWS.filter(r=>r.region===cur);
  let html='', curSec='';
  for(const r of list){
    const sec=r.region+' · '+SLOTKO[r.slot];
    if(sec!==curSec){if(curSec)html+='</div>';html+='<div class="sec">'+sec+'</div><div class="grid">';curSec=sec;}
    const rv=store[r.key]||'';
    html+='<div class="card'+(rv.trim()?' flagged':'')+'" data-key="'+r.key+'"><div class="top"><div class="img"><img loading="lazy" src="/sprites/'+r.slot+'/'+r.key+'.png" alt=""></div>'+
      '<div class="body"><div class="tagrow"><span class="badge">'+SLOTKO[r.slot]+'</span><span class="name">이름: '+esc(r.nameKo)+'</span></div>'+
      '<div class="key">'+r.key+'</div><div class="en">'+esc(r.en)+'</div><div class="ko">'+esc(r.ko)+'</div></div></div>'+
      '<textarea class="reason" data-key="'+r.key+'" placeholder="리젝/보정 사유 (비우면 통과)">'+esc(rv)+'</textarea></div>';
  }
  if(curSec)html+='</div>';
  wrap.innerHTML=html;
  wrap.querySelectorAll('textarea.reason').forEach(t=>{
    t.addEventListener('input',e=>{const k=e.target.dataset.key;const v=e.target.value;if(v.trim())store[k]=v;else delete store[k];
      e.target.closest('.card').classList.toggle('flagged',!!v.trim());save();});
  });
}
function buildOut(){
  const lines=ROWS.filter(r=>store[r.key]&&store[r.key].trim())
    .map(r=>r.key+' | '+store[r.key].trim().replace(/\s+/g,' '));
  return '[외형묘사 리젝/보정 요청 '+lines.length+'건]\n'+lines.join('\n');
}
document.getElementById('submit').onclick=()=>{const n=Object.values(store).filter(v=>v&&v.trim()).length;
  if(!n){alert('작성된 사유가 없습니다.');return;} outEl.value=buildOut(); modal.classList.add('on');
  try{navigator.clipboard.writeText(outEl.value)}catch(e){}};
document.getElementById('copy').onclick=()=>{outEl.select();try{navigator.clipboard.writeText(outEl.value);}catch(e){}document.execCommand&&document.execCommand('copy');document.getElementById('copy').textContent='복사됨!';setTimeout(()=>document.getElementById('copy').textContent='클립보드 복사',1200);};
document.getElementById('download').onclick=()=>{const blob=new Blob([outEl.value],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='worndesc-rejects.txt';a.click();};
document.getElementById('close').onclick=()=>modal.classList.remove('on');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('on')};
document.getElementById('reset').onclick=()=>{if(confirm('작성한 사유를 모두 지울까요?')){store={};save();render();}};
render();updateCnt();
</script></body></html>
